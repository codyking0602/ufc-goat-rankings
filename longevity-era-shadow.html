<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Longevity Era Shadow</title>
<style>
body{margin:0;background:#050505;color:#f4f4f5;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1320px;margin:0 auto;padding:24px 14px 60px}h1{margin:0 0 8px;font-size:30px}.muted{color:#a1a1aa}.bar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.card{background:#18181b;border:1px solid #27272a;border-radius:14px;padding:12px;min-width:130px}.label{font-size:11px;color:#a1a1aa;text-transform:uppercase;letter-spacing:.08em}.value{font-size:24px;font-weight:900;margin-top:4px}.note{border:1px solid #27272a;background:#101012;border-radius:14px;padding:12px;margin:12px 0;color:#d4d4d8;line-height:1.45}button,input{background:#18181b;color:#f4f4f5;border:1px solid #3f3f46;border-radius:12px;padding:10px 12px;font:inherit}button{font-weight:800}button.active{background:#f4f4f5;color:#09090b}input{min-width:220px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:#a1a1aa;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:0 10px}td{background:#18181b;border-top:1px solid #27272a;border-bottom:1px solid #27272a;padding:12px 10px;vertical-align:top}td:first-child{border-left:1px solid #27272a;border-radius:12px 0 0 12px;font-weight:900}td:last-child{border-right:1px solid #27272a;border-radius:0 12px 12px 0}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900;text-transform:uppercase}.review{background:#451a03;color:#fed7aa}.aligned{background:#052e16;color:#bbf7d0}.missing{background:#450a0a;color:#fecaca}.pos{color:#bbf7d0;font-weight:900}.neg{color:#fecaca;font-weight:900}.reason,.notes{font-size:12px;line-height:1.4;color:#d4d4d8;max-width:420px}@media(max-width:900px){.notes{display:none}th.notesHead{display:none}}
</style>
</head>
<body>
<main>
<h1>Longevity Era Shadow</h1>
<div id="status" class="muted">Loading...</div>
<div class="note"><b>Purpose:</b> QA only. This compares current live Longevity to the Era Ledger shadow score. It does not change rankings or scores.</div>
<div id="summary" class="bar"></div>
<div class="bar"><button data-filter="review" class="active">Review</button><button data-filter="all">All</button><button data-filter="aligned">Aligned</button><button data-filter="missing">Missing</button><input id="search" placeholder="Search fighter…" /></div>
<div id="table"></div>
</main>
<script>
(function(){
const PAGE_VERSION='longevity-era-shadow-page-20260709a';
const bust=Date.now()+'-long';
let filter='review';
const status=document.getElementById('status'),summary=document.getElementById('summary'),table=document.getElementById('table'),search=document.getElementById('search');
function src(path){return path+(path.includes('?')?'&':'?')+'v='+bust}
function load(path){return new Promise(resolve=>{const s=document.createElement('script');s.src=src(path);s.onload=()=>resolve(true);s.onerror=()=>resolve(false);document.body.appendChild(s)})}
async function loadPackets(){await load('assets/data/ranking-data-additions.js');await load('assets/data/fighter-packet-schema.js');await load('assets/data/fighter-packets.js');await load('assets/data/fighter-packet-manifest.js');const packets=window.UFC_FIGHTER_PACKET_MANIFEST?.packets||[];for(const row of packets){if(row?.slug)await load('assets/data/fighter-packets/'+row.slug+'.js')}}
const norm=name=>String(name||'').trim().toLowerCase().replace(/[’‘`´]/g,"'").replace(/\s+/g,' ');
const round2=v=>{const n=Number(v);return Number.isFinite(n)?Math.round(n*100)/100:null};
function liveRows(){const out=[],seen=new Set();const push=row=>{const fighter=row?.fighter;if(!fighter||seen.has(norm(fighter)))return;seen.add(norm(fighter));out.push(row)};(window.RANKING_DATA?.fighters||[]).forEach(push);(window.RANKING_DATA?.men||[]).forEach(push);(window.RANKING_DATA?.women||[]).forEach(push);return out}
function shadowFor(fighter){const s=window.UFC_LONGEVITY_SHADOW_SCORER;if(!s)return null;return (s.entryFor&&s.entryFor(fighter))||(s.rows||[]).find(row=>norm(row.fighter)===norm(fighter))||null}
function correctionFor(fighter){const c=window.UFC_LONGEVITY_SCORE_CORRECTIONS?.corrections||{};return c[fighter]||Object.entries(c).find(([name])=>norm(name)===norm(fighter))?.[1]||null}
function eraFor(fighter){const era=window.UFC_FIGHTER_ERA_LEDGERS;if(!era)return null;return (era.entryFor&&era.entryFor(fighter))||era.ledgers?.[fighter]||Object.entries(era.ledgers||{}).find(([name])=>norm(name)===norm(fighter))?.[1]||null}
function build(){return liveRows().map(row=>{const fighter=row.fighter,shadow=shadowFor(fighter),corr=correctionFor(fighter),era=eraFor(fighter),live=round2(corr?.longevity??row.longevity),shadowScore=round2(shadow?.score),delta=live!==null&&shadowScore!==null?round2(shadowScore-live):null,flags=[];if(!corr)flags.push('No current Longevity correction/audit row found.');if(!era)flags.push('No Era Ledger row found.');if(!shadow)flags.push('No Era shadow Longevity score found.');if(delta!==null&&Math.abs(delta)>1.25)flags.push('Live Longevity and Era shadow differ by '+delta+'. Review cue only.');const status=flags.length?'review':'aligned';return{fighter,status,flags,live,shadowScore,delta,currentRank:row.rank,shadowRank:shadow?.shadowRank||null,window:shadow?.rawWindowLabel||((era?.window?.startLabel||'—')+' → '+(era?.window?.endLabel||'Current')),activeEliteYears:shadow?.activeEliteYears??null,gapAdjustedMonths:shadow?.gapAdjustedMonths??null,countedEliteMonths:shadow?.countedEliteMonths??null,statusMultiplier:shadow?.statusMultiplier??null,divisionMultiplier:shadow?.divisionMultiplier??null,ceilingApplied:!!shadow?.ceilingApplied,notes:[corr?.notes, ...(shadow?.notes||[])].filter(Boolean).join(' | ')}})}
function card(label,value){return '<div class="card"><div class="label">'+label+'</div><div class="value">'+(value??'—')+'</div></div>'}
function fmt(v){return v===null||v===undefined?'—':v}
function dclass(v){const n=Number(v)||0;return n>0?'pos':n<0?'neg':''}
function flagHtml(flags){return (flags||[]).map(f=>'<div>• '+f+'</div>').join('')||'—'}
function render(){const all=build();const s={total:all.length,aligned:all.filter(r=>r.status==='aligned').length,review:all.filter(r=>r.status==='review').length,missing:all.filter(r=>r.flags.some(f=>/No /.test(f))).length,largeDelta:all.filter(r=>r.delta!==null&&Math.abs(r.delta)>1.25).length};status.textContent=PAGE_VERSION+' | fresh='+bust+' | live='+(window.UFC_LONGEVITY_SCORE_CORRECTIONS?.version||'missing')+' | era='+(window.UFC_FIGHTER_ERA_LEDGERS?.version||'missing')+' | shadow='+(window.UFC_LONGEVITY_SHADOW_SCORER?.version||'missing');summary.innerHTML=[card('Total',s.total),card('Aligned',s.aligned),card('Review',s.review),card('Missing',s.missing),card('Large delta',s.largeDelta)].join('');const q=(search.value||'').toLowerCase().trim();let display=all;if(filter==='review')display=display.filter(r=>r.status==='review');if(filter==='aligned')display=display.filter(r=>r.status==='aligned');if(filter==='missing')display=display.filter(r=>r.flags.some(f=>/No /.test(f)));if(q)display=display.filter(r=>String(r.fighter).toLowerCase().includes(q));display=[...display].sort((a,b)=>Math.abs(Number(b.delta)||0)-Math.abs(Number(a.delta)||0));table.innerHTML='<table><thead><tr><th>Fighter</th><th>Status</th><th>Live</th><th>Era shadow</th><th>Delta</th><th>Window</th><th>Counted months</th><th>Multipliers</th><th>Flags</th><th class="notesHead">Notes</th></tr></thead><tbody>'+display.map(r=>'<tr><td>'+r.fighter+'</td><td><span class="pill '+r.status+'">'+r.status+'</span></td><td>'+fmt(r.live)+'</td><td>'+fmt(r.shadowScore)+'<br><span class="muted">#'+fmt(r.shadowRank)+'</span></td><td class="'+dclass(r.delta)+'">'+fmt(r.delta)+'</td><td>'+r.window+'</td><td>'+fmt(r.countedEliteMonths)+'<br><span class="muted">gap '+fmt(r.gapAdjustedMonths)+' / years '+fmt(r.activeEliteYears)+'</span></td><td>'+fmt(r.statusMultiplier)+' × '+fmt(r.divisionMultiplier)+(r.ceilingApplied?'<br><span class="muted">ceiling</span>':'')+'</td><td class="reason">'+flagHtml(r.flags)+'</td><td class="notes">'+(r.notes||'—')+'</td></tr>').join('')+'</tbody></table>'}
document.querySelectorAll('button[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('button[data-filter]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filter=btn.dataset.filter;render()}));search.addEventListener('input',render);
(async function boot(){await load('assets/data/ranking-data.js');await loadPackets();await load('assets/data/longevity-score-corrections.js');await load('assets/data/fighter-era-ledgers.js');await load('assets/data/longevity-shadow-scorer.js');render()})();
})();
</script>
</body>
</html>
