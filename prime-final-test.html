<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prime Final Test</title>
  <style>
    :root{--bg:#0b0d12;--panel:#121722;--panel2:#171d2a;--text:#eef2ff;--muted:#9ca3af;--line:#263244;--accent:#f97316;--accent2:#facc15;--good:#22c55e;--tier-legendary:#d6a73c;--tier-elite:#35a86b;--tier-great:#8b6fb3;--tier-good:#4f7fa8;--tier-average:#c8753e;--tier-below-average:#64748b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1d2334,var(--bg) 45%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.hero{padding:24px 16px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:32px}.subtitle,.meta{color:var(--muted)}.tabs{display:flex;gap:8px;overflow:auto;padding:12px;background:#0b0d12;position:sticky;top:0;z-index:3}.tab,.ghost{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:9px 12px;border-radius:999px;font-weight:800}.tab.active{background:var(--accent);color:#111827}.shell{padding:14px}.toolbar{display:grid;gap:8px;margin-bottom:12px}input,select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:12px}.view{display:none}.active-view{display:block}.kpis,.leaderboard,.compare-grid,.rules-grid{display:grid;gap:10px}.kpi,.card,.row{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:12px}.row{display:grid;grid-template-columns:34px 54px 1fr 70px;gap:10px;align-items:center;cursor:pointer}.rank{color:var(--accent2);font-weight:900}.score{font-weight:950;text-align:right}.row-photo{width:54px;height:54px;border-radius:14px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden}.row-photo img{width:100%;height:100%;object-fit:cover}.resume-tag{display:inline-flex;margin-top:6px;border:1px solid rgba(250,204,21,.25);border-radius:999px;padding:4px 7px;color:#fde68a;font-size:11px}.category-chips,.category-grid,.snapshot-grid,.category-explainer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px;grid-column:1/-1;margin-top:8px}.category-chip,.category-card,.snapshot-item,.category-explainer-item{border:1px solid var(--line);border-left:4px solid var(--tier-color,#35a86b);border-radius:12px;padding:9px;background:#0f172a;color:var(--text);text-align:left}.tier-legendary{--tier-color:var(--tier-legendary)}.tier-elite{--tier-color:var(--tier-elite)}.tier-great{--tier-color:var(--tier-great)}.tier-good{--tier-color:var(--tier-good)}.tier-average{--tier-color:var(--tier-average)}.tier-below-average{--tier-color:var(--tier-below-average)}.category-card strong{display:block;font-size:30px}.category-card small,.category-chip span,.category-chip small,.snapshot-item small,.category-explainer-item small{display:block;color:var(--muted);margin-top:4px}.tier-pill{display:inline-flex;margin-top:8px;color:var(--tier-color);font-weight:900}.category-bar{height:8px;background:#111827;border-radius:99px;overflow:hidden;margin-top:8px}.category-bar i{display:block;height:100%;background:var(--tier-color)}.drawer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:5}.drawer.open{display:block}.drawer-panel{margin-left:auto;width:min(920px,100vw);height:100%;overflow:auto;background:#0f1420;padding:14px}.close{float:right;background:transparent;border:0;color:white;font-size:34px}.profile-hero{display:grid;gap:12px}.fighter-photo{display:none}.profile-summary{border:1px solid var(--line);border-radius:18px;padding:14px;background:var(--panel)}.profile-ovr{font-size:54px;font-weight:950}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:8px;text-align:left;font-size:13px}.notice{border:1px solid rgba(250,204,21,.35);background:rgba(250,204,21,.08);padding:10px;border-radius:12px;color:#fde68a}
  </style>
</head>
<body>
  <header class="hero"><p class="meta">Final Prime Dominance test shell</p><h1>UFC All-Time Rankings</h1><p class="subtitle">Loads Jon elite-stakes fix with fresh script URLs.</p><p><b id="fighterCount">—</b> fighters</p></header>
  <nav class="tabs"><button class="tab active" data-view="men">P4P</button><button class="tab" data-view="women">Women Only</button><button class="tab" data-view="division">By Division</button><button class="tab" data-view="categories">Categories</button><button class="tab" data-view="compare">Compare</button><button class="tab" data-view="rules">Rules</button></nav>
  <main class="shell">
    <section class="toolbar"><input id="search" type="search" placeholder="Search fighter…"><select id="divisionFilter"><option value="All">All divisions</option></select><button id="resetBtn" class="ghost">Reset</button></section>
    <section id="men" class="view active-view"><h2>P4P</h2><div id="menStats" class="kpis"></div><div id="menList" class="leaderboard"></div></section>
    <section id="women" class="view"><h2>Women Only</h2><div id="womenStats" class="kpis"></div><div id="womenList" class="leaderboard"></div></section>
    <section id="division" class="view"><h2>Division</h2><div id="divisionList"></div></section>
    <section id="categories" class="view"><h2>Category Leaders</h2><select id="categoryBoardSelect"></select><div id="categoryBoardList" class="rules-grid"></div></section>
    <section id="compare" class="view"><h2>Compare</h2><select id="fighterA"></select><select id="fighterB"></select><div id="compareResult" class="compare-grid"></div></section>
    <section id="rules" class="view"><h2>Rules</h2><div id="rulesContent" class="rules-grid"></div></section>
  </main>
  <aside id="drawer" class="drawer" aria-hidden="true"><div class="drawer-panel"><button id="closeDrawer" class="close">×</button><div id="fighterDetail"></div></div></aside>
  <script src="assets/data/ranking-data.js?v=ranking-data-prime-final-8619"></script>
  <script src="assets/data/display-overrides.js?v=display-overrides-prime-final-8619"></script>
  <script src="assets/js/app.js?v=app-prime-source-fix-707f854"></script>
  <script src="assets/data/module-versions.js?v=module-versions-prime-final-c001"></script>
  <script src="assets/data/ranking-data-patches.js?v=ranking-data-patches-prime-final-8619"></script>
</body>
</html>
