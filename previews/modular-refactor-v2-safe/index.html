<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UFC App Safe Preview</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:#0b0d12; color:#eef2ff; }
    header { padding:12px 16px; border-bottom:1px solid #263244; background:#121722; display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
    h1 { margin:0; font-size:17px; }
    p { margin:4px 0 0; color:#9ca3af; font-size:12px; }
    .badge { border:1px solid #263244; border-radius:999px; padding:6px 10px; color:#facc15; font-size:12px; font-weight:800; }
    iframe { width:100%; height:calc(100vh - 68px); border:0; display:block; background:#0b0d12; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>UFC App Safe Preview</h1>
      <p>Phase 2E preview: ranking data and display overrides are split before the app boots. Main homepage is still untouched.</p>
    </div>
    <div class="badge">Phase 2E safe preview</div>
  </header>
  <iframe id="preview" title="UFC App safe preview"></iframe>

  <script>
    const branchName = 'modular-refactor-v2-safe';
    const rawBase = 'https://raw.githubusercontent.com/codyking0602/ufc-goat-rankings/' + branchName + '/';
    const rootBase = 'https://codyking0602.github.io/ufc-goat-rankings/';
    const cacheBust = 'phase2e-split-display-overrides-' + Date.now();

    const scriptPaths = [
      'assets/data/ranking-data-patches.js',
      'assets/compare-data.js',
      'assets/compare-coverage-pack-1.js',
      'assets/compare-coverage-pack-2.js',
      'assets/compare-phase2-yan.js',
      'assets/compare-mode.js',
      'assets/compare-engine-v1-5.js',
      'assets/compare-copy-fixes-v1.js'
    ];

    function noStore(url) {
      return fetch(url + '?v=' + encodeURIComponent(cacheBust), { cache: 'no-store' }).then(response => {
        if (!response.ok) throw new Error('Could not load ' + url);
        return response.text();
      });
    }

    function inlineScript(source) {
      const safeSource = source.replace(/<\/script/gi, '<\\/script');
      return '<scr' + 'ipt>' + safeSource + '</scr' + 'ipt>';
    }

    function findObjectAssignment(html, marker, label) {
      const start = html.indexOf(marker);
      if (start === -1) throw new Error('Could not find embedded ' + label);

      let literalStart = start + marker.length;
      while (literalStart < html.length && /\s/.test(html[literalStart])) literalStart += 1;
      if (html[literalStart] !== '{') throw new Error(label + ' does not start with an object literal');

      let depth = 0;
      let inString = false;
      let quote = '';
      let escaped = false;
      let literalEnd = -1;

      for (let i = literalStart; i < html.length; i += 1) {
        const ch = html[i];
        if (inString) {
          if (escaped) escaped = false;
          else if (ch === '\\') escaped = true;
          else if (ch === quote) inString = false;
          continue;
        }
        if (ch === '"' || ch === "'") {
          inString = true;
          quote = ch;
          continue;
        }
        if (ch === '{') depth += 1;
        else if (ch === '}') {
          depth -= 1;
          if (depth === 0) {
            literalEnd = i + 1;
            break;
          }
        }
      }

      if (literalEnd === -1) throw new Error('Could not find end of ' + label);

      let assignmentEnd = literalEnd;
      while (assignmentEnd < html.length && /\s/.test(html[assignmentEnd])) assignmentEnd += 1;
      if (html[assignmentEnd] === ';') assignmentEnd += 1;

      return {
        start,
        assignmentEnd,
        literal: html.slice(literalStart, literalEnd)
      };
    }

    function splitObjectAssignmentForPreview(html, marker, generatedSource, label) {
      const assignment = findObjectAssignment(html, marker, label);
      const dataScript = inlineScript(generatedSource + assignment.literal + ';');
      return html.slice(0, assignment.start) + '</scr' + 'ipt>\n' + dataScript + '\n<scr' + 'ipt>' + html.slice(assignment.assignmentEnd);
    }

    function splitRankingDataForPreview(html) {
      return splitObjectAssignmentForPreview(html, 'window.RANKING_DATA = ', 'window.RANKING_DATA = ', 'ranking data');
    }

    function splitDisplayOverridesForPreview(html) {
      return splitObjectAssignmentForPreview(html, 'const DISPLAY_OVERRIDES = ', 'const DISPLAY_OVERRIDES = ', 'display overrides');
    }

    Promise.all([
      noStore(rawBase + 'index.html'),
      ...scriptPaths.map(path => noStore(rawBase + path))
    ])
      .then(([html, ...scripts]) => {
        const baseTag = '<base href="' + rootBase + '">';
        let output = html.replace('<head>', '<head>' + baseTag);
        output = splitRankingDataForPreview(output);
        output = splitDisplayOverridesForPreview(output);

        // Do not let the old file-level script tag double-run. The preview inlines the safe branch scripts in a controlled order.
        output = output.replace('<scr' + 'ipt src="assets/data/ranking-data-patches.js"></scr' + 'ipt>', '');

        const inlineScripts = scripts.map(inlineScript).join('\n');
        const debugScript = inlineScript(`
          window.UFC_SAFE_PREVIEW_MODE = 'phase2e-split-display-overrides';
          document.documentElement.setAttribute('data-safe-preview-mode', 'phase2e-split-display-overrides');
          setTimeout(function () {
            if (typeof window.UFC_PHASE2_DATA_REFRESH === 'function') window.UFC_PHASE2_DATA_REFRESH();
            if (typeof window.renderCompare === 'function') window.renderCompare();
          }, 0);
        `);

        output = output.replace('</body>', inlineScripts + '\n' + debugScript + '</body>');
        document.getElementById('preview').srcdoc = output;
      })
      .catch(error => {
        document.body.innerHTML = '<div style="padding:20px;color:#fecaca"><h1>Preview failed</h1><p>' + error.message + '</p></div>';
      });
  </script>
</body>
</html>
