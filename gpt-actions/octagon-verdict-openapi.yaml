openapi: 3.1.0
info:
  title: Octagon Verdict Data
  version: "2.0.0"
servers:
  - url: https://codyking0602.github.io/ufc-goat-rankings
paths:
  /assets/data/octagon-verdict/index.json:
    get:
      operationId: getOctagonVerdictIndex
      summary: Get compact fighter index
      responses:
        "200":
          description: Compact fighter index
          content:
            application/json:
              schema:
                type: object
  /assets/data/octagon-verdict/fighters/{slug}.json:
    get:
      operationId: getOctagonVerdictFighter
      summary: Get one fighter profile
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: One fighter profile
          content:
            application/json:
              schema:
                type: object
  /assets/data/octagon-verdict/matchups/{pairKey}.json:
    get:
      operationId: getOctagonVerdictMatchup
      summary: Get special matchup note
      parameters:
        - name: pairKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Special matchup note
          content:
            application/json:
              schema:
                type: object
