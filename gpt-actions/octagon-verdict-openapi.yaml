openapi: 3.1.0
info:
  title: Octagon Verdict Ranking Data
  version: "1.0.0"
  description: Public ranking data feed for Octagon Verdict fighter comparisons.
servers:
  - url: https://codyking0602.github.io/ufc-goat-rankings
paths:
  /assets/data/octagon-verdict-data.json:
    get:
      operationId: getOctagonVerdictData
      summary: Get current fighter comparison data
      description: Returns current fighter ranking data, scores, notes, writing guidance, and special matchup context for Octagon Verdict.
      responses:
        "200":
          description: Current Octagon Verdict fighter comparison data
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  source:
                    type: string
                  defaultScope:
                    type: string
                  writingStyle:
                    type: object
                    properties:
                      voice:
                        type: string
                      defaultFlow:
                        type: array
                        items:
                          type: string
                      avoid:
                        type: array
                        items:
                          type: string
                  categoryDefinitions:
                    type: object
                    additionalProperties:
                      type: string
                  fighters:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        name:
                          type: string
                        group:
                          type: string
                        rank:
                          type: number
                        appOvr:
                          type: number
                        overallScore:
                          type: number
                        ufcRecord:
                          type: string
                        titleFightWins:
                          type: number
                        adjustedTitleWins:
                          type: number
                        primeRoundsWonPct:
                          type: number
                        activeEliteYears:
                          type: number
                        categoryScores:
                          type: object
                          properties:
                            championship:
                              type: number
                            opponentQuality:
                              type: number
                            primeDominance:
                              type: number
                            longevity:
                              type: number
                            penalty:
                              type: number
                        coreCase:
                          type: string
                        strongestEdges:
                          type: array
                          items:
                            type: string
                        mainWeaknesses:
                          type: array
                          items:
                            type: string
                        notes:
                          type: array
                          items:
                            type: string
                        comparisonAngles:
                          type: array
                          items:
                            type: string
                  specialMatchups:
                    type: array
                    items:
                      type: object
                      properties:
                        fighters:
                          type: array
                          items:
                            type: string
                        defaultLean:
                          type: string
                        margin:
                          type: number
                        coreDebate:
                          type: string
                        suggestedFinalSplit:
                          type: object
                        notes:
                          type: array
                          items:
                            type: string
