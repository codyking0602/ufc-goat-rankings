<body>
  <header class="boot-hero"><small>UFC RANKINGS · GAMES · PICKS · COMMUNITY</small><h1>Octagon HQ</h1><p>Rankings, games, picks, and UFC conversation.</p></header>
  <nav class="boot-nav" aria-label="Loading app"><span>Home</span><span>Rankings</span><span>Play</span><span>Picks</span><span>War Room</span><span>Intelligence</span></nav>
  <main class="boot-home"><section class="boot-card"><b>TODAY'S CHALLENGE</b><h2>Find the Leader</h2><p>Eliminate nine UFC fighters without removing the verified stat leader.</p><div id="bootStatus" class="boot-status">Loading Octagon HQ…</div></section></main>
  <script>
  (async function(){
    const status=document.getElementById('bootStatus');
    try{
      const response=await fetch('legacy-shell.html?v=phase-1c-direct-loader-20260717',{cache:'no-store'});
      if(!response.ok)throw new Error('Shell request failed');
      let html=await response.text();
      const fallback='<section id="home" class="view active-view"><div class="home-dashboard critical-home-fallback"><section class="critical-home-primary"><div class="critical-home-kicker">TODAY\'S CHALLENGE</div><h2>Find the Leader</h2><p>Eliminate nine UFC fighters without removing the verified stat leader.</p><button type="button" data-critical-destination="play">PLAY NOW →</button></section><div class="critical-home-grid"><section class="critical-home-card"><div class="critical-home-kicker">NEXT UFC EVENT</div><h3>Make Your Picks</h3><p>The live event card and your saved picks are loading.</p><button type="button" class="secondary" data-critical-destination="picks">OPEN PICKS →</button></section><section class="critical-home-card"><div class="critical-home-kicker">THE WAR ROOM</div><h3>Join Conversation</h3><p>Recent avatars and notifications are loading.</p><button type="button" class="secondary" data-critical-destination="war-room">JOIN CONVERSATION →</button></section></div><section class="critical-home-card"><div class="critical-home-kicker">RANKING SPOTLIGHT</div><h3>Explore the Top 80</h3><p>Today\'s fighter spotlight is finalizing with the production rankings.</p><button type="button" class="secondary" data-critical-destination="rankings">VIEW RANKINGS →</button></section></div></section>';
      const replacements=[
        ['content="20260717-phase-1b-home-dashboard"','content="20260717-phase-1c-direct-shell"'],
        ['<p class="eyebrow">UFC ranking + debate engine</p><h1>UFC All-Time Rankings</h1><p class="subtitle">Rankings, fighter profiles, head-to-head debates, event picks, and interactive games.</p>','<p class="eyebrow">UFC RANKINGS · GAMES · PICKS · COMMUNITY</p><h1>Octagon HQ</h1><p class="subtitle">Rankings, games, picks, and UFC conversation.</p>'],
        ['<span id="fighterCount">—</span>','<span id="fighterCount">80</span>'],
        ['<section id="home" class="view active-view"><div id="homeDashboardMount" aria-live="polite"></div></section>',fallback],
        ['home-dashboard.css?v=home-dashboard-20260717a','home-dashboard.css?v=home-dashboard-20260717d'],
        ['live-score-ui.js?v=live-score-ui-20260715c-peak-apex-single-renderer','live-score-ui.js?v=live-score-ui-20260717-direct-shell'],
        ['app-update-watcher.js?v=app-update-watcher-20260717-play-photo-authority','app-update-watcher.js?v=app-update-watcher-20260717r-on-demand-play-support'],
        ['war-room-branding.js?v=war-room-branding-20260717c','war-room-branding.js?v=war-room-branding-20260717f-shell-recovery']
      ];
      replacements.forEach(([from,to])=>{html=html.split(from).join(to);});
      html=html.replace(/\s*<script id="homeDashboardScript" src="assets\/js\/home-dashboard\.js\?v=[^"]+"><\/script>/g,'');
      html=html.replace(/\s*<script src="assets\/js\/product-architecture\.js\?v=[^"]+"><\/script>/g,'');
      const early='<script src="assets/js/critical-shell-bootstrap.js?v=critical-shell-bootstrap-20260717d-direct-source"><\/script>\n  <script src="assets/js/home-dashboard.js?v=home-dashboard-20260717e-recovery"><\/script>\n  <script src="assets/js/product-architecture.js?v=product-architecture-20260717g-performance"><\/script>';
      html=html.replace('<script src="assets/data/ranking-data.js',early+'\n  <script src="assets/data/ranking-data.js');
      const connectivity='<script src="assets/js/product-connectivity.js?v=product-connectivity-20260717d-clean-handoffs"><\/script>';
      html=html.replace('</body>',connectivity+'\n</body>');
      document.open();
      document.write(html);
      document.close();
    }catch(error){
      status.textContent='Octagon HQ could not load. Close the app and reopen it once.';
    }
  })();
  </script>
</body>
</html>
