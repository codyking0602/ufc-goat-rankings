name: Retrigger GOAT26 Database Migration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/retrigger-goat26-database.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Run migration workflow from latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/apply-goat26-database.yml/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main"}'
