name: Correct and Retrigger GOAT26 Database Checks

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/retrigger-goat26-database.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  correct-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Correct the canonical group fingerprint
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "array['cody','daddy','rhonda','shane','tyler']": "array['brock','cody','rhonda','shane','tony','tyler']",
              "Cody, Daddy, Rhonda, Shane, and Tyler": "Brock, Cody, Rhonda, Shane, Tony, and Tyler",
              "five-member friend group": "six-member friend group",
              "five-member UFC Picks fingerprint": "six-member UFC Picks fingerprint",
              "'canonical-group-goat26-v2'": "'canonical-group-goat26-v3'",
          }

          sql_path = Path('supabase/app-canonical-group-goat26-phase.sql')
          sql = sql_path.read_text()
          for old, new in replacements.items():
              sql = sql.replace(old, new)
          sql_path.write_text(sql)

          workflow_path = Path('.github/workflows/deploy-app-canonical-group.yml')
          workflow = workflow_path.read_text()
          workflow = workflow.replace(
              "array\\['cody','daddy','rhonda','shane','tyler'\\]",
              "array\\['brock','cody','rhonda','shane','tony','tyler'\\]",
          )
          workflow = workflow.replace(
              "['Cody','Daddy','Rhonda','Shane','Tyler']",
              "['Brock','Cody','Rhonda','Shane','Tony','Tyler']",
          )
          workflow = workflow.replace('Canonical five-member audit failed', 'Canonical six-member history audit failed')
          workflow_path.write_text(workflow)
          PY

      - name: Commit corrected source of truth
        run: |
          if git diff --quiet -- supabase/app-canonical-group-goat26-phase.sql .github/workflows/deploy-app-canonical-group.yml; then
            echo 'GOAT26 source already uses the verified six-member group.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add supabase/app-canonical-group-goat26-phase.sql .github/workflows/deploy-app-canonical-group.yml
            git commit -m 'Use the verified six-member GOAT26 group'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Run GOAT26 workflows from latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for workflow in apply-goat26-database.yml deploy-app-canonical-group.yml; do
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/dispatches" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data '{"ref":"main"}'
          done