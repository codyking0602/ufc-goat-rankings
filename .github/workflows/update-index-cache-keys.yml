name: Update index cache keys

on:
  push:
    branches:
      - fix/unified-six-category-pipeline
    paths:
      - .github/workflows/update-index-cache-keys.yml

permissions:
  contents: write

jobs:
  update-cache-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Check out safety branch
        uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 0

      - name: Replace stale static loader keys
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'assets/data/module-versions.js?v=module-versions-20260709a-prime-live':
                  'assets/data/module-versions.js?v=module-versions-20260710b-deterministic',
              'assets/data/ranking-data-patches.js?v=ranking-data-patches-20260709b-restore-packets-prime-core':
                  'assets/data/ranking-data-patches.js?v=ranking-data-patches-20260710a-ready-handoff',
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one occurrence of {old!r}; found {count}.')
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit cache-key update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --check
          git commit -m "Align static loader cache keys"
          git push origin HEAD:fix/unified-six-category-pipeline
