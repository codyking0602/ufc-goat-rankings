name: Align Quality Wins batch cache keys

on:
  push:
    branches:
      - fix/unified-six-category-pipeline
    paths:
      - .github/workflows/align-quality-batch-cache.yml

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 0

      - name: Align Quality Wins batch versions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('assets/js/championship-resume-live.js'): {
                  "const VERSION='championship-resume-live-20260710a-category-only';":
                      "const VERSION='championship-resume-live-20260710b-quality-batch-one';",
                  "opponent-quality-dj-calibration.js?v=opponent-quality-dj-calibration-20260708d":
                      "opponent-quality-dj-calibration.js?v=opponent-quality-dj-calibration-20260710a-chuck-tito",
              },
              Path('assets/data/module-versions.js'): {
                  'championshipResumeLive:"20260710a-category-only"':
                      'championshipResumeLive:"20260710b-quality-batch-one"',
              },
              Path('assets/data/ranking-data-patches.js'): {
                  "const VERSION='ranking-data-patches-20260710a-deterministic-handoff';":
                      "const VERSION='ranking-data-patches-20260710b-quality-batch-one';",
                  "championship-resume-live.js?v=championship-resume-live-20260710a-category-only":
                      "championship-resume-live.js?v=championship-resume-live-20260710b-quality-batch-one",
              },
              Path('index.html'): {
                  'module-versions.js?v=module-versions-20260710b-deterministic':
                      'module-versions.js?v=module-versions-20260710c-quality-batch-one',
                  'ranking-data-patches.js?v=ranking-data-patches-20260710a-ready-handoff':
                      'ranking-data-patches.js?v=ranking-data-patches-20260710b-quality-batch-one',
              },
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs.items():
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one occurrence of {old!r}; found {count}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit aligned cache keys
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/championship-resume-live.js assets/data/module-versions.js assets/data/ranking-data-patches.js index.html
          git diff --cached --check
          git commit -m "Align Chuck and Tito Quality Wins cache chain"
          git push origin HEAD:fix/unified-six-category-pipeline
