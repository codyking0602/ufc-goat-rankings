name: Restore Generated Knowledge Hotfix

on:
  push:
    branches: [fix/remove-home-resume-loop]

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remove-home-resume-loop
          fetch-depth: 0
      - name: Let automatic knowledge rebuild finish
        run: sleep 45
      - name: Restore generated knowledge file from main
        run: |
          git fetch origin main
          git checkout origin/main -- octagon-verdict-knowledge.md
          if git diff --quiet -- octagon-verdict-knowledge.md; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add octagon-verdict-knowledge.md
          git commit -m "Restore generated knowledge file [skip ci]"
          git push origin HEAD:fix/remove-home-resume-loop
