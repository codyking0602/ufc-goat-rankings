# Permanent rendered-app and derived-output certification.
name: Production Ranking Browser Smoke

on:
  push:
    branches:
      - main
      - agent/fighter-data-phase-1
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/fighters/**'
      - 'assets/compare-data.js'
      - 'assets/js/app.js'
      - 'assets/js/play.js'
      - 'assets/js/blind-matchmaking.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/division-ranking-pipeline.js'
      - 'assets/js/division-ranking-reconciliation.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'assets/js/octagon-verdict-compare-launcher.js'
      - 'assets/js/octagon-verdict-data.js'
      - 'tools/build-octagon-verdict-data.js'
      - 'scripts/materialize-octagon-verdict-data.mjs'
      - 'scripts/test-production-browser.mjs'
      - 'scripts/test-profile-card-hotfix.mjs'
      - 'scripts/test-fighter-taglines.mjs'
      - 'scripts/test-woodley-audit.mjs'
      - 'scripts/audit-fighter-photo-paths.mjs'
      - '.github/workflows/production-ranking-browser-smoke.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/fighters/**'
      - 'assets/compare-data.js'
      - 'assets/js/**'
      - 'tools/build-octagon-verdict-data.js'
      - 'scripts/**'
      - '.github/workflows/production-ranking-browser-smoke.yml'

permissions:
  contents: write

jobs:
  browser-smoke:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright > /tmp/playwright-install.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright-install.log 2>&1
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/ufc-app-http.log 2>&1 &
          echo $! > /tmp/ufc-app-http.pid
      - name: Audit every fighter photo path
        run: node scripts/audit-fighter-photo-paths.mjs > /tmp/fighter-photo-audit.log 2>&1
      - name: Run rendered 80-fighter ranking certification
        run: node scripts/test-production-browser.mjs > /tmp/ufc-browser-test.log 2>&1
      - name: Run mobile profile card regression
        run: node scripts/test-profile-card-hotfix.mjs > /tmp/profile-card-hotfix.log 2>&1
      - name: Audit fighter pill taglines
        run: node scripts/test-fighter-taglines.mjs > /tmp/fighter-taglines.log 2>&1
      - name: Certify Tyron Woodley audit inputs
        run: node scripts/test-woodley-audit.mjs > /tmp/woodley-audit.log 2>&1
      - name: Build and materialize Octagon Verdict package
        run: |
          node tools/build-octagon-verdict-data.js > /tmp/octagon-verdict-build.log 2>&1
          node scripts/materialize-octagon-verdict-data.mjs >> /tmp/octagon-verdict-build.log 2>&1
      - name: Validate 80-fighter generated package
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const assert=require('assert/strict');
          const feed=JSON.parse(fs.readFileSync('assets/data/octagon-verdict-data.json','utf8'));
          const index=JSON.parse(fs.readFileSync('assets/data/octagon-verdict/index.json','utf8'));
          const pettis=JSON.parse(fs.readFileSync('assets/data/octagon-verdict/fighters/anthony-pettis.json','utf8'));
          assert.equal(feed.source,'calculated-browser-runtime');
          assert.equal(feed.fighterCount,80);
          assert.equal(feed.fighters.length,80);
          assert.equal(index.fighterCount,80);
          assert.equal(index.fighters.length,80);
          assert.equal(index.divisionBoardCount,9);
          assert.equal(Object.keys(feed.divisionBoards||{}).length,9);
          assert.equal(feed.divisionBoards?.Openweight?.[0]?.fighter,'Royce Gracie');
          for(const [division,rows] of Object.entries(feed.divisionBoards))for(const row of rows)assert.ok(row.stats?.ufcWins>0,`${row.fighter} must own a UFC win in ${division}`);
          assert.equal(feed.fighters.find(f=>f.name==='Jon Jones')?.rank,1);
          assert.equal(feed.fighters.find(f=>f.name==='Georges St-Pierre')?.rank,2);
          assert.equal(feed.fighters.find(f=>f.name==='Amanda Nunes')?.appOvr,99);
          assert.equal(feed.fighters.find(f=>f.name==='Valentina Shevchenko')?.appOvr,98);
          assert.equal(pettis.name,'Anthony Pettis');
          assert.equal(pettis.profileDisplayName,'Anthony “Showtime” Pettis');
          assert.equal(pettis.ufcRecord,'11-9');
          assert.equal(pettis.titleFightWins,2);
          assert.equal(pettis.adjustedTitleWins,2);
          assert.equal(pettis.topFiveWins,4);
          assert.equal(pettis.rankedWins,8);
          assert.equal(pettis.primeRecord,'7-6');
          assert.equal(pettis.roundsWonPct,34.38);
          assert.equal(pettis.finishRatePct,63.64);
          assert.equal(pettis.timesFinishedPrime,3);
          assert.equal(pettis.photoUrl.startsWith('assets/fighters/anthony-pettis.webp'),true);
          assert.equal(pettis.thumbUrl.startsWith('assets/fighters/anthony-pettis-thumb.webp'),true);
          assert.equal(pettis.watchUrl,undefined);
          assert.equal(pettis.signatureFightUrl,undefined);
          assert.ok(feed.divisionBoards.Lightweight.some(row=>row.fighter==='Anthony Pettis'));
          assert.ok(feed.divisionBoards.Featherweight.some(row=>row.fighter==='Anthony Pettis'));
          assert.ok(feed.divisionBoards.Welterweight.some(row=>row.fighter==='Anthony Pettis'));
          assert.ok(index.fighters.some(row=>row.name==='Anthony Pettis'&&row.rank===pettis.rank&&row.appOvr===pettis.appOvr));
          console.log('ANTHONY_PETTIS_GENERATED_RESULT');
          console.log(JSON.stringify(pettis,null,2));
          console.log(`Validated ${feed.fighterCount} fighters, ${index.fighterCount} materialized fighter objects, and ${Object.keys(feed.divisionBoards).length} automatic division boards.`);
          NODE
      - name: Commit refreshed calculated package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/octagon-verdict-data.json assets/data/octagon-verdict/
          if git diff --cached --quiet; then
            echo 'Calculated package already current.'
          else
            git commit -m 'Materialize 80-fighter Octagon Verdict package [skip ci]'
            git push origin HEAD:main
          fi
      - name: Show concise regression diagnostics on failure
        if: failure()
        run: |
          echo '--- Fighter photo audit ---'
          cat /tmp/fighter-photo-audit.log 2>/dev/null || true
          echo '--- Browser assertion ---'
          cat /tmp/ufc-browser-test.log 2>/dev/null || true
          echo '--- Mobile profile assertion ---'
          cat /tmp/profile-card-hotfix.log 2>/dev/null || true
          echo '--- Fighter tagline assertion ---'
          cat /tmp/fighter-taglines.log 2>/dev/null || true
          echo '--- Woodley audit assertion ---'
          cat /tmp/woodley-audit.log 2>/dev/null || true
          echo '--- Octagon build ---'
          cat /tmp/octagon-verdict-build.log 2>/dev/null || true
          echo '--- Local server tail ---'
          tail -30 /tmp/ufc-app-http.log 2>/dev/null || true
      - name: Archive production diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-ranking-browser-diagnostics
          path: |
            /tmp/anthony-pettis-pipeline-result.json
            /tmp/fighter-photo-audit.log
            /tmp/ufc-browser-test.log
            /tmp/profile-card-hotfix.log
            /tmp/fighter-taglines.log
            /tmp/woodley-audit.log
            /tmp/profile-card-mobile-hotfix.png
            /tmp/octagon-verdict-build.log
            /tmp/ufc-app-http.log
            assets/data/octagon-verdict-data.json
            assets/data/octagon-verdict/
          if-no-files-found: warn
