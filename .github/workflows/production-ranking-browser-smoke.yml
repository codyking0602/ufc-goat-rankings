name: Production Ranking Browser Smoke

on:
  push:
    branches:
      - agent/fighter-data-phase-1
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/compare-data.js'
      - 'assets/js/app.js'
      - 'assets/js/play.js'
      - 'assets/js/blind-matchmaking.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/division-ranking-pipeline.js'
      - 'assets/js/division-ranking-reconciliation.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'tools/build-octagon-verdict-data.js'
      - 'scripts/test-production-browser.mjs'
      - '.github/workflows/production-ranking-browser-smoke.yml'

permissions:
  contents: write

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright > /tmp/playwright-install.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright-install.log 2>&1
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/ufc-app-http.log 2>&1 &
          echo $! > /tmp/ufc-app-http.pid
      - name: Run rendered ranking regression
        run: node scripts/test-production-browser.mjs > /tmp/ufc-browser-test.log 2>&1
      - name: Build Octagon Verdict knowledge feed
        run: node tools/build-octagon-verdict-data.js > /tmp/octagon-verdict-build.log 2>&1
      - name: Validate Octagon Verdict package
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const assert=require('assert/strict');
          const feed=JSON.parse(fs.readFileSync('assets/data/octagon-verdict-data.json','utf8'));
          assert.equal(feed.source,'calculated-browser-runtime');
          assert.equal(feed.fighterCount,73);
          assert.equal(feed.fighters.length,73);
          assert.equal(Object.keys(feed.divisionBoards||{}).length,8);
          assert.equal(feed.fighters.find(f=>f.name==='Jon Jones')?.rank,1);
          assert.equal(feed.fighters.find(f=>f.name==='Georges St-Pierre')?.rank,2);
          assert.equal(feed.fighters.find(f=>f.name==='Amanda Nunes')?.appOvr,99);
          assert.equal(feed.fighters.find(f=>f.name==='Valentina Shevchenko')?.appOvr,98);
          assert.equal(feed.guidance?.divisionRule?.includes('divisionScore'),true);
          console.log(`Validated ${feed.fighterCount} fighters and ${Object.keys(feed.divisionBoards).length} automatic division boards.`);
          NODE
      - name: Commit validated Octagon feed to branch
        if: success() && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/octagon-verdict-data.json assets/data/octagon-verdict
          if git diff --cached --quiet; then
            echo "Octagon Verdict data is already current."
          else
            git commit -m "Rebuild Octagon Verdict knowledge feed [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
      - name: Show concise regression diagnostics on failure
        if: failure()
        run: |
          echo '--- Browser assertion ---'
          cat /tmp/ufc-browser-test.log 2>/dev/null || true
          echo '--- Octagon build ---'
          cat /tmp/octagon-verdict-build.log 2>/dev/null || true
          echo '--- Local server tail ---'
          tail -20 /tmp/ufc-app-http.log 2>/dev/null || true
      - name: Archive browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-ranking-browser-diagnostics
          path: |
            /tmp/ufc-browser-test.log
            /tmp/octagon-verdict-build.log
            /tmp/ufc-app-http.log
          if-no-files-found: ignore
      - name: Upload Octagon Verdict knowledge file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: octagon-verdict-knowledge-feed
          path: assets/data/octagon-verdict-data.json
          if-no-files-found: error
