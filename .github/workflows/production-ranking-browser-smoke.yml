# Permanent rendered-app and required Markdown knowledge certification.
name: Production Ranking Browser Smoke

on:
  push:
    branches:
      - main
      - agent/fighter-data-phase-1
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/fighters/**'
      - 'assets/compare-data.js'
      - 'assets/js/app.js'
      - 'assets/js/play.js'
      - 'assets/js/blind-matchmaking.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/division-ranking-pipeline.js'
      - 'assets/js/division-ranking-reconciliation.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'assets/js/octagon-verdict-compare-launcher.js'
      - 'tools/build-octagon-verdict-knowledge.js'
      - 'tools/build-octagon-verdict-markdown.js'
      - 'octagon-verdict-knowledge.md'
      - 'scripts/materialize-display-overrides.mjs'
      - 'scripts/sync-production-cache-keys.mjs'
      - 'scripts/test-production-browser.mjs'
      - 'scripts/test-profile-card-hotfix.mjs'
      - 'scripts/test-fighter-taglines.mjs'
      - 'scripts/test-woodley-audit.mjs'
      - 'scripts/audit-fighter-photo-paths.mjs'
      - '.github/workflows/production-ranking-browser-smoke.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/fighters/**'
      - 'assets/compare-data.js'
      - 'assets/js/**'
      - 'tools/build-octagon-verdict-knowledge.js'
      - 'tools/build-octagon-verdict-markdown.js'
      - 'octagon-verdict-knowledge.md'
      - 'scripts/**'
      - '.github/workflows/production-ranking-browser-smoke.yml'

permissions:
  contents: write

jobs:
  browser-smoke:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync deterministic production cache keys
        run: node scripts/sync-production-cache-keys.mjs > /tmp/cache-sync.log 2>&1
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright > /tmp/playwright-install.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/playwright-install.log 2>&1
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/ufc-app-http.log 2>&1 &
          echo $! > /tmp/ufc-app-http.pid
      - name: Audit every fighter photo path
        run: node scripts/audit-fighter-photo-paths.mjs > /tmp/fighter-photo-audit.log 2>&1
      - name: Run rendered 80-fighter ranking certification
        run: node scripts/test-production-browser.mjs > /tmp/ufc-browser-test.log 2>&1
      - name: Run mobile profile card regression
        run: node scripts/test-profile-card-hotfix.mjs > /tmp/profile-card-hotfix.log 2>&1
      - name: Audit fighter pill taglines
        run: node scripts/test-fighter-taglines.mjs > /tmp/fighter-taglines.log 2>&1
      - name: Certify Tyron Woodley audit inputs
        run: node scripts/test-woodley-audit.mjs > /tmp/woodley-audit.log 2>&1
      - name: Materialize shared display overrides
        run: node scripts/materialize-display-overrides.mjs > /tmp/display-overrides-build.log 2>&1
      - name: Refresh cache keys after presentation materialization
        run: node scripts/sync-production-cache-keys.mjs >> /tmp/cache-sync.log 2>&1
      - name: Build required Octagon Verdict Markdown
        run: node tools/build-octagon-verdict-markdown.js > /tmp/octagon-verdict-markdown-build.log 2>&1
      - name: Validate 80-fighter Markdown knowledge pack
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const assert=require('assert/strict');
          const markdown=fs.readFileSync('octagon-verdict-knowledge.md','utf8');
          const overrides=fs.readFileSync('assets/data/display-overrides.js','utf8');
          const count=Number(markdown.match(/Fighters: \*\*(\d+)\*\*/)?.[1]||0);
          assert.equal(count,80);
          assert.match(markdown,/\| 1 \| Jon Jones \| 99 \|/);
          assert.match(markdown,/### 57\. Anthony Pettis — 87 OVR/);
          const pettis=markdown.match(/### 57\. Anthony Pettis — 87 OVR[\s\S]*?(?=\n### \d+\.|\n## 11\.)/)?.[0]||'';
          assert.ok(pettis,'Anthony Pettis fighter card is missing.');
          assert.match(pettis,/Anthony “Showtime” Pettis/);
          assert.match(pettis,/\| men \| 37\.5 \| 11-9 \| Lightweight \/ Featherweight \/ Welterweight \| 2 \| 2 \| 3 \| 7-6 \| 34\.4% \| 6\.61 \|/);
          assert.match(pettis,/Benson Henderson/);
          assert.match(pettis,/Gilbert Melendez/);
          assert.ok(overrides.includes('Anthony “Showtime” Pettis'));
          assert.ok(overrides.includes('BiPvl_p6JqY'));
          assert.ok(overrides.includes('smbYO1-yqtA'));
          assert.ok(markdown.includes('Machine-readable JSON is optional and does not block fighter additions.'));
          assert.ok(markdown.includes('JSON exports are optional, run only when explicitly requested, and never block a fighter addition.'));
          console.log(`Validated required Markdown knowledge for ${count} fighters, including Anthony “Showtime” Pettis.`);
          NODE
      - name: Commit refreshed presentation, Markdown, and shell cache keys
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/data/display-overrides.js octagon-verdict-knowledge.md
          if git diff --cached --quiet; then
            echo 'Presentation data, Markdown knowledge, and cache keys already current.'
          else
            git commit -m 'Materialize 80-fighter Markdown production package [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Show concise regression diagnostics on failure
        if: failure()
        run: |
          echo '--- Cache sync ---'
          cat /tmp/cache-sync.log 2>/dev/null || true
          echo '--- Fighter photo audit ---'
          cat /tmp/fighter-photo-audit.log 2>/dev/null || true
          echo '--- Browser assertion ---'
          cat /tmp/ufc-browser-test.log 2>/dev/null || true
          echo '--- Mobile profile assertion ---'
          cat /tmp/profile-card-hotfix.log 2>/dev/null || true
          echo '--- Fighter tagline assertion ---'
          cat /tmp/fighter-taglines.log 2>/dev/null || true
          echo '--- Woodley audit assertion ---'
          cat /tmp/woodley-audit.log 2>/dev/null || true
          echo '--- Display override build ---'
          cat /tmp/display-overrides-build.log 2>/dev/null || true
          echo '--- Octagon Markdown build ---'
          cat /tmp/octagon-verdict-markdown-build.log 2>/dev/null || true
          echo '--- Local server tail ---'
          tail -30 /tmp/ufc-app-http.log 2>/dev/null || true
      - name: Archive production diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-ranking-browser-diagnostics
          path: |
            /tmp/cache-sync.log
            /tmp/anthony-pettis-pipeline-result.json
            /tmp/fighter-photo-audit.log
            /tmp/ufc-browser-test.log
            /tmp/profile-card-hotfix.log
            /tmp/fighter-taglines.log
            /tmp/woodley-audit.log
            /tmp/display-overrides-build.log
            /tmp/profile-card-mobile-hotfix.png
            /tmp/octagon-verdict-markdown-build.log
            /tmp/ufc-app-http.log
            assets/data/display-overrides.js
            octagon-verdict-knowledge.md
          if-no-files-found: warn
