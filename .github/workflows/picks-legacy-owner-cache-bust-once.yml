name: One-time legacy Picks owner cache bust

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/picks-legacy-owner-cache-bust-once.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force fresh legacy owner recovery assets
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'content="20260719-picks-abu-dhabi-rollover"': 'content="20260719-picks-legacy-owner-recovery"',
              'supabase-config.js?v=supabase-config-20260719b-picks-auto-advance': 'supabase-config.js?v=supabase-config-20260719c-legacy-owner-recovery',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected exactly one index marker: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

      - name: Publish fresh app build
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bust cache for legacy Picks owner recovery"
          git push origin main
