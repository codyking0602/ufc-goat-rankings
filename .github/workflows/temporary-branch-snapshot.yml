name: Apply Royce Hughes Calibration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/fighter-data-phase-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0
      - name: Apply fight-level calibration patch
        run: |
          git apply --check .github/royce-hughes-input-calibration.patch
          git apply .github/royce-hughes-input-calibration.patch
          rm .github/royce-hughes-input-calibration.patch
      - name: Validate scoring reconstructions
        run: |
          node --check assets/data/canonical-opponent-quality-approved-judgments.js
          node --check assets/data/canonical-opponent-quality-reconstruction.js
          node --check assets/data/canonical-apex-approved-judgments-batch-three.js
          node --check assets/data/canonical-final-score-reconstruction.js
          node scripts/test-canonical-opponent-quality-reconstruction.mjs
          node scripts/test-canonical-opponent-quality-full-roster.mjs
          node scripts/test-canonical-apex-approved-batch-three.mjs
          node scripts/test-canonical-apex-approved-batch-four.mjs
          node scripts/test-canonical-apex-reconstruction.mjs
          node scripts/test-canonical-apex-lock.mjs
          node scripts/test-canonical-final-score-reconstruction.mjs
      - name: Commit calibrated inputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data scripts .github/royce-hughes-input-calibration.patch
          git commit -m "Calibrate Royce and Hughes through fight-level inputs"
          git push origin HEAD:agent/fighter-data-phase-1
