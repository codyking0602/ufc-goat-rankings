name: Cache Bust Oklahoma City Photo Centering

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cache-bust-okc-photo-centering.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update cache versions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('index.html')
          text=path.read_text()
          text=text.replace('20260712-picks-event-artwork-repaired','20260712-okc-photo-centering')
          text=text.replace('picks-mobile-polish-20260712b-event-art','picks-mobile-polish-20260712d-photo-centering')
          path.write_text(text)
          PY
          rm -f .github/workflows/cache-bust-okc-photo-centering.yml

      - name: Commit cache bust
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bust Oklahoma City photo centering cache"
          git pull --rebase origin main
          git push origin main
