name: Picks UI Smoke
# Final production certification trigger; workflow behavior is unchanged.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/picks*.js'
      - 'assets/css/picks*.css'
      - 'assets/data/picks-events.js'
      - 'assets/data/picks-photo-overrides.js'
      - 'supabase/*-event.sql'
      - 'supabase/picks-device-recovery-phase.sql'
      - 'supabase/picks-member-pin-phase.sql'
      - 'supabase/picks-archive-admin-phase.sql'
      - 'supabase/functions/sync-ufc-card/**'
      - 'supabase/functions/refresh-ufc-odds/**'
      - 'docs/picks-setup.md'
      - 'scripts/apply-maintained-ufc-baselines.mjs'
      - 'scripts/sync-ufc-card.mjs'
      - 'scripts/test-ufc-card-section-authority.mjs'
      - 'scripts/check-picks-ui.mjs'
      - 'scripts/test-picks-mobile-top-tabs.mjs'
      - '.github/workflows/picks-ui-smoke.yml'
      - '.github/workflows/refresh-ufc-odds.yml'
      - '.github/workflows/deploy-ufc-odds-refresh.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/js/picks*.js'
      - 'assets/css/picks*.css'
      - 'assets/data/picks-events.js'
      - 'assets/data/picks-photo-overrides.js'
      - 'supabase/*-event.sql'
      - 'supabase/picks-device-recovery-phase.sql'
      - 'supabase/picks-member-pin-phase.sql'
      - 'supabase/picks-archive-admin-phase.sql'
      - 'supabase/functions/sync-ufc-card/**'
      - 'supabase/functions/refresh-ufc-odds/**'
      - 'docs/picks-setup.md'
      - 'scripts/apply-maintained-ufc-baselines.mjs'
      - 'scripts/sync-ufc-card.mjs'
      - 'scripts/test-ufc-card-section-authority.mjs'
      - 'scripts/check-picks-ui.mjs'
      - 'scripts/test-picks-mobile-top-tabs.mjs'
      - '.github/workflows/picks-ui-smoke.yml'
      - '.github/workflows/refresh-ufc-odds.yml'
      - '.github/workflows/deploy-ufc-odds-refresh.yml'
  workflow_dispatch:

concurrency:
  group: picks-ui-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Quiet checkout
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: git clone --quiet --depth 1 --branch "$BRANCH_NAME" "https://github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install mobile browser runtime
        working-directory: repo
        run: |
          npm install --no-save --silent playwright@1.54.2 > /tmp/picks-playwright-install.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/picks-playwright-install.log 2>&1

      - name: Check Picks JavaScript syntax
        working-directory: repo
        run: |
          find assets/js -maxdepth 1 -type f -name 'picks*.js' -print0 | xargs -0 -n1 node --check
          node --check scripts/apply-maintained-ufc-baselines.mjs
          node --check scripts/sync-ufc-card.mjs
          node --check scripts/test-ufc-card-section-authority.mjs
          node --check scripts/check-picks-ui.mjs
          node --check scripts/test-picks-mobile-top-tabs.mjs

      - name: Verify maintained UFC card authority
        working-directory: repo
        run: |
          node scripts/apply-maintained-ufc-baselines.mjs --force
          node scripts/test-ufc-card-section-authority.mjs

      - name: Verify Picks source and ownership contract
        working-directory: repo
        run: node scripts/check-picks-ui.mjs

      - name: Start local app
        working-directory: repo
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/picks-ui-http.log 2>&1 &
          echo $! > /tmp/picks-ui-http.pid

      - name: Verify mobile top-tab layout
        working-directory: repo
        run: node scripts/test-picks-mobile-top-tabs.mjs

      - name: Archive mobile shell diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picks-mobile-shell-diagnostic
          path: |
            /tmp/picks-mobile-nav-diagnostic.json
            repo/assets/css/native-app-shell-stability.css
            repo/scripts/test-production-palette-sweep.mjs
          if-no-files-found: warn
          retention-days: 7