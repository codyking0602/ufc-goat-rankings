name: Picks UI Smoke

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/picks*.js'
      - 'assets/css/picks*.css'
      - 'assets/data/picks-events.js'
      - 'assets/data/picks-photo-overrides.js'
      - 'supabase/*-event.sql'
      - 'supabase/picks-device-recovery-phase.sql'
      - 'supabase/functions/refresh-ufc-odds/**'
      - 'docs/picks-setup.md'
      - 'scripts/check-picks-ui.mjs'
      - '.github/workflows/picks-ui-smoke.yml'
      - '.github/workflows/refresh-ufc-odds.yml'
      - '.github/workflows/deploy-ufc-odds-refresh.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/js/picks*.js'
      - 'assets/css/picks*.css'
      - 'assets/data/picks-events.js'
      - 'assets/data/picks-photo-overrides.js'
      - 'supabase/*-event.sql'
      - 'supabase/picks-device-recovery-phase.sql'
      - 'supabase/functions/refresh-ufc-odds/**'
      - 'docs/picks-setup.md'
      - 'scripts/check-picks-ui.mjs'
      - '.github/workflows/picks-ui-smoke.yml'
      - '.github/workflows/refresh-ufc-odds.yml'
      - '.github/workflows/deploy-ufc-odds-refresh.yml'
  workflow_dispatch:

concurrency:
  group: picks-ui-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Quiet checkout
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: git clone --quiet --depth 1 --branch "$BRANCH_NAME" "https://github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Picks JavaScript syntax
        working-directory: repo
        run: |
          find assets/js -maxdepth 1 -type f -name 'picks*.js' -print0 | xargs -0 -n1 node --check
          node --check scripts/check-picks-ui.mjs

      - name: Verify Picks UI contract
        working-directory: repo
        run: node scripts/check-picks-ui.mjs
