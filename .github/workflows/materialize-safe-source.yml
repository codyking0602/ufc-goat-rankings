name: Materialize Safe Branch Source Files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/materialize-safe-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-safe-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout safe branch
        uses: actions/checkout@v4
        with:
          ref: modular-refactor-v2-safe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Phase 2H materialization
        run: python tools/materialize-source-files.py

      - name: Commit Phase 2H files to safe branch
        run: |
          if git diff --quiet; then
            echo "No materialization changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/data/ranking-data.js assets/data/display-overrides.js assets/js/app.js
          git commit -m "Materialize source files for Phase 2H"
          git push origin HEAD:modular-refactor-v2-safe
