          s = s.replace('| Primary destination and ranking-subview activation | `assets/js/octagon-hq-shell.js` via `window.UFC_APP_SHELL` | Canonical navigation owner | Global duplicate-file guard merged and physically verified in PR #105; Phase 2 confirms `app.js` still contains a shadowed legacy top-tab activation path |', '| Primary destination and ranking-subview activation | `assets/js/octagon-hq-shell.js` via `window.UFC_APP_SHELL` | Canonical navigation owner | Recovery queue merged and physically verified in PR #128; legacy `app.js` activation removed and physically verified in PR #129 |')
