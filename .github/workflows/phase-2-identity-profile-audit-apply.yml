          identity_rows = '''| Shared profile credentials, login, resolution, cache, and access persistence | `assets/js/play-profile-identity.js` via `window.UFC_PLAY_PROFILE` | Canonical identity owner | Phase 2 identity audit confirms the Picks returning-member path duplicates login RPC and storage ownership; first runtime candidate delegates that transaction here |
