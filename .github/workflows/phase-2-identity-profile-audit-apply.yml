name: Apply Phase 2 identity profile audit

on:
  push:
    branches: [agent/phase-2-identity-profile-audit]
    paths:
      - '.github/workflows/phase-2-identity-profile-audit-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2-identity-profile-audit
      - name: Write identity and profile audit documentation
