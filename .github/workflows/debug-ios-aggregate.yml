name: Debug iOS Aggregate

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  debug-ios-aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --package-lock=false playwright@1.54.2 acorn@8
          npx playwright install --with-deps chromium
      - run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/debug-ios-http.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          exit 1
      - name: Capture aggregate result
        continue-on-error: true
        run: node scripts/test-ios-standalone-resume-home.mjs > /tmp/ios-aggregate.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-aggregate-diagnostics
          path: |
            /tmp/ios-aggregate.log
            /tmp/profile-signin-stability-report.json
            /tmp/debug-ios-http.log
          if-no-files-found: warn
