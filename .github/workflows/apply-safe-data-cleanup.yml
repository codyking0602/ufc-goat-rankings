name: Apply Safe Branch Data Cleanup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-safe-data-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-safe-data-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout safe branch
        uses: actions/checkout@v4
        with:
          ref: modular-refactor-v2-safe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move durable patch content into source files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          ranking_path = Path('assets/data/ranking-data.js')
          display_path = Path('assets/data/display-overrides.js')
          patch_path = Path('assets/data/ranking-data-patches.js')

          marker = 'window.RANKING_DATA = '
          ranking_text = ranking_path.read_text(encoding='utf-8')
          literal = ranking_text.split(marker, 1)[1].strip()
          if literal.endswith(';'):
              literal = literal[:-1].strip()
          data = json.loads(literal)

          def find_row(board_name, fighter):
              for row in data.get(board_name, []):
                  if row.get('fighter') == fighter:
                      return row
              return None

          def patch_row(board_name, fighter, patch):
              row = find_row(board_name, fighter)
              if row is None:
                  data.setdefault(board_name, []).append({'fighter': fighter, **patch})
              else:
                  row.update(patch)

          def find_profile(fighter):
              for row in data.get('fighters', []):
                  if row.get('fighter') == fighter:
                      return row
              return None

          def upsert_profile(profile):
              existing = find_profile(profile['fighter'])
              if existing is None:
                  data.setdefault('fighters', []).append(profile)
              else:
                  existing.update(profile)

          patch_row('men', 'Georges St-Pierre', {
              'timesFinishedPrime': 1,
              'primeRecord': '18-1 after first Hughes loss; Serra is the counted prime finish loss',
              'notes': 'Hughes 2004 is an early elite loss. Serra 2007 is the counted prime finished loss, then avenged decisively.'
          })
          gsp_profile = find_profile('Georges St-Pierre')
          if gsp_profile:
              gsp_profile.update({
                  'timesFinishedPrime': 1,
                  'primeRecord': '18-1 after first Hughes loss; Serra is the counted prime finish loss',
                  'notes': 'Hughes 2004 is an early elite loss. Serra 2007 is the counted prime finished loss, then avenged decisively.'
              })

          patch_row('men', 'Charles Oliveira', {
              'rank': 24,
              'totalScore': 40.13,
              'championship': 5.32,
              'opponentQuality': 17.85,
              'primeDominance': 20.96,
              'longevity': 5.99,
              'penalty': -10.0
          })

          patch_row('men', 'Ilia Topuria', {
              'rank': 15,
              'totalScore': 43.44,
              'championship': 5.99,
              'opponentQuality': 13.10,
              'primeDominance': 23.60,
              'longevity': 2.97,
              'penalty': -2.25
          })

          yan = {
              'rank': 16,
              'fighter': 'Petr Yan',
              'totalScore': 43.35,
              'championship': 5.04,
              'opponentQuality': 13.10,
              'primeDominance': 21.43,
              'longevity': 5.98,
              'penalty': -5.25,
              'leaderboard': 'men',
              'gender': 'Men',
              'ufcRecord': '12-4',
              'primaryDivision': 'Bantamweight',
              'secondaryDivision': '',
              'finishRatePct': 18.2,
              'activeEliteYears': 5.98,
              'timesFinishedPrime': 0,
              'primeRecord': '7-4 in title/elite window',
              'roundsWonPct': 65.2,
              'notes': 'Audited bantamweight title case. Sterling DQ context reduced, later elite losses counted without finish add-ons.'
          }
          existing_yan = find_row('men', 'Petr Yan')
          if existing_yan:
              existing_yan.update(yan)
          else:
              data.setdefault('men', []).append(yan)

          yan_profile = dict(yan)
          yan_profile.update({
              'title': {
                  'adjustedTitleWins': 2.65,
                  'notes': 'UFC bantamweight champion with elite title-race context. Sterling DQ is handled with reduced context.'
              },
              'opponents': [
                  {'opponent': 'Jose Aldo', 'division': 'Bantamweight', 'context': 'Vacant title win / elite former champion', 'credit': 1.0},
                  {'opponent': 'Cory Sandhagen', 'division': 'Bantamweight', 'context': 'Interim title win / top contender', 'credit': 1.0}
              ],
              'rounds': []
          })
          upsert_profile(yan_profile)

          for board_name in ('men', 'women'):
              data.get(board_name, []).sort(key=lambda row: (int(row.get('rank', 999)), row.get('fighter', '')))

          ranking_path.write_text(
              '// UFC GOAT base ranking/profile payload.\n'
              '// Main score/stat source for fighter rankings.\n'
              + marker + json.dumps(data, indent=2, ensure_ascii=False) + ';\n',
              encoding='utf-8'
          )

          yan_override = {
              'overallOvr': max(60, min(99, round(75 + (43.35 / 88.7) * 24))),
              'allTimeRank': 16,
              'divisionLabel': 'BW',
              'resumeTag': 'Modern bantamweight title case',
              'oneLiner': 'A modern bantamweight title case with elite skill, strong round control, and unusual DQ context that needs more nuance than a normal loss.',
              'categories': {
                  'championship': {'ovr': 78, 'rank': 20},
                  'opponentQuality': {'ovr': 86, 'rank': 10},
                  'primeDominance': {'ovr': 91, 'rank': 8},
                  'longevity': {'ovr': 82, 'rank': 20}
              },
              'snapshot': [
                  ['UFC Record', '12-4'],
                  ['UFC Title-Fight Wins', '2 adjusted title-win credit'],
                  ['Championship Level', 'Former Bantamweight Champion'],
                  ['Quality Wins', 'Aldo and Sandhagen anchor the case'],
                  ['Prime Record', '7-4 in title/elite window'],
                  ['Active Elite Years', '6.0 Elite Years'],
                  ['Loss Context', 'Sterling DQ and elite-loss context need nuance']
              ],
              'whyRankedHere': 'Yan ranks here because his UFC-only case has real bantamweight title value, strong elite-round control, and enough quality-win/context credit to belong in the all-time conversation rather than being hidden by the messy Sterling rivalry.',
              'whyNotHigher': 'He does not climb higher because the championship volume is limited and the official loss column is heavy for an all-time case, even when several losses have strong context.',
              'keyJudgmentCalls': [
                  ['Sterling DQ', 'treated with special context instead of like a normal competitive title loss.'],
                  ['Sandhagen win', 'important interim-title and elite contender value.'],
                  ['Aldo win', 'vacant title win over an elite former champion, but not prime Aldo at featherweight.'],
                  ['Later losses', 'count against the resume, but without finish add-ons where appropriate.'],
                  ['Bantamweight depth', 'modern bantamweight is treated as a strong division context.']
              ],
              'finalTakeaway': 'Yan is a legit modern bantamweight title case: not a top-tier GOAT resume, but clearly strong enough that he should appear in the ranking and compare mode.'
          }
          display_text = display_path.read_text(encoding='utf-8')
          if 'DISPLAY_OVERRIDES["Petr Yan"]' not in display_text and "DISPLAY_OVERRIDES['Petr Yan']" not in display_text and '"Petr Yan":' not in display_text:
              display_text = display_text.rstrip() + '\n\n// Durable source override for Petr Yan.\nDISPLAY_OVERRIDES["Petr Yan"] = ' + json.dumps(yan_override, indent=2, ensure_ascii=False) + ';\n'
              display_path.write_text(display_text, encoding='utf-8')

          patch_path.write_text('''// Lightweight post-load status hook.\n// Durable GSP, Charles, Ilia, and Petr Yan changes now live in the real source files.\n\n(function () {\n  const data = window.RANKING_DATA;\n  const PATCH_VERSION = 'phase2-source-clean-2026-07-01';\n\n  function refreshStatus() {\n    window.UFC_PHASE2_DATA_STATUS = {\n      version: PATCH_VERSION,\n      mode: 'source-clean',\n      petrYanInMen: !!(data && Array.isArray(data.men) && data.men.some(f => f.fighter === 'Petr Yan')),\n      petrYanInProfiles: !!(data && Array.isArray(data.fighters) && data.fighters.some(f => f.fighter === 'Petr Yan')),\n      appliedAt: new Date().toISOString()\n    };\n    document.documentElement.setAttribute('data-phase2-data-patch', PATCH_VERSION);\n  }\n\n  window.UFC_RANKING_DATA_PATCHES_V1 = {\n    meta: {\n      purpose: 'Post-materialization status hook',\n      note: 'No durable ranking mutations remain here; source files own the fighter data.',\n      updated: '2026-07-01',\n      version: PATCH_VERSION\n    },\n    apply: refreshStatus\n  };\n\n  window.UFC_PHASE2_DATA_REFRESH = refreshStatus;\n  refreshStatus();\n})();\n''', encoding='utf-8')
          PY

      - name: Commit safe data cleanup
        run: |
          if git diff --quiet; then
            echo "No data cleanup changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/ranking-data.js assets/data/display-overrides.js assets/data/ranking-data-patches.js
          git commit -m "Move durable ranking patches into source files"
          git push origin HEAD:modular-refactor-v2-safe
