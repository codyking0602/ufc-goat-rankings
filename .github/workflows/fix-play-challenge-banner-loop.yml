name: Fix Play challenge render loop

on:
  push:
    paths:
      - '.github/workflows/fix-play-challenge-banner-loop.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make challenge rendering idempotent
        run: |
          python - <<'PY'
          from pathlib import Path

          js = Path('assets/js/play-shared-system.js')
          text = js.read_text()

          text = text.replace(
              "const VERSION='play-shared-system-20260715b-generic-adapters';",
              "const VERSION='play-shared-system-20260715g-idempotent-banner';"
          )

          old = """  function renderChallengeBanner(challenge,adapter){
    const host=adapter?.bannerHost?.()||document.querySelector('#play .play-panel:not([hidden])');
    if(!host)return;
    let banner=document.getElementById('playChallengeBanner');
    if(!banner){
      banner=document.createElement('div');
      banner.id='playChallengeBanner';
      banner.className='play-challenge-banner';
    }
    banner.innerHTML=`<span>FRIEND CHALLENGE</span><strong>${esc(challenge.creator_name)} sent you the same ${esc(adapter?.title||'game')} setup.</strong><small>Your result stays private until you finish.</small>`;
    if(banner.parentElement!==host)host.prepend(banner);
  }"""

          new = """  function renderChallengeBanner(challenge,adapter){
    const host=adapter?.bannerHost?.()||document.querySelector('#play .play-panel:not([hidden])');
    if(!host)return;
    const signature=`${challenge?.code||''}|${challenge?.creator_name||''}|${adapter?.id||''}|${adapter?.title||''}`;
    const markup=`<span>FRIEND CHALLENGE</span><strong>${esc(challenge.creator_name)} sent you the same ${esc(adapter?.title||'game')} setup.</strong><small>Your result stays private until you finish.</small>`;
    let banner=document.getElementById('playChallengeBanner');
    if(!banner){
      banner=document.createElement('div');
      banner.id='playChallengeBanner';
      banner.className='play-challenge-banner';
    }
    if(banner.dataset.challengeSignature!==signature){
      banner.dataset.challengeSignature=signature;
      banner.innerHTML=markup;
    }
    if(banner.parentElement!==host)host.prepend(banner);
  }"""

          if old not in text:
              raise SystemExit('Could not find renderChallengeBanner block')
          text = text.replace(old, new)

          old_observer = """    const observer=new MutationObserver(()=>{
      requestAnimationFrame(()=>{
        decorateAdapters();
        submitActiveChallenge();
        submitDailyIfComplete();
        if(activeChallenge&&!activeChallenge.submitted){
          const adapter=adapterFor(activeChallenge.game_type);
          if(adapter)renderChallengeBanner(activeChallenge,adapter);
        }
      });
    });"""

          new_observer = """    let observerFrame=0;
    const observer=new MutationObserver(()=>{
      if(observerFrame)return;
      observerFrame=requestAnimationFrame(()=>{
        observerFrame=0;
        decorateAdapters();
        submitActiveChallenge();
        submitDailyIfComplete();
        if(activeChallenge&&!activeChallenge.submitted){
          const adapter=adapterFor(activeChallenge.game_type);
          if(adapter)renderChallengeBanner(activeChallenge,adapter);
        }
      });
    });"""

          if old_observer not in text:
              raise SystemExit('Could not find shared observer block')
          text = text.replace(old_observer, new_observer)

          text = text.replace("url.searchParams.set('playbuild','20260715f');", "url.searchParams.set('playbuild','20260715g');")
          js.write_text(text)

          index = Path('index.html')
          html = index.read_text()
          html = html.replace('content="20260715-play-challenge-cache-route"', 'content="20260715-play-challenge-banner-loop-fix"')
          html = html.replace('play-shared-system.js?v=play-shared-system-20260715f-new-tab', 'play-shared-system.js?v=play-shared-system-20260715g-idempotent-banner')
          index.write_text(html)
          PY
      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-play-challenge-banner-loop.yml
          git add index.html assets/js/play-shared-system.js
          git commit -m "Stop Play challenge banner render loop"
          git push
# trigger: 20260715g