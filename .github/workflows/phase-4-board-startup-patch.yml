name: Apply Phase 4 Board Startup Patch

on:
  push:
    branches:
      - agent/phase-4-retire-board-startup-retries
    paths:
      - '.github/workflows/phase-4-board-startup-patch.yml'

permissions:
  contents: write

jobs:
  patch-and-prove:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-retire-board-startup-retries
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply exact runtime patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('assets/js/octagon-message-board.js')
          source = path.read_text()
          old_version = "const VERSION='octagon-message-board-20260721d-passive-identity';"
          new_version = "const VERSION='octagon-message-board-20260721e-single-startup-mount-bind';"
          old_retries = "    [50,220,850,2200].forEach(delay=>window.setTimeout(()=>{mount();bindTab();},delay));\n"
          if source.count(old_version) != 1:
              raise SystemExit('Expected one message-board version marker.')
          if source.count(old_retries) != 1:
              raise SystemExit('Expected one delayed mount/bind retry array.')
          source = source.replace(old_version, new_version).replace(old_retries, '')
          path.write_text(source)
          PY
      - name: Validate focused contract
        run: |
          node --check assets/js/octagon-message-board.js
          node --check scripts/test-octagon-board-startup-retry-contract.mjs
          node --check scripts/test-octagon-board-startup-retry-owner.mjs
          node scripts/test-octagon-board-startup-retry-contract.mjs
      - name: Install Chromium test runtime
        run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/phase-4-board-startup-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/phase-4-board-startup-server.log
          exit 1
      - name: Prove board startup boundary
        run: node scripts/test-octagon-board-startup-retry-owner.mjs
      - name: Publish clean runtime patch
        run: |
          rm .github/workflows/phase-4-board-startup-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/octagon-message-board.js
          git add -u .github/workflows/phase-4-board-startup-patch.yml
          git commit -m "Retire repeated War Room board startup retries"
          git push origin HEAD:agent/phase-4-retire-board-startup-retries
