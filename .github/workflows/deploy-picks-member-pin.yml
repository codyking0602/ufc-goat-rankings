name: Deploy Picks Member PIN

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-picks-member-pin.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PIN JavaScript
        run: node --check assets/js/picks-member-pin.js
      - name: Verify migration functions exist
        run: |
          grep -q "picks_member_login_pin" supabase/picks-member-pin-phase.sql
          grep -q "picks_commissioner_set_member_pin" supabase/picks-member-pin-phase.sql
      - name: Wire PIN assets into live page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text()

          css_anchor = '  <link rel="stylesheet" href="assets/css/picks-device-recovery.css?v=picks-device-recovery-20260712d-click-binding" />'
          css_line = '  <link rel="stylesheet" href="assets/css/picks-member-pin.css?v=picks-member-pin-20260712a" />'
          if css_line not in text:
              if css_anchor not in text:
                  raise SystemExit('PIN CSS anchor not found.')
              text = text.replace(css_anchor, css_anchor + '\n' + css_line)

          js_anchor = '  <script src="assets/js/picks-device-recovery.js?v=picks-device-recovery-20260712d-click-binding"></script>'
          js_line = '  <script src="assets/js/picks-member-pin.js?v=picks-member-pin-20260712a"></script>'
          if js_line not in text:
              if js_anchor not in text:
                  raise SystemExit('PIN JS anchor not found.')
              text = text.replace(js_anchor, js_anchor + '\n' + js_line)

          text = re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260712-picks-member-pin-phase1" />',
              text,
              count=1,
          )
          path.write_text(text)
          PY
      - name: Commit deployment
        run: |
          if git diff --quiet -- index.html; then
            echo 'PIN assets already wired.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Deploy Picks member PIN sign-in'
          git push
