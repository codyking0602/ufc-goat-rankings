name: Build Octagon Verdict Data
# Verdict-safe schema rebuild trigger: 2026-07-11

on:
  workflow_run:
    workflows:
      - Runtime Scoring Audit
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'tools/build-octagon-verdict-data.js'
      - '.github/workflows/build-octagon-verdict-data.yml'
  workflow_dispatch:

concurrency:
  group: build-octagon-verdict-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-data:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start app and build live-runtime feed
        run: |
          python3 -m http.server 4173 > /tmp/ufc-octagon-verdict-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          node tools/build-octagon-verdict-data.js

      - name: Commit generated data feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/octagon-verdict-data.json assets/data/octagon-verdict
          if git diff --cached --quiet; then
            echo "No Octagon Verdict data changes to commit."
          else
            git commit -m "Rebuild Octagon Verdict data feed [skip ci]"
            git push
          fi
