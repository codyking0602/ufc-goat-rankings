name: Build Octagon Verdict Data

on:
  push:
    branches:
      - main
    paths:
      - 'assets/data/ranking-data.js'
      - 'assets/data/display-overrides.js'
      - 'assets/data/fighter-packet-manifest.js'
      - 'assets/data/fighter-packets/**'
      - 'tools/build-octagon-verdict-data.js'
      - '.github/workflows/build-octagon-verdict-data.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Octagon Verdict data feed
        run: node tools/build-octagon-verdict-data.js

      - name: Commit generated data feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/octagon-verdict-data.json
          if git diff --cached --quiet; then
            echo "No Octagon Verdict data changes to commit."
          else
            git commit -m "Rebuild Octagon Verdict data feed"
            git push
          fi
