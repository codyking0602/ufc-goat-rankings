name: Export Octagon Verdict JSON (Optional)

on:
  workflow_dispatch:

concurrency:
  group: export-octagon-verdict-json-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  export-json:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out selected revision
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium runtime
        run: |
          npm install --no-save --silent playwright@1.55.0 > /tmp/octagon-json-playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/octagon-json-playwright.log 2>&1

      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/octagon-json-http.log 2>&1 &
          echo $! > /tmp/octagon-json-http.pid

      - name: Export optional JSON package
        run: |
          node tools/build-octagon-verdict-data.js
          node scripts/materialize-octagon-verdict-data.mjs

      - name: Upload optional JSON package
        uses: actions/upload-artifact@v4
        with:
          name: optional-octagon-verdict-json
          path: |
            assets/data/octagon-verdict-data.json
            assets/data/octagon-verdict/
          if-no-files-found: error
