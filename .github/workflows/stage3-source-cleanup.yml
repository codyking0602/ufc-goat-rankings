name: Stage 3 Cache Cleanup

on:
  push:
    branches: [agent/stage3-remove-legacy-scoring]
    paths:
      - 'scripts/stage3-cache-bust.mjs'
      - '.github/workflows/stage3-source-cleanup.yml'

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[stage3 cache]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/stage3-remove-legacy-scoring

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply Stage 3 cache keys
        run: node scripts/stage3-cache-bust.mjs

      - name: Validate JavaScript syntax
        run: |
          node --check assets/data/display-overrides.js
          node --check assets/data/ranking-data-patches.js
          find assets/data/fighter-packets -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Commit cache keys
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/data/ranking-data-patches.js
          git commit -m 'Apply Stage 3 cache keys [stage3 cache]' || exit 0
          git push origin HEAD:agent/stage3-remove-legacy-scoring
