name: Canonical Longevity Reconstruction

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/data/canonical-fighter-facts*.js'
      - 'assets/data/canonical-scoring-records.js'
      - 'assets/data/fighter-era-ledgers.js'
      - 'assets/data/longevity-canonical-recalculation.js'
      - 'assets/data/longevity-shadow-scorer.js'
      - 'assets/data/canonical-longevity-reconstruction.js'
      - 'scripts/test-canonical-longevity-reconstruction.mjs'
      - 'docs/LONGEVITY_RECONSTRUCTION.md'
      - '.github/workflows/canonical-longevity-reconstruction.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconstruct-approved-longevity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check syntax
        run: |
          node --check assets/data/canonical-longevity-reconstruction.js
          node --check scripts/test-canonical-longevity-reconstruction.mjs
      - name: Audit full-roster Longevity model
        run: node scripts/test-canonical-longevity-reconstruction.mjs > /tmp/canonical-longevity-reconstruction.log 2>&1
      - name: Upload Longevity reconstruction report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-longevity-reconstruction-report
          path: |
            /tmp/canonical-longevity-reconstruction.log
            docs/canonical-longevity-reconstruction.json
            docs/canonical-longevity-reconstruction.md
          if-no-files-found: warn
          retention-days: 30
