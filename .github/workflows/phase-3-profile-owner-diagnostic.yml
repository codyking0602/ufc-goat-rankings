name: Phase 3 Profile Owner Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/js/native-app-shell-stability.js'
      - 'scripts/test-native-shell-stability-profile-contract.mjs'
      - 'scripts/test-native-shell-stability-profile-owner.mjs'
      - '.github/workflows/phase-3-profile-owner-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase-3-profile-owner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile-owner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate proof syntax
        run: |
          node --check assets/js/native-app-shell-stability.js
          node --check scripts/test-native-shell-stability-profile-contract.mjs
          node --check scripts/test-native-shell-stability-profile-owner.mjs
      - name: Install browser runtime
        run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/profile-owner-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/profile-owner-server.log
          exit 1
      - name: Test calculated profile ownership
        run: |
          set -o pipefail
          node scripts/test-native-shell-stability-profile-owner.mjs 2>&1 | tee /tmp/native-shell-stability-profile-owner.log
      - name: Upload profile ownership diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-shell-stability-profile-owner-diagnostic
          path: |
            /tmp/native-shell-stability-profile-owner-report.json
            /tmp/native-shell-stability-profile-owner.log
            /tmp/profile-owner-server.log
          if-no-files-found: ignore
