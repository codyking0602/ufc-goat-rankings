name: Blind Rank Phase 5 Audit

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/data/blind-rank-expansion-batch-one.js'
      - 'assets/data/blind-rank-category-architecture.js'
      - 'assets/data/blind-rank-category-ratings.js'
      - 'assets/data/keep-cut-category-ratings.js'
      - 'assets/js/blind-rank.js'
      - 'assets/js/blind-rank-phase-five-tuning.js'
      - 'scripts/apply-blind-rank-phase-five-engine-tuning.py'
      - 'scripts/apply-blind-rank-phase-five-loader.py'
      - 'scripts/run-blind-rank-phase-five-audit.mjs'
      - '.github/workflows/blind-rank-phase-five-audit.yml'
      - 'index.html'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Phase 5 thin-pool tuning
        run: python3 scripts/apply-blind-rank-phase-five-engine-tuning.py
      - name: Apply Phase 5 production loader
        run: python3 scripts/apply-blind-rank-phase-five-loader.py
      - name: Validate tuned JavaScript
        run: |
          node --check assets/js/blind-rank.js
          node --check assets/data/blind-rank-category-architecture.js
          node --check assets/data/blind-rank-expansion-batch-one.js
          node --check assets/js/blind-rank-phase-five-tuning.js
      - name: Install browser audit dependency
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 > /tmp/blind-rank-http.log 2>&1 &
          echo $! > /tmp/blind-rank-http.pid
          sleep 2
      - name: Run 25,000-game production audit
        env:
          BLIND_RANK_GAMES: '25000'
        run: node scripts/run-blind-rank-phase-five-audit.mjs
      - name: Publish audited build and report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/js/blind-rank.js assets/data/blind-rank-category-architecture.js assets/data/blind-rank-phase-five-report.json assets/data/blind-rank-phase-five-report.md
          if git diff --cached --quiet; then
            echo 'Audited build and report unchanged.'
            exit 0
          fi
          git commit -m 'Publish Blind Rank Phase 5 tuned build [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
