name: Repair Division Era Depth Roster

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/era-depth-repair-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repair-division-era-depth-roster
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply permanent roster-dynamic repair
        run: |
          node --check scripts/repair-division-era-depth-roster.mjs
          node scripts/repair-division-era-depth-roster.mjs
          node --check scripts/build-division-era-depth-shadow.mjs
          node --check scripts/run-division-era-depth-shadow.mjs
          node --check scripts/build-division-era-depth-judgment-review.mjs
          node --check scripts/validate-division-era-depth-promotion.mjs
          node --check scripts/runtime-era-depth-audit.mjs
          node --check assets/data/division-era-depth-live.js
          node --check assets/data/division-era-depth-finalizer.js
          node --check scripts/install-division-era-depth-live.mjs

      - name: Upload verified permanent repair
        uses: actions/upload-artifact@v4
        with:
          name: full-roster-era-depth-repair
          path: |
            scripts/build-division-era-depth-shadow.mjs
            scripts/run-division-era-depth-shadow.mjs
            scripts/build-division-era-depth-judgment-review.mjs
            scripts/validate-division-era-depth-promotion.mjs
            scripts/runtime-era-depth-audit.mjs
            assets/data/division-era-depth-live.js
            assets/data/division-era-depth-finalizer.js
            scripts/install-division-era-depth-live.mjs
            .github/workflows/division-era-depth-shadow.yml
          if-no-files-found: error
          retention-days: 1
