name: Repair Division Era Depth Roster

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/era-depth-repair-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-division-era-depth-roster
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply permanent roster-dynamic repair
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('scripts/repair-division-era-depth-roster.mjs')
          s=p.read_text()
          s=s.replace("if(after===before)throw new Error(`No change made to ${path}; source may have drifted.`);","if(after===before){console.log(`already patched ${path}`);return;}")
          p.write_text(s)
          PY
          node --check scripts/repair-division-era-depth-roster.mjs
          node scripts/repair-division-era-depth-roster.mjs
          python3 - <<'PY'
          from pathlib import Path
          p=Path('scripts/run-division-era-depth-shadow.mjs')
          s=p.read_text()
          old='output = output.replaceAll(`\\"${dataset}\\"`, `\\"${canonical}\\"`);'
          new='output = output.replaceAll(JSON.stringify(dataset), JSON.stringify(canonical));'
          if old not in s and new not in s:
              raise SystemExit('Alias replacement source drifted')
          p.write_text(s.replace(old,new))
          PY
          node --check scripts/build-division-era-depth-shadow.mjs
          node --check scripts/run-division-era-depth-shadow.mjs
          node --check scripts/build-division-era-depth-judgment-review.mjs
          node --check scripts/validate-division-era-depth-promotion.mjs
          node --check scripts/runtime-era-depth-audit.mjs
          node --check assets/data/division-era-depth-live.js
          node --check assets/data/division-era-depth-finalizer.js
          node --check scripts/install-division-era-depth-live.mjs

      - name: Upload verified permanent repair
        uses: actions/upload-artifact@v4
        with:
          name: full-roster-era-depth-repair
          path: |
            scripts/build-division-era-depth-shadow.mjs
            scripts/run-division-era-depth-shadow.mjs
            scripts/build-division-era-depth-judgment-review.mjs
            scripts/validate-division-era-depth-promotion.mjs
            scripts/runtime-era-depth-audit.mjs
            assets/data/division-era-depth-live.js
            assets/data/division-era-depth-finalizer.js
            scripts/install-division-era-depth-live.mjs
          if-no-files-found: error
          retention-days: 1

      - name: Publish verified repair branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C agent/era-depth-permanent-repair-output
          git add scripts/build-division-era-depth-shadow.mjs scripts/run-division-era-depth-shadow.mjs scripts/build-division-era-depth-judgment-review.mjs scripts/validate-division-era-depth-promotion.mjs scripts/runtime-era-depth-audit.mjs assets/data/division-era-depth-live.js assets/data/division-era-depth-finalizer.js scripts/install-division-era-depth-live.mjs
          git commit -m 'Fix full-roster Era Depth alias serialization'
          git push --force origin HEAD:refs/heads/agent/era-depth-permanent-repair-output
