# Retry activation after repository workflow queue delay.
name: Activate Better Than subjective game

on:
  push:
    paths:
      - '.github/workflows/activate-better-than-subjective.yml'

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Activate subjective Better Than
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          hub_path = Path('assets/js/play-hub.js')
          hub = hub_path.read_text(encoding='utf-8')
          hub = replace_once(hub,
              "const VERSION='play-hub-20260716e-better-than-mvp';",
              "const VERSION='play-hub-20260716f-better-than-claim-builder';",
              'play hub version')
          hub = replace_once(hub,
              "{id:'better-than',icon:'>',title:'Better Than…',description:'Select every fighter whose UFC-only GOAT resume ranks above the challenge fighter.',status:'PLAY NOW',live:true}",
              "{id:'better-than',icon:'>',title:'Better Than…',description:'Build a claim, choose your number, and name the exact fighters you can defend.',status:'PLAY NOW',live:true}",
              'game card copy')
          hub = replace_once(hub,
              "if(eyebrow)eyebrow.textContent='MODEL TEST';",
              "if(eyebrow)eyebrow.textContent='CLAIM BUILDER';",
              'heading eyebrow')
          hub = replace_once(hub,
              "if(subtitle)subtitle.textContent='Select every fighter whose UFC-only GOAT resume ranks above Charles Oliveira.';",
              "if(subtitle)subtitle.textContent='Build a subjective UFC claim and choose the exact fighters who support it.';",
              'heading subtitle')
          hub_path.write_text(hub, encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index, count = re.subn(r'<meta name="app-build" content="[^"]+"\s*/>', '<meta name="app-build" content="20260716-better-than-subjective-claim" />', index, count=1)
          if count != 1: raise SystemExit(f'app build match {count}')
          replacements = {
              r'assets/css/better-than\.css\?v=[^"\s]+':'assets/css/better-than.css?v=better-than-css-20260716b-subjective-claim-builder',
              r'assets/js/play-hub\.js\?v=[^"\s]+':'assets/js/play-hub.js?v=play-hub-20260716f-better-than-claim-builder',
              r'assets/js/better-than\.js\?v=[^"\s]+':'assets/js/better-than.js?v=better-than-20260716b-subjective-claim-builder',
          }
          for pattern, replacement in replacements.items():
              index, count = re.subn(pattern, replacement, index, count=1)
              if count != 1: raise SystemExit(f'{replacement}: match {count}')
          if 'assets/js/better-than-standalone-share.js' not in index:
              marker = '  <script src="assets/js/play-profile-identity.js?v=play-profile-identity-20260715a"></script>\n'
              index = replace_once(index, marker, marker + '  <script src="assets/js/better-than-standalone-share.js?v=better-than-standalone-share-20260716a-subjective-claim"></script>\n', 'share adapter reference')
          index_path.write_text(index, encoding='utf-8')

          doc_path = Path('docs/PLAY_PRODUCT_DIRECTION.md')
          doc = doc_path.read_text(encoding='utf-8')
          doc = replace_once(doc,
              '- Blind Rank 5\n- Keep 4, Cut 4\n- Build Your Top 10',
              '- Blind Rank 5\n- Keep 4, Cut 4\n- Better Than...\n- Build Your Top 10',
              'subjective examples')
          doc = replace_once(doc,
              '- Blind Resume\n- Better Than...\n- Find the Leader',
              '- Blind Resume\n- Find the Leader',
              'objective examples')
          start = doc.index('### D. Better Than...')
          end = doc.index('### E. Build Your Top 10')
          replacement = '''### D. Better Than...\n\n**Status:** Subjective local claim builder and standalone friend challenge complete.\n\nCore prompt structure:\n\n> I can name 7 fighters better than Charles Oliveira at striking.\n\nThe challenger controls:\n\n- Challenge fighter\n- Debate lens, such as overall, striking, wrestling, grappling, submissions, power, durability, cardio, or UFC-only resume\n- Eligible fighter pool, including the full roster, gender pools, verified UFC divisions, same-division pools, and 205+ division pools\n- Claim count, capped at 15 or the available pool size\n- Exact supporting fighter list\n\nThe responder sees the frozen prompt and challenger's number, chooses their own number, and builds an exact list from the same frozen pool. The challenger's names remain hidden until submission.\n\nComparison should show:\n\n- Both claim counts\n- The narrower claim without declaring an official winner\n- Shared selections\n- Challenger-only selections\n- Responder-only selections\n- List overlap percentage\n- Challenge Back using the same setup\n\nBetter Than is subjective. It must not use model correctness, official scores, or a scored Daily Challenge leaderboard. Community percentages may be added later when enough submissions exist.\n\n'''
          doc = doc[:start] + replacement + doc[end:]
          doc = replace_once(doc,
              '- Blind Resume\n- Better Than...\n- Find the Leader',
              '- Blind Resume\n- Find the Leader',
              'daily rotation')
          marker = '- Challenge Back rematch\n\n---\n\n## Game classification rules'
          better_status = '''- Challenge Back rematch\n\n### Better Than...\n\nStandalone page:\n\n- `better-than-challenge.html?code=XXXXXX`\n\nCurrent behavior:\n\n- Frozen target fighter, debate lens, eligibility pool, and challenger count\n- Frozen eligible fighter snapshots\n- Challenger names hidden until responder submission\n- Responder chooses their own count and exact list\n- Shared, challenger-only, and responder-only comparisons\n- Blue responder section\n- Orange challenger section\n- Yellow agreement/disagreement emphasis\n- No fake winner or model correctness\n- Challenge Back rematch\n\n---\n\n## Game classification rules'''
          doc = replace_once(doc, marker, better_status, 'completed Better Than status')
          doc_path.write_text(doc, encoding='utf-8')
          PY
      - name: Validate subjective game
        run: |
          node --check assets/js/better-than.js
          node --check assets/js/better-than-standalone-share.js
          node --check assets/js/standalone-better-than-challenge.js
          node --check assets/js/play-hub.js
          grep -q "SUBJECTIVE CLAIM BUILDER" assets/js/better-than.js
          grep -q "challengerCount:state.claimCount" assets/js/better-than.js
          grep -q "p_game_type:'better-than'" assets/js/better-than-standalone-share.js
          ! grep -q 'p_score' assets/js/better-than-standalone-share.js
          grep -q "NO OFFICIAL WINNER" assets/js/standalone-better-than-challenge.js
          grep -q 'assets/js/better-than-standalone-share.js?v=better-than-standalone-share-20260716a-subjective-claim' index.html
          grep -q 'better-than-challenge.html?code=XXXXXX' docs/PLAY_PRODUCT_DIRECTION.md
      - name: Commit activation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/activate-better-than-subjective.yml
          git add index.html assets/js/play-hub.js docs/PLAY_PRODUCT_DIRECTION.md
          git commit -m "Activate subjective Better Than challenges"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep $((attempt * 3))
          done
          exit 1