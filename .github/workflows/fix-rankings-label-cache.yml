name: Fix Rankings Label Cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-rankings-label-cache.yml'

permissions:
  contents: write

concurrency:
  group: fix-rankings-label-cache
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch live and deployment asset versions
        run: |
          python - <<'PY'
          from pathlib import Path

          def swap(path, old, new):
              file=Path(path)
              text=file.read_text()
              if old not in text:
                  raise SystemExit(f'Missing expected text in {path}: {old}')
              file.write_text(text.replace(old,new,1))

          swap('index.html',
               'assets/js/octagon-hq-shell.js?v=octagon-hq-shell-20260717c',
               'assets/js/octagon-hq-shell.js?v=app-shell-20260718d-rankings-static')
          swap('index.html',
               'assets/js/octagon-hq-nav-grid.js?v=octagon-hq-nav-grid-20260717g',
               'assets/js/octagon-hq-nav-grid.js?v=octagon-hq-nav-grid-disabled-20260718b')
          swap('index.html',
               'assets/js/app-profile.js?v=app-profile-20260717a',
               'assets/js/app-profile.js?v=app-profile-20260718b-photo-upload')
          swap('index.html',
               'assets/js/product-architecture.js?v=product-architecture-20260718i-profile-release',
               'assets/js/product-architecture.js?v=product-architecture-20260718j-rankings-static')

          swap('.github/workflows/deploy-app-canonical-group.yml',
               'assets/js/octagon-hq-shell.js?v=octagon-hq-shell-20260717c',
               'assets/js/octagon-hq-shell.js?v=app-shell-20260718d-rankings-static')
          swap('.github/workflows/deploy-app-canonical-group.yml',
               'assets/js/octagon-hq-nav-grid.js?v=octagon-hq-nav-grid-20260717g',
               'assets/js/octagon-hq-nav-grid.js?v=octagon-hq-nav-grid-disabled-20260718b')
          swap('.github/workflows/deploy-app-canonical-group.yml',
               'assets/js/app-profile.js?v=app-profile-20260717a',
               'assets/js/app-profile.js?v=app-profile-20260718b-photo-upload')

          swap('.github/workflows/deploy-shared-profile-photos.yml',
               "'product-architecture.js':'product-architecture-20260718i-profile-release'",
               "'product-architecture.js':'product-architecture-20260718j-rankings-static'")
          PY

          node --check assets/js/octagon-hq-nav-grid.js
          node --check assets/js/product-architecture.js
          grep -Fq 'app-shell-20260718d-rankings-static' index.html
          grep -Fq 'octagon-hq-nav-grid-disabled-20260718b' index.html
          grep -Fq 'app-profile-20260718b-photo-upload' index.html
          grep -Fq 'product-architecture-20260718j-rankings-static' index.html

      - name: Publish permanent fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/deploy-app-canonical-group.yml .github/workflows/deploy-shared-profile-photos.yml
          git commit -m 'Make Rankings label and profile assets permanent'
          git pull --rebase origin main
          git push origin HEAD:main
