name: Deploy Phase 3 Visibility Hotfix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-phase3-visibility-hotfix.yml'
      - 'assets/js/app-notification-surface-fix.js'
      - 'assets/js/product-architecture.js'
      - 'sw.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-phase3-visibility-hotfix
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate hotfix
        run: |
          node --check assets/js/app-notification-surface-fix.js
          node --check assets/js/product-architecture.js
          node --check sw.js
          grep -Fq 'app-notification-surface-fix-20260718a' assets/js/app-notification-surface-fix.js
          grep -Fq 'product-architecture-20260718r-notification-surface' assets/js/product-architecture.js
          grep -Fq 'staleNavigation' sw.js

      - name: Wire visible notification card and fast launch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path=Path('index.html')
          text=path.read_text()

          text,count=re.subn(
              r'assets/js/product-architecture\.js\?v=[^"\s]+',
              'assets/js/product-architecture.js?v=product-architecture-20260718r-notification-surface',
              text,
              count=1,
          )
          if count!=1: raise SystemExit('Could not version product-architecture.js')

          text=re.sub(r'\s*<script src="assets/js/app-notification-surface-fix\.js\?v=[^"]+"></script>','',text)
          anchor=re.search(r'(?P<indent>\s*)<script src="assets/js/app-notification-center\.js\?v=[^"]+"></script>',text)
          if not anchor: raise SystemExit('Could not find app-notification-center.js')
          tag='<script src="assets/js/app-notification-surface-fix.js?v=app-notification-surface-fix-20260718a"></script>'
          text=text[:anchor.end()]+anchor.group('indent')+tag+text[anchor.end():]

          text=re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260718-phase-3-visible-alerts-fast-launch" />',
              text,
              count=1,
          )
          text=re.sub(
              r'<link rel="manifest" href="[^"]+"\s*/>',
              '<link rel="manifest" href="manifest.webmanifest?v=phase-3-visible-alerts-fast-launch" />',
              text,
              count=1,
          )
          path.write_text(text)
          PY

          grep -Fq 'product-architecture-20260718r-notification-surface' index.html
          grep -Fq 'app-notification-surface-fix-20260718a' index.html
          grep -Fq '20260718-phase-3-visible-alerts-fast-launch' index.html

      - name: Commit live hotfix
        run: |
          if git diff --quiet -- index.html; then
            echo 'Live hotfix wiring is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Deploy visible alerts and instant cached launch [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
