name: Canonical Fifteen-Woman Batch Nine

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/data/canonical-fighter-facts.js'
      - 'assets/data/canonical-fighter-facts-batch-one.js'
      - 'assets/data/canonical-fighter-facts-batch-two.js'
      - 'assets/data/canonical-fighter-facts-batch-three.js'
      - 'assets/data/canonical-fighter-facts-batch-four.js'
      - 'assets/data/canonical-fighter-facts-batch-five.js'
      - 'assets/data/canonical-fighter-facts-batch-six.js'
      - 'assets/data/canonical-fighter-facts-batch-seven-data-a.js'
      - 'assets/data/canonical-fighter-facts-batch-seven-data-b.js'
      - 'assets/data/canonical-fighter-facts-batch-seven.js'
      - 'assets/data/canonical-fighter-facts-batch-eight-data-a.js'
      - 'assets/data/canonical-fighter-facts-batch-eight-data-b.js'
      - 'assets/data/canonical-fighter-facts-batch-eight.js'
      - 'assets/data/canonical-fighter-facts-batch-nine-data-a.js'
      - 'assets/data/canonical-fighter-facts-batch-nine-data-b.js'
      - 'assets/data/canonical-fighter-facts-batch-nine-data-c.js'
      - 'assets/data/canonical-fighter-facts-batch-nine.js'
      - 'scripts/test-canonical-fighter-facts-fifteen-woman-batch-nine.mjs'
      - '.github/workflows/canonical-batch-nine.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-fifteen-woman-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check syntax
        run: |
          node --check assets/data/canonical-fighter-facts-batch-nine-data-a.js
          node --check assets/data/canonical-fighter-facts-batch-nine-data-b.js
          node --check assets/data/canonical-fighter-facts-batch-nine-data-c.js
          node --check assets/data/canonical-fighter-facts-batch-nine.js
          node --check scripts/test-canonical-fighter-facts-fifteen-woman-batch-nine.mjs
      - name: Verify 220-fight fifteen-woman ledger
        run: node scripts/test-canonical-fighter-facts-fifteen-woman-batch-nine.mjs > /tmp/canonical-batch-nine.log 2>&1
      - name: Upload batch-nine diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-batch-nine-diagnostic
          path: /tmp/canonical-batch-nine.log
          if-no-files-found: warn
          retention-days: 7
