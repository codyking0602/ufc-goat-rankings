name: Rebuild Octagon Verdict index

on:
  pull_request:
    branches:
      - main
    paths:
      - 'assets/data/octagon-verdict/fighters/*.json'
      - 'scripts/rebuild-octagon-verdict-index.mjs'
      - '.github/workflows/rebuild-octagon-verdict-index.yml'
  push:
    branches:
      - main
    paths:
      - 'assets/data/octagon-verdict/fighters/*.json'
      - 'scripts/rebuild-octagon-verdict-index.mjs'
      - '.github/workflows/rebuild-octagon-verdict-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: octagon-verdict-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the triggering revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild and validate aggregate index
        run: node scripts/rebuild-octagon-verdict-index.mjs

      - name: Require a committed aggregate index on pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if ! git diff --quiet -- assets/data/octagon-verdict/index.json; then
            echo 'The aggregate Octagon Verdict index is stale. Run node scripts/rebuild-octagon-verdict-index.mjs and commit index.json.'
            git diff --stat -- assets/data/octagon-verdict/index.json
            exit 1
          fi

      - name: Commit aggregate index when changed on main
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if git diff --quiet -- assets/data/octagon-verdict/index.json; then
            echo 'Aggregate index is already current.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/octagon-verdict/index.json
          git commit -m 'chore: rebuild Octagon Verdict aggregate index'
          git push origin HEAD:main
