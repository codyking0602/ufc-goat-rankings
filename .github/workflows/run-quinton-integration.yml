# Main execution source v5
name: Run Quinton Rampage Jackson Integration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/run-quinton-integration.yml]
  pull_request:
    branches: [main]
    paths: [.github/workflows/run-quinton-integration.yml]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || 'main' }}

      - name: Apply production integration and watch links
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/integrate-quinton-jackson.yml').read_text()
          marker = "python3 - <<'PY'\n"
          body = source.split(marker, 1)[1].split("\n          PY", 1)[0]
          body = body.replace(
              "i=s.rindex('\\n\\n};'); s=s[:i]+OVERRIDE+s[i:]",
              "i=s.rfind('\\n\\n};'); i=i if i>=0 else s.rfind('\\n};');\n              if i<0: raise RuntimeError('display-overrides terminator not found');\n              s=s[:i]+OVERRIDE+s[i:]"
          )
          exec(textwrap.dedent(body), {})

          p = Path('assets/data/royce-watch-links.js')
          s = p.read_text()
          s = s.replace('royce-watch-links-20260716g-tom-aspinall', 'royce-watch-links-20260716h-quinton-rampage-jackson')
          if "'Quinton Jackson':{" not in s:
              anchor = "    'Leon Edwards':{\n"
              block = (
                  "    'Quinton Jackson':{\n"
                  "      watchUrl:'https://youtube.com/shorts/JVSaguPG9nY?is=1ShwPvQ9FoBzYOFK',\n"
                  "      watchLabel:'Watch Moment',\n"
                  "      signatureFightUrl:'https://youtu.be/W3Ce7KPszhU?is=Pzzqz2wACxC7VY6g',\n"
                  "      signatureFightLabel:'Watch Signature Fight'\n"
                  "    },\n"
              )
              if anchor not in s:
                  raise RuntimeError('watch-link insertion anchor not found')
              s = s.replace(anchor, block + anchor, 1)
          p.write_text(s)

          p = Path('index.html')
          s = p.read_text()
          s = s.replace('royce-watch-links-20260715f-weidman', 'royce-watch-links-20260716h-quinton-rampage-jackson')
          p.write_text(s)
          PY

      - name: Validate production sources
        shell: bash
        run: |
          set -euo pipefail
          node --check assets/data/ranking-data.js
          node --check assets/data/display-overrides.js
          node --check assets/data/canonical-roster-batch-twelve.js
          node --check assets/data/royce-watch-links.js
          node --check assets/js/production-ranking-bootstrap.js
          test "$(grep -c '"fighter": "Quinton Jackson"' assets/data/ranking-data.js)" -ge 2
          grep -q '"id": "QJ001"' assets/data/ranking-data.js
          grep -q 'Quinton “Rampage” Jackson' assets/data/display-overrides.js
          grep -q 'EXPECTED_FIGHTER_COUNT=78' assets/js/production-ranking-bootstrap.js
          grep -q 'canonical-roster-batch-twelve-20260716b-quinton-jackson-photos' assets/js/production-ranking-bootstrap.js
          grep -q "photoStatus:'verified'" assets/data/canonical-roster-batch-twelve.js
          grep -q 'JVSaguPG9nY' assets/data/royce-watch-links.js
          grep -q 'W3Ce7KPszhU' assets/data/royce-watch-links.js
          grep -q 'royce-watch-links-20260716h-quinton-rampage-jackson' index.html
          test -s assets/fighters/quinton-jackson.webp
          test -s assets/fighters/quinton-jackson-thumb.webp
          grep -q 'app-build.*quinton-rampage-jackson-78' index.html

      - name: Run production browser audit
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          python3 -m http.server 4173 >/tmp/ufc-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),{chromium}=require('playwright');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const page=await browser.newPage();
            const errors=[];
            page.on('pageerror',e=>errors.push(String(e)));
            await page.goto('http://127.0.0.1:4173/index.html?audit=quinton-jackson',{waitUntil:'load',timeout:120000});
            await page.waitForFunction(()=>['ready','error'].includes(window.UFC_PRODUCTION_RANKING_BOOTSTRAP?.status),null,{timeout:120000});
            const x=await page.evaluate(()=>{
              const b=window.UFC_PRODUCTION_RANKING_BOOTSTRAP||{};
              const men=window.RANKING_DATA?.men||[];
              const women=window.RANKING_DATA?.women||[];
              const row=[...men,...women].find(r=>r.fighter==='Quinton Jackson');
              const links=window.DISPLAY_OVERRIDES?.['Quinton Jackson']||{};
              const divisionReport=window.UFC_DIVISION_RANKING_REPORT||b.divisionReport||{};
              return {
                boot:{status:b.status,error:b.error||null,report:b.report||null},
                row,
                allRows:[...men.map(row=>({group:'men',row})),...women.map(row=>({group:'women',row}))],
                divisionRows:Array.isArray(divisionReport.rows)?divisionReport.rows:[],
                category:window.UFC_CATEGORY_CALCULATORS?.entryFor?.('Quinton Jackson')||null,
                photoSync:window.UFC_CALCULATED_ROSTER_PHOTO_SYNC||null,
                links:{watchUrl:links.watchUrl||'',signatureFightUrl:links.signatureFightUrl||''},
                copy:{shortCase:window.COMPARE_PROFILES?.['Quinton Jackson']?.shortCase||'',whyRankedHere:links.whyRankedHere||'',whyNotHigher:links.whyNotHigher||'',finalTakeaway:links.finalTakeaway||''}
              };
            });
            if(x.boot.status!=='ready'||x.boot.report?.fighterCount!==78)throw Error('bootstrap '+JSON.stringify(x.boot));
            if(!x.row||x.category?.status!=='complete')throw Error('Quinton calculation missing '+JSON.stringify(x.category));
            if(!x.links.watchUrl.includes('JVSaguPG9nY')||!x.links.signatureFightUrl.includes('W3Ce7KPszhU'))throw Error('watch links missing '+JSON.stringify(x.links));
            if(x.allRows.length!==78)throw Error('runtime roster count '+x.allRows.length);
            if(errors.length)throw Error(errors.join(' | '));

            const indexPath='assets/data/octagon-verdict/index.json';
            const fighterDir='assets/data/octagon-verdict/fighters';
            const existing=JSON.parse(fs.readFileSync(indexPath,'utf8'));
            const existingByName=new Map((existing.fighters||[]).map(f=>[f.name,f]));
            const slugify=name=>name.toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
            const boardsFor=name=>x.divisionRows.filter(d=>d.fighter===name&&d.rankEligible).map(d=>({division:d.division,rank:d.rank,divisionScore:d.divisionScore,resumeSharePct:d.resumeSharePct,role:d.role,stats:d.stats,components:d.components,historicalDivisionFallback:false}));

            const fighters=x.allRows.map(({group,row:r})=>{
              const old=existingByName.get(r.fighter)||{};
              const runtimeBoards=boardsFor(r.fighter);
              return {
                slug:old.slug||slugify(r.fighter),
                name:r.fighter,
                group,
                rank:r.rank,
                appOvr:r.overallOvr,
                totalScore:r.totalScore,
                division:r.primaryDivision||r.division||old.division||'',
                divisionBoards:runtimeBoards.length?runtimeBoards:(Array.isArray(old.divisionBoards)?old.divisionBoards:[]),
                tag:r.resumeTag||old.tag||''
              };
            }).sort((a,b)=>(a.group===b.group?0:a.group==='men'?-1:1)||a.rank-b.rank||a.name.localeCompare(b.name));

            const generatedAt=new Date().toISOString();
            const divisions=new Set(fighters.flatMap(f=>f.divisionBoards.map(b=>b.division).filter(Boolean)));
            const rebuilt={...existing,version:generatedAt.slice(0,10),generatedAt,source:'calculated-browser-runtime',fighterCount:fighters.length,divisionBoardCount:divisions.size,fighters};
            fs.writeFileSync(indexPath,JSON.stringify(rebuilt)+'\n');

            const qBoards=boardsFor('Quinton Jackson');
            if(!qBoards.length)throw Error('Quinton division boards missing');
            const r=x.row;
            const q={slug:'quinton-jackson',name:'Quinton Jackson',displayName:'Quinton “Rampage” Jackson',group:'men',rank:r.rank,appOvr:r.overallOvr,totalScore:r.totalScore,categories:{championship:r.championship,opponentQuality:r.opponentQuality,primeDominance:r.primeDominance,longevity:r.longevity,apexPeak:r.apexPeak,lossPenalty:r.penalty,divisionEraDepth:r.eraDepthAdjustment},weightedScoreBreakdown:r.weightedScoreBreakdown,division:r.primaryDivision,divisionBoards:qBoards,tag:r.resumeTag||'High-impact light heavyweight champion',ufcRecord:r.ufcRecord,titleFightWins:r.titleFightWins,adjustedTitleWins:r.adjustedTitleWins,topFiveWins:r.topFiveWins,rankedWins:r.rankedWins,primeRecord:r.primeRecord,roundsWonPct:r.roundsWonPct,finishRatePct:r.finishRatePct,activeEliteYears:r.activeEliteYears,timesFinishedPrime:r.timesFinishedPrime,...x.copy,photoStatus:'verified',photoUrl:'assets/fighters/quinton-jackson.webp',thumbUrl:'assets/fighters/quinton-jackson-thumb.webp',watchUrl:x.links.watchUrl,signatureFightUrl:x.links.signatureFightUrl};
            fs.writeFileSync(path.join(fighterDir,'quinton-jackson.json'),JSON.stringify(q)+'\n');
            fs.mkdirSync('assets/data/octagon-verdict/audits',{recursive:true});
            fs.writeFileSync('assets/data/octagon-verdict/audits/quinton-jackson-runtime-audit.json',JSON.stringify({generatedAt,fighterCount:x.boot.report.fighterCount,productionStatus:x.boot.status,categoryStatus:x.category.status,row:r,divisionBoards:qBoards,photoSync:x.photoSync,watchLinks:x.links,pageErrors:errors},null,2)+'\n');
            console.log(JSON.stringify({rank:q.rank,ovr:q.appOvr,totalScore:q.totalScore,fighterCount:fighters.length,divisionBoards:qBoards.length}));
            await browser.close();
          })().catch(e=>{console.error(e.stack||e);process.exit(1)});
          NODE

      - name: Commit verified production output
        shell: bash
        run: |
          set -euo pipefail
          node -e "const x=require('./assets/data/octagon-verdict/fighters/quinton-jackson.json');if(x.rank!==57||x.appOvr!==86||x.totalScore!==35.91||x.photoStatus!=='verified'||!x.watchUrl||!x.signatureFightUrl||!Array.isArray(x.divisionBoards)||!x.divisionBoards.length)throw Error('invalid Quinton object');console.log(JSON.stringify({rank:x.rank,ovr:x.appOvr,totalScore:x.totalScore}))"
          node -e "const x=require('./assets/data/octagon-verdict/index.json');if(x.fighterCount!==78||x.fighters.length!==78||!x.fighters.some(f=>f.slug==='quinton-jackson'&&f.rank===57))throw Error('index missing Quinton')"
          rm -rf node_modules package.json package-lock.json
          rm -f quinton-browser-audit.log quinton-http-server.log
          rm -f .github/workflows/run-quinton-integration.yml .github/workflows/integrate-quinton-jackson.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete Quinton Rampage Jackson production integration'
          git push origin HEAD:${{ github.head_ref || 'main' }}