name: Apply Home Route Loop Hotfix

on:
  push:
    branches: [fix/remove-home-resume-loop]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remove-home-resume-loop
      - name: Patch route delivery order and cache keys
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('index.html')
          text=path.read_text()
          old_build='<meta name="app-build" content="20260719-ios-resume-home-route" />'
          new_build='<meta name="app-build" content="20260719-home-route-loop-hotfix" />'
          old_route='assets/js/fresh-home-launch.js?v=fresh-home-launch-20260719d-ios-resume-home'
          new_route='assets/js/fresh-home-launch.js?v=fresh-home-launch-20260719e-single-startup-route'
          shell='  <script src="assets/js/octagon-hq-shell.js?v=octagon-hq-shell-20260717c"></script>'
          bootstrap='  <script src="assets/js/fresh-home-route-bootstrap.js?v=fresh-home-route-bootstrap-20260719a"></script>\n'
          assert text.count(old_build)==1
          assert text.count(old_route)==1
          assert text.count(shell)==1
          assert 'fresh-home-route-bootstrap.js' not in text
          text=text.replace(old_build,new_build).replace(old_route,new_route).replace(shell,bootstrap+shell)
          path.write_text(text)
          PY
      - name: Commit hotfix delivery
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Load Home route cleanup before app shell"
          git push origin HEAD:fix/remove-home-resume-loop
