name: Patch Play challenge cache keys

on:
  push:
    paths:
      - '.github/workflows/patch-play-challenge-cache.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust stable Play challenge routing
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          replacements = {
              'content="20260715-paddy-75-watch-links-a"': 'content="20260715-play-challenge-cache-route"',
              'supabase-config.js?v=supabase-config-20260711a': 'supabase-config.js?v=supabase-config-20260715d-stable-once',
              'play-shared-system.js?v=play-shared-system-20260715b-generic': 'play-shared-system.js?v=play-shared-system-20260715e-cache-route',
              'play-challenge-compat.js?v=play-challenge-compat-20260715a': 'play-challenge-compat.js?v=play-challenge-compat-20260715b-full-ready-identity',
              'app-update-watcher.js?v=app-update-watcher-20260715k-paddy-75': 'app-update-watcher.js?v=app-update-watcher-20260715m-cache-route',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected index string: {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Commit index cache-bust
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Cache-bust stable Play challenge routing"
          git push
