name: Phase 3 Drawer Owner Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  patch:
    if: github.head_ref == 'agent/phase-3-retire-drawer-sync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-retire-drawer-sync
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply exact owner patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/phase3-drawer-sync-patch.yml').read_text()
          marker="          python3 - <<'PY'\n"
          start=source.index(marker)+len(marker)
          end=source.index("\n          PY",start)
          lines=source[start:end].splitlines()
          script='\n'.join(line[10:] if line.startswith('          ') else line for line in lines)
          exec(compile(script,'phase3-drawer-sync-patch.py','exec'))
          Path('.github/workflows/phase3-drawer-sync-pr.yml').unlink()
          PY
          node --check assets/js/app.js
          node --check assets/js/calculated-profile-runtime.js
          node --check assets/js/native-app-shell-stability.js
          node --check scripts/test-native-shell-stability-drawer-contract.mjs
          node --check scripts/test-native-shell-stability-drawer-owner.mjs
          node --check scripts/test-ios-standalone-resume-home.mjs
      - name: Commit exact patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Retire drawer body-state repair loop"
          git push origin HEAD:agent/phase-3-retire-drawer-sync
