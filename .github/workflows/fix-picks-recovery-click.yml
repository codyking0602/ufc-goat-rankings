name: Fix Picks Recovery Click

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-picks-recovery-click.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix recovery button binding and bust cache
        run: |
          python - <<'PY'
          from pathlib import Path

          js_path = Path('assets/js/picks-device-recovery.js')
          js = js_path.read_text()
          old = "document.getElementById('picksRecoverProfile')?.addEventListener('click',recoverProfile);"
          new = "card.querySelector('#picksRecoverProfile')?.addEventListener('click',recoverProfile);"
          if old not in js and new not in js:
              raise SystemExit('Expected recovery click binding was not found.')
          js_path.write_text(js.replace(old, new))

          index_path = Path('index.html')
          index = index_path.read_text()
          old_version = 'picks-device-recovery-20260712c-home-entry'
          new_version = 'picks-device-recovery-20260712d-click-binding'
          if old_version not in index and new_version not in index:
              raise SystemExit('Expected recovery cache version was not found.')
          index_path.write_text(index.replace(old_version, new_version))
          PY
      - name: Commit fix
        run: |
          if git diff --quiet -- assets/js/picks-device-recovery.js index.html; then
            echo 'Recovery click fix already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/picks-device-recovery.js index.html
          git commit -m 'Fix in-app Picks recovery button'
          git push