name: Prime Record Data Hotfix

on:
  push:
    branches: [fix/prime-record-data-hotfix]

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/prime-record-data-hotfix
          fetch-depth: 0

      - name: Apply audited Prime Record map
        run: node scripts/one-time-fix-prime-record-map.cjs

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start static app server
        run: |
          python3 -m http.server 4173 > /tmp/ufc-audit-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/audit.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ufc-audit-server.log
          exit 1

      - name: Validate all Prime Records and scoring
        run: |
          node scripts/run-prime-record-source-audit.mjs
          node scripts/run-six-category-audit.mjs

      - name: Commit clean data-only hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout origin/main -- .github/workflows/six-category-runtime-audit.yml
          git restore docs/audits || true
          git clean -fd docs/audits package.json package-lock.json node_modules || true
          git add assets/data/ranking-data.js .github/workflows/six-category-runtime-audit.yml
          git add -u scripts/one-time-fix-prime-record-map.cjs
          git diff --cached --quiet && exit 0
          git commit -m "Correct canonical Prime Record values"
          git push origin HEAD:fix/prime-record-data-hotfix
