name: Apply isolated app tab listener removal

on:
  push:
    branches: [agent/phase-2-app-tab-listener-removal]
    paths:
      - '.github/workflows/phase-2-app-tab-listener-removal-apply.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase-2-app-tab-listener-removal-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2-app-tab-listener-removal
      - name: Remove exact app tab listener
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('assets/js/app.js')
          s=p.read_text()
          start="document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {"
          next_listener="el('search').addEventListener('input', refresh);"
          assert s.count(start)==1, f'start count={s.count(start)}'
          a=s.index(start)
          b=s.index(next_listener,a)
          removed=s[a:b]
          assert "el(btn.dataset.view).classList.add('active-view');" in removed
          assert "refresh();" in removed
          p.write_text(s[:a]+s[b:])
          PY
      - name: Add permanent ownership assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('scripts/test-startup-contract.mjs')
          s=p.read_text()
          anchor="const product=read('assets/js/product-architecture.js');\n"
          guard="const app=read('assets/js/app.js');\nassert.equal(app.includes(\"document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click'\"),false,'app.js must not own primary tab activation; the canonical shell owns route activation.');\n\n"
          assert s.count(anchor)==1, f'contract anchor count={s.count(anchor)}'
          if guard not in s:s=s.replace(anchor,guard+anchor)
          p.write_text(s)
          PY
      - name: Extend startup gate coverage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/startup-architecture-gate.yml')
          s=p.read_text()
          product="      - 'assets/js/product-architecture.js'\n"
          app="      - 'assets/js/app.js'\n"
          assert s.count(product)==2, f'workflow product path count={s.count(product)}'
          if app not in s:s=s.replace(product,product+app)
          anchor="          node --check assets/js/product-architecture.js\n"
          check="          node --check assets/js/app.js\n"
          assert s.count(anchor)==1, f'workflow check anchor count={s.count(anchor)}'
          if check not in s:s=s.replace(anchor,anchor+check)
          p.write_text(s)
          PY
      - name: Validate isolated patch
        run: |
          node --check assets/js/app.js
          node scripts/test-startup-contract.mjs
          ! grep -Fq "document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click'" assets/js/app.js
          git diff --check
      - name: Commit isolated patch
        run: |
          rm .github/workflows/phase-2-app-tab-listener-removal-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/app.js scripts/test-startup-contract.mjs .github/workflows/startup-architecture-gate.yml .github/workflows/phase-2-app-tab-listener-removal-apply.yml
          git commit -m "Remove legacy app tab route listener"
          git push origin HEAD:agent/phase-2-app-tab-listener-removal
