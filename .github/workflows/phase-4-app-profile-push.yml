name: Apply Phase 4 App Profile Patch On Push

on:
  push:
    branches:
      - agent/phase-4-defer-profile-group-snapshot

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-defer-profile-group-snapshot
          fetch-depth: 0
      - name: Apply reviewed patch
        shell: bash
        run: |
          cat > /tmp/phase4-profile.patch.gz.b64 <<'PATCH'

PATCH
          base64 --decode /tmp/phase4-profile.patch.gz.b64 | gzip --decompress > /tmp/phase4-profile.patch
          patch -p1 < /tmp/phase4-profile.patch
          rm -f .github/workflows/phase-4-app-profile-source.yml .github/workflows/phase-4-app-profile-push.yml
          node --check assets/js/app-profile.js
          node --check scripts/test-app-profile-group-snapshot-contract.mjs
          node --check scripts/test-app-profile-group-snapshot-single.mjs
          node scripts/test-app-profile-group-snapshot-contract.mjs
      - name: Commit reviewed patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Defer profile group snapshot until editor use'
          git push origin HEAD:agent/phase-4-defer-profile-group-snapshot
