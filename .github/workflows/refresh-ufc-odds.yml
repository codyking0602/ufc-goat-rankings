name: Sync UFC Card and Odds

on:
  push:
    # Card-source or automation changes should update Supabase immediately.
    branches:
      - main
    paths:
      - 'config/ufc-card-sources.json'
      - 'assets/data/picks-events.js'
      - 'scripts/apply-maintained-ufc-baselines.mjs'
      - 'scripts/sync-ufc-card.mjs'
      - '.github/workflows/refresh-ufc-odds.yml'
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-ufc-card-and-odds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ODDS_REFRESH_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
      PROJECT_REF: hdkjwezaswhisxupxydc
      CARD_SYNC_ENDPOINT: https://hdkjwezaswhisxupxydc.supabase.co/functions/v1/sync-ufc-card
      CARD_SYNC_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
    steps:
      - name: Check required secret
        shell: bash
        run: test -n "$ODDS_REFRESH_SECRET" || { echo "Missing ODDS_REFRESH_SECRET"; exit 1; }

      - name: Advance groups using current event data
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-preflight"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply maintained repository card baseline
        id: maintained_baseline
        shell: bash
        run: |
          mkdir -p artifacts/ufc-card-sync
          set -o pipefail
          node scripts/apply-maintained-ufc-baselines.mjs --apply 2>&1 | tee artifacts/ufc-card-sync/maintained-baseline-console.log

      - name: Install Playwright
        shell: bash
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Sync confirmed external UFC card
        id: card_sync
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/sync-ufc-card.mjs --apply 2>&1 | tee artifacts/ufc-card-sync/card-sync-console.log

      - name: Publish card-sync health
        if: always()
        env:
          BASELINE_OUTCOME: ${{ steps.maintained_baseline.outcome }}
          SYNC_OUTCOME: ${{ steps.card_sync.outcome }}
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const path=require('node:path');
          const readReport=(filename,key)=>{
            const reportPath=path.join('artifacts','ufc-card-sync',filename);
            if(!fs.existsSync(reportPath))return[];
            try{return JSON.parse(fs.readFileSync(reportPath,'utf8'))[key]||[];}catch(_error){return[];}
          };
          const baseline=readReport('maintained-baseline-report.json','report');
          const external=readReport('card-sync-report.json','report');
          const logPath=path.join('artifacts','ufc-card-sync','card-sync-console.log');
          const baselineOutcome=process.env.BASELINE_OUTCOME||'unknown';
          const externalOutcome=process.env.SYNC_OUTCOME||'unknown';
          const health={
            outcome:baselineOutcome==='success'?(externalOutcome==='success'?'success':'baseline-safe-external-unavailable'):'failure',
            baselineOutcome,
            externalOutcome,
            baselines:baseline.map(row=>({
              eventId:row.eventId,
              fights:row.fights,
              mainCardFights:row.mainCardFights,
              confirmationHash:row.confirmationHash,
              synced:Boolean(row.result?.synced),
              skipped:Boolean(row.result?.skipped),
              sectionAuthority:row.result?.summary?.sectionAuthority||null,
              promotions:row.result?.summary?.promotions??null,
              demotions:row.result?.summary?.demotions??null,
              picksReset:row.result?.summary?.picksReset??null
            })),
            events:external.map(row=>({
              eventId:row.eventId,
              sourceType:row.sourceType,
              sourceUrl:row.sourceUrl,
              fights:row.fights,
              confirmationHash:row.confirmationHash,
              synced:Boolean(row.result?.synced),
              fightsReceived:row.result?.summary?.fightsReceived??null,
              pickableFightsReceived:row.result?.summary?.pickableFightsReceived??null,
              sectionAuthority:row.result?.summary?.sectionAuthority||null
            }))
          };
          if(externalOutcome!=='success'&&fs.existsSync(logPath)){
            health.externalError=fs.readFileSync(logPath,'utf8').trim().split('\n').slice(-20).join('\n');
          }
          fs.mkdirSync(path.join('assets','data'),{recursive:true});
          fs.writeFileSync(path.join('assets','data','picks-sync-health.json'),JSON.stringify(health,null,2)+'\n');
          NODE

      - name: Advance permanent groups to next event
        if: always()
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-github-schedule"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event"

      - name: Refresh current UFC odds
        id: odds_refresh
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ufc-odds-refresh
          set -o pipefail
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-odds-refresh-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-github-schedule"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/refresh-ufc-odds" \
            | tee artifacts/ufc-odds-refresh/odds-refresh-response.json

      - name: Publish odds-refresh health
        if: always()
        env:
          ODDS_OUTCOME: ${{ steps.odds_refresh.outcome }}
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const path=require('node:path');
          const responsePath=path.join('artifacts','ufc-odds-refresh','odds-refresh-response.json');
          let response={};
          if(fs.existsSync(responsePath)){
            try{response=JSON.parse(fs.readFileSync(responsePath,'utf8'));}
            catch(error){response={parseError:error.message,raw:fs.readFileSync(responsePath,'utf8').slice(0,4000)};}
          }
          const health={
            outcome:process.env.ODDS_OUTCOME||'unknown',
            provider:response.provider||null,
            sport:response.sport||null,
            activeEvents:response.activeEvents??null,
            scheduledFights:response.scheduledFights??null,
            providerEvents:response.providerEvents??null,
            matched:response.matched??null,
            updated:response.updated??null,
            reconciled:Array.isArray(response.reconciled)?response.reconciled:[],
            missing:Array.isArray(response.missing)?response.missing:[],
            failures:Array.isArray(response.failures)?response.failures:[],
            quota:response.quota||null,
            refreshedAt:response.refreshedAt||new Date().toISOString(),
            error:response.error||response.detail||response.parseError||null
          };
          fs.mkdirSync(path.join('assets','data'),{recursive:true});
          fs.writeFileSync(path.join('assets','data','picks-odds-health.json'),JSON.stringify(health,null,2)+'\n');
          NODE

      - name: Commit sync health
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/picks-sync-health.json assets/data/picks-odds-health.json
          if ! git diff --cached --quiet; then
            git commit -m "Record UFC card and odds sync health [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Upload sync evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-card-and-odds-sync-${{ github.run_id }}
          path: |
            artifacts/ufc-card-sync
            artifacts/ufc-odds-refresh
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail when odds refresh request failed
        if: always() && steps.odds_refresh.outcome != 'success'
        shell: bash
        run: exit 1
