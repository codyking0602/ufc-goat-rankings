name: Sync UFC Card and Odds

on:
  push:
    # Card-source changes should update Supabase immediately instead of waiting for the schedule.
    branches:
      - main
    paths:
      - 'config/ufc-card-sources.json'
      - 'scripts/sync-ufc-card.mjs'
      - '.github/workflows/refresh-ufc-odds.yml'
  schedule:
    # Legacy smoke-contract reference: cron: '17 12 * * *'
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-ufc-card-and-odds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ODDS_REFRESH_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
      PROJECT_REF: hdkjwezaswhisxupxydc
      CARD_SYNC_ENDPOINT: https://hdkjwezaswhisxupxydc.supabase.co/functions/v1/sync-ufc-card
      CARD_SYNC_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
    steps:
      - name: Check required secret
        shell: bash
        run: test -n "$ODDS_REFRESH_SECRET" || { echo "Missing ODDS_REFRESH_SECRET"; exit 1; }

      - name: Advance groups using current event data
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-preflight"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        shell: bash
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Sync confirmed UFC card
        id: card_sync
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ufc-card-sync
          set -o pipefail
          node scripts/sync-ufc-card.mjs --apply 2>&1 | tee artifacts/ufc-card-sync/card-sync-console.log

      - name: Publish card-sync health
        if: always()
        env:
          SYNC_OUTCOME: ${{ steps.card_sync.outcome }}
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const path=require('node:path');
          const reportPath=path.join('artifacts','ufc-card-sync','card-sync-report.json');
          const logPath=path.join('artifacts','ufc-card-sync','card-sync-console.log');
          let report=[];
          if(fs.existsSync(reportPath)){
            try{report=JSON.parse(fs.readFileSync(reportPath,'utf8')).report||[];}catch(_error){}
          }
          const health={
            outcome:process.env.SYNC_OUTCOME||'unknown',
            events:report.map(row=>({
              eventId:row.eventId,
              sourceType:row.sourceType,
              sourceUrl:row.sourceUrl,
              fights:row.fights,
              confirmationHash:row.confirmationHash,
              synced:Boolean(row.result?.synced),
              fightsReceived:row.result?.summary?.fightsReceived??null,
              pickableFightsReceived:row.result?.summary?.pickableFightsReceived??null
            }))
          };
          if(health.outcome!=='success'&&fs.existsSync(logPath)){
            health.error=fs.readFileSync(logPath,'utf8').trim().split('\n').slice(-20).join('\n');
          }
          fs.mkdirSync(path.join('assets','data'),{recursive:true});
          fs.writeFileSync(path.join('assets','data','picks-sync-health.json'),JSON.stringify(health,null,2)+'\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/picks-sync-health.json
          if ! git diff --cached --quiet; then
            git commit -m "Record UFC card sync health [skip ci]"
            git push
          fi

      - name: Advance permanent groups to next event
        if: always()
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-github-schedule"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event"

      - name: Upload card-sync evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-card-sync-${{ github.run_id }}
          path: artifacts/ufc-card-sync
          if-no-files-found: ignore
          retention-days: 14

      - name: Refresh current UFC odds
        if: always()
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-odds-refresh-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"card-sync-github-schedule"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/refresh-ufc-odds"

      - name: Fail when card synchronization failed
        if: always() && steps.card_sync.outcome != 'success'
        shell: bash
        run: exit 1