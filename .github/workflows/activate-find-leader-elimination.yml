# Trigger elimination activation.
name: Activate Find the Leader elimination game

on:
  push:
    paths:
      - '.github/workflows/activate-find-leader-elimination.yml'

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Activate elimination game
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def one(text, old, new, label):
              count=text.count(old)
              if count!=1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old,new,1)

          hub_path=Path('assets/js/play-hub.js')
          hub=hub_path.read_text(encoding='utf-8')
          hub=one(hub,"const VERSION='play-hub-20260716g-find-leader-local';","const VERSION='play-hub-20260716h-find-leader-elimination';",'hub version')
          hub=one(hub,"{id:'find-leader',icon:'#1',title:'Find the Leader',description:'Search the full roster and identify the leader in five verified UFC stat categories.',status:'PLAY NOW',live:true}","{id:'find-leader',icon:'#1',title:'Find the Leader',description:'Eliminate nine fighters without removing the verified stat leader. One fatal pick ends the run.',status:'PLAY NOW',live:true}",'hub card')
          hub=one(hub,"if(subtitle)subtitle.textContent='Find the fighter who leads each verified UFC-only stat before your points disappear.';","if(subtitle)subtitle.textContent='Eliminate the non-leaders one by one. Pick the stat leader and your run ends.';",'hub subtitle')
          hub_path.write_text(hub,encoding='utf-8')

          index_path=Path('index.html')
          index=index_path.read_text(encoding='utf-8')
          index,count=re.subn(r'<meta name="app-build" content="[^"]+"\s*/>','<meta name="app-build" content="20260716-find-leader-elimination" />',index,count=1)
          if count!=1: raise SystemExit(f'app build: {count}')
          index,count=re.subn(r'assets/css/find-leader\.css\?v=[^"\s]+','assets/css/find-leader.css?v=find-leader-css-20260716b-elimination',index,count=1)
          if count!=1: raise SystemExit(f'find leader css: {count}')
          index,count=re.subn(r'assets/js/play-hub\.js\?v=[^"\s]+','assets/js/play-hub.js?v=play-hub-20260716h-find-leader-elimination',index,count=1)
          if count!=1: raise SystemExit(f'hub cache: {count}')
          index,count=re.subn(r'assets/js/find-leader\.js\?v=[^"\s]+','assets/js/find-leader.js?v=find-leader-20260716b-elimination-challenge',index,count=1)
          if count!=1: raise SystemExit(f'find leader js: {count}')
          bank='  <script src="assets/data/find-leader-question-bank.js?v=find-leader-question-bank-20260716b-elimination"></script>\n'
          find_script='  <script src="assets/js/find-leader.js?v=find-leader-20260716b-elimination-challenge"></script>\n'
          if bank not in index:
              index=one(index,find_script,bank+find_script,'question bank reference')
          share='  <script src="assets/js/find-leader-standalone-share.js?v=find-leader-standalone-share-20260716a-elimination"></script>\n'
          if share not in index:
              marker='  <script src="assets/js/play-profile-identity.js?v=play-profile-identity-20260715a"></script>\n'
              index=one(index,marker,marker+share,'share adapter reference')
          index_path.write_text(index,encoding='utf-8')

          doc_path=Path('docs/PLAY_PRODUCT_DIRECTION.md')
          doc=doc_path.read_text(encoding='utf-8')
          completed_marker='''- No fake winner or model correctness
- Challenge Back rematch

---

## Game classification rules'''
          completed='''- No fake winner or model correctness
- Challenge Back rematch

### Find the Leader

Standalone page:

- `find-leader-challenge.html?code=XXXXXX`

Current behavior:

- One verified question with exactly ten frozen fighter cards
- Exact tile order shared by both players
- One unique stat leader
- Players eliminate one non-leader per round
- A fatal leader elimination ends the run and sets the round score
- Leaving the leader standing earns a Perfect 10
- Challenger score is visible, but their elimination path stays hidden
- Higher round wins with no speed tiebreaker
- Comparison reveals both elimination orders, fatal picks, and full stat values
- Challenge Back rematch

---

## Game classification rules'''
          doc=one(doc,completed_marker,completed,'completed challenge status')
          start=doc.index('### F. Find the Leader')
          end=doc.index('### G. Daily Game Rotation')
          roadmap='''### F. Find the Leader

**Status:** Local elimination game and standalone friend challenge complete. Daily Challenge is not yet enabled.

Core game loop:

> Who has the most UFC title-fight wins since 2018?

- Show exactly ten fighter cards.
- The player eliminates one fighter who is not the leader each round.
- Safe eliminations lock, fade, and reveal that fighter's verified value.
- Eliminating the leader ends the run immediately.
- The fatal round is the player's score.
- Eliminating all nine non-leaders and leaving the leader standing earns a Perfect 10.
- Higher round wins; speed is never a tiebreaker.

Friend challenges freeze the question, fighter snapshots, verified values, unique leader, exact tile order, challenger score, and challenger elimination result. The responder sees the score to beat but not the challenger's elimination path until submitting.

The question bank is generated from complete canonical UFC fight ledgers. A question is excluded unless it produces at least ten eligible fighters and one unique global leader. Initial ledger-derived question definitions include:

- Most UFC title-fight wins since 2018
- Most UFC wins since 2020
- Most UFC finishes since 2019
- Most UFC submission wins since 2015
- Most UFC KO/TKO wins since 2015

Do not add a question that depends on incomplete, estimated, or presentation-only statistics.

'''
          doc=doc[:start]+roadmap+doc[end:]
          doc_path.write_text(doc,encoding='utf-8')
          PY
      - name: Validate elimination game
        run: |
          node --check assets/data/find-leader-question-bank.js
          node --check assets/js/find-leader.js
          node --check assets/js/find-leader-standalone-share.js
          node --check assets/js/standalone-find-leader-challenge.js
          node --check assets/js/play-hub.js
          grep -q "Who has the most UFC title-fight wins since 2018?" assets/data/find-leader-question-bank.js
          grep -q "setup.challengerScore=completed.score" assets/js/find-leader.js
          grep -q "p_game_type:'find-leader'" assets/js/find-leader-standalone-share.js
          grep -q "p_score:completed.score" assets/js/standalone-find-leader-challenge.js
          grep -q "NO SPEED TIEBREAKER" assets/js/standalone-find-leader-challenge.js
          grep -q 'assets/data/find-leader-question-bank.js?v=find-leader-question-bank-20260716b-elimination' index.html
          grep -q 'assets/js/find-leader-standalone-share.js?v=find-leader-standalone-share-20260716a-elimination' index.html
          grep -q 'find-leader-challenge.html?code=XXXXXX' docs/PLAY_PRODUCT_DIRECTION.md
          ! grep -Eq 'play_create_challenge|play_submit_challenge|\.rpc\(' assets/data/find-leader-question-bank.js assets/js/find-leader.js
          node <<'NODE'
          global.window=global;
          global.document={documentElement:{setAttribute(){}}};
          const records=[];
          for(let i=0;i<12;i++){
            const wins=i===0?8:Math.max(0,7-i);
            records.push({fighter:`Fighter ${i+1}`,board:'men',coverage:{complete:true},fights:Array.from({length:wins},(_,j)=>({date:'2019-01-01',scoringDisposition:'count-win',championshipContext:{type:'normal',fighterEligible:true},method:{category:j%2?'submission':'ko-tko'}}))});
          }
          window.UFC_CANONICAL_FIGHTER_FACTS={count:()=>records.length,list:()=>records,rules:{championshipTypes:{normal:{officialTitleFight:true},none:{officialTitleFight:false}}}};
          window.UFC_PLAY_DATA={rebuild(){},resolve(name){return{id:name.toLowerCase().replace(/ /g,'-'),name,primaryDivision:'Lightweight',divisions:['Lightweight']};}};
          require('./assets/data/find-leader-question-bank.js');
          const setup=window.UFC_FIND_LEADER_QUESTION_BANK.create('title-fight-wins-since-2018',()=>0.5);
          if(!setup||setup.candidates.length!==10||setup.leaderValue!==8)throw new Error('Synthetic question-bank validation failed.');
          NODE
      - name: Commit activation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/activate-find-leader-elimination.yml
          git add index.html assets/js/play-hub.js docs/PLAY_PRODUCT_DIRECTION.md
          git commit -m "Activate Find the Leader elimination challenges"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep $((attempt * 3))
          done
          exit 1
