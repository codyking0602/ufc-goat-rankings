name: Deploy UFC GOAT Rankings

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='ufc_goat_rankings_github_pages_ready.zip' \
            --exclude='tmp.txt' \
            --exclude='tmp-test.txt' \
            --exclude='assets/fighters/test-binary-as-text.txt'
          find _site -maxdepth 3 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
