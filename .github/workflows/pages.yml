name: Deploy UFC GOAT Rankings

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='ufc_goat_rankings_github_pages_ready.zip' \
            --exclude='tmp.txt' \
            --exclude='tmp-test.txt' \
            --exclude='assets/fighters/test-binary-as-text.txt'
          python - <<'PY'
          from pathlib import Path
          index = Path('_site/index.html')
          marker = (
              '  <script src="assets/compare-data.js?v=compare-data-20260630a"></script>\n'
              '  <script src="assets/compare-coverage-pack-1.js?v=compare-coverage-pack-1-20260630a"></script>\n'
              '  <script src="assets/compare-coverage-pack-2.js?v=compare-coverage-pack-2-20260630a"></script>\n'
              '  <script src="assets/compare-phase2-yan.js?v=compare-phase2-yan-20260701a"></script>\n'
              '  <script src="assets/compare-mode.js?v=special-matchups-20260630l"></script>\n'
              '  <script src="assets/compare-engine-v1-5.js?v=compare-engine-v1-5-20260630b"></script>\n'
              '  <script src="assets/compare-copy-fixes-v1.js?v=compare-copy-fixes-v1-20260630a"></script>\n'
          )
          html = index.read_text(encoding='utf-8')
          # Remove any older injected Compare Mode scripts so cache-busting versions always win.
          lines = [
              line for line in html.splitlines()
              if 'assets/compare-data.js' not in line
              and 'assets/compare-coverage-pack-1.js' not in line
              and 'assets/compare-coverage-pack-2.js' not in line
              and 'assets/compare-phase2-yan.js' not in line
              and 'assets/compare-copy-fixes-v1.js' not in line
              and 'assets/compare-profiles.js' not in line
              and 'assets/compare-profile-enhancements-v1-1.js' not in line
              and 'assets/compare-title-prime-v1-2.js' not in line
              and 'assets/compare-legacy-stats-v1-3.js' not in line
              and 'assets/compare-fight-ledger-v1-2.js' not in line
              and 'assets/compare-mode.js' not in line
              and 'assets/compare-angle-engine-v1.js' not in line
              and 'assets/compare-angle-engine-v1-1.js' not in line
              and 'assets/compare-engine-v1-2.js' not in line
              and 'assets/compare-engine-v1-3.js' not in line
              and 'assets/compare-engine-v1-4.js' not in line
              and 'assets/compare-engine-v1-5.js' not in line
          ]
          html = '\n'.join(lines)
          html = html.replace('</body>', marker + '</body>')
          index.write_text(html, encoding='utf-8')
          PY
          find _site -maxdepth 3 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
