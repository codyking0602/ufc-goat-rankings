name: Deploy UFC GOAT Rankings

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '*.html'
      - 'assets/**'
      - 'scripts/generate-octagon-verdict-knowledge.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Octagon Verdict knowledge pack
        run: |
          node scripts/generate-octagon-verdict-knowledge.mjs \
            --output octagon-verdict-knowledge.md \
            --json-output octagon-verdict-data.json

      - name: Commit refreshed knowledge artifacts
        run: |
          if [ -n "$(git status --porcelain -- octagon-verdict-knowledge.md octagon-verdict-data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add octagon-verdict-knowledge.md octagon-verdict-data.json
            git commit -m "Refresh Octagon Verdict knowledge [skip ci]"
            git push
          else
            echo "Octagon Verdict knowledge artifacts are already current."
          fi

      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='ufc_goat_rankings_github_pages_ready.zip' \
            --exclude='tmp.txt' \
            --exclude='tmp-test.txt' \
            --exclude='assets/fighters/test-binary-as-text.txt'
          find _site -maxdepth 3 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
          reporting_interval: 10000
