name: Runtime Scoring Audit

# Verifies the canonical scoring pipeline, live hybrid Loss Context, and live Division-Era Depth adjustment.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'scripts/runtime-loss-context-audit.mjs'
      - 'scripts/runtime-era-depth-audit.mjs'
      - '.github/workflows/runtime-scoring-audit.yml'
  workflow_dispatch:

concurrency:
  group: runtime-scoring-audit
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scoring-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        id: syntax_audit
        continue-on-error: true
        run: |
          mkdir -p artifacts
          : > artifacts/js-syntax-audit.txt
          FAILED=0
          while IFS= read -r file; do
            if ! node --check "$file" >> artifacts/js-syntax-audit.txt 2>&1; then
              echo "SYNTAX_FAILURE: $file" | tee -a artifacts/js-syntax-audit.txt
              FAILED=1
            fi
          done < <(find assets scripts -type f \( -name '*.js' -o -name '*.mjs' \) | sort)
          if [ "$FAILED" -ne 0 ]; then exit 1; fi
          echo 'All JavaScript syntax checks passed.' >> artifacts/js-syntax-audit.txt

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Run app and scoring audits
        id: runtime_audit
        continue-on-error: true
        run: |
          python3 -m http.server 4173 > /tmp/ufc-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          node scripts/runtime-loss-context-audit.mjs
          node scripts/runtime-era-depth-audit.mjs

      - name: Upload runtime reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scoring-runtime-report
          path: |
            artifacts/loss-context-runtime-report.json
            artifacts/loss-context-runtime-summary.json
            artifacts/loss-context-hybrid-judgment-review.json
            artifacts/division-era-depth-runtime-report.json
            artifacts/division-era-depth-runtime-summary.json
            artifacts/js-syntax-audit.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Publish runtime reports
        if: always()
        run: |
          REQUIRED=(
            artifacts/loss-context-runtime-report.json
            artifacts/loss-context-runtime-summary.json
            artifacts/loss-context-hybrid-judgment-review.json
            artifacts/division-era-depth-runtime-report.json
            artifacts/division-era-depth-runtime-summary.json
          )
          for file in "${REQUIRED[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing runtime report: $file"
              exit 1
            fi
          done
          mkdir -p docs
          cp artifacts/loss-context-runtime-report.json docs/loss-context-runtime-report.json
          cp artifacts/loss-context-runtime-summary.json docs/loss-context-runtime-summary.json
          cp artifacts/loss-context-hybrid-judgment-review.json docs/loss-context-hybrid-judgment-review.json
          cp artifacts/division-era-depth-runtime-report.json docs/division-era-depth-runtime-report.json
          cp artifacts/division-era-depth-runtime-summary.json docs/division-era-depth-runtime-summary.json
          cp artifacts/js-syntax-audit.txt docs/js-syntax-audit.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/loss-context-runtime-report.json docs/loss-context-runtime-summary.json docs/loss-context-hybrid-judgment-review.json docs/division-era-depth-runtime-report.json docs/division-era-depth-runtime-summary.json docs/js-syntax-audit.txt
          git commit -m 'Record runtime scoring audit [skip ci]' || true
          git push

      - name: Enforce clean audits
        if: steps.syntax_audit.outcome != 'success' || steps.runtime_audit.outcome != 'success'
        run: exit 1
