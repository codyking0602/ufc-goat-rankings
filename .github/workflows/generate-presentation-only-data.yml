name: Generate Presentation-Only Data

on:
  push:
    branches:
      - agent/fighter-data-phase-1
    paths:
      - 'assets/data/display-overrides.js'
      - 'assets/compare-data.js'
      - 'docs/scoring-architecture-contract.json'
      - 'scripts/generate-presentation-only-data.mjs'
      - '.github/workflows/generate-presentation-only-data.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate cleaned presentation files
        run: node scripts/generate-presentation-only-data.mjs | tee /tmp/presentation-cleanup-report.json
      - name: Verify generated syntax
        run: |
          node --check assets/data/display-overrides.js
          node --check assets/compare-data.js
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: presentation-only-data-cleanup
          path: |
            assets/data/display-overrides.js
            assets/compare-data.js
            /tmp/presentation-cleanup-report.json
          if-no-files-found: error
          retention-days: 3
