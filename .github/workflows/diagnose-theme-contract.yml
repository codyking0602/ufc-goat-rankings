name: Diagnose Theme Contract

on:
  push:
    branches:
      - feature/play-challenge-center
    paths:
      - .github/workflows/diagnose-theme-contract.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/play-challenge-center
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium
      - run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/theme-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then break; fi
            sleep 1
          done
          node scripts/test-dark-mobile-shell-theme.mjs > .theme-diagnostic.txt 2>&1 || true
      - name: Publish diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add .theme-diagnostic.txt
          git commit -m "Publish theme contract diagnostic" || exit 0
          git push origin HEAD:feature/play-challenge-center
