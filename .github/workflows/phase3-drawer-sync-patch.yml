name: Phase 3 Drawer State Patch

on:
  push:
    branches:
      - agent/phase-3-retire-drawer-sync

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-retire-drawer-sync
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Move drawer state to canonical owners
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace(path, old, new, count=1):
              p=Path(path)
              text=p.read_text()
              if text.count(old) < count:
                  raise SystemExit(f"Expected replacement not found in {path}: {old[:100]!r}")
              p.write_text(text.replace(old,new,count))

          replace('assets/js/app.js',
          "  el('drawer').classList.add('open');\n  el('drawer').setAttribute('aria-hidden','false');\n  const panel = document.querySelector('.drawer-panel');",
          "  el('drawer').classList.add('open');\n  el('drawer').setAttribute('aria-hidden','false');\n  document.body.classList.add('fighter-profile-open');\n  const panel = document.querySelector('.drawer-panel');")

          replace('assets/js/app.js',
          "el('closeDrawer').addEventListener('click', () => { el('drawer').classList.remove('open'); el('drawer').setAttribute('aria-hidden','true'); });",
          "el('closeDrawer').addEventListener('click', () => { el('drawer').classList.remove('open'); el('drawer').setAttribute('aria-hidden','true'); document.body.classList.remove('fighter-profile-open'); });")

          replace('assets/js/calculated-profile-runtime.js',
          "      const drawer=document.getElementById('drawer');\n      drawer?.classList.add('open');\n      drawer?.setAttribute('aria-hidden','false');\n      const panel=document.querySelector('.drawer-panel');",
          "      const drawer=document.getElementById('drawer');\n      drawer?.classList.add('open');\n      drawer?.setAttribute('aria-hidden','false');\n      document.body.classList.add('fighter-profile-open');\n      const panel=document.querySelector('.drawer-panel');")

          Path('assets/js/native-app-shell-stability.js').write_text("""(function(){
  'use strict';

  if(window.__UFC_NATIVE_APP_SHELL_STABILITY_STARTED__)return;
  window.__UFC_NATIVE_APP_SHELL_STABILITY_STARTED__=true;

  const VERSION='native-app-shell-stability-20260721e-drawer-owner';

  function closeFighterProfile(){
    const drawer=document.getElementById('drawer');
    if(!drawer?.classList.contains('open'))return false;
    const close=document.getElementById('closeDrawer');
    if(close)close.click();
    else{
      drawer.classList.remove('open');
      drawer.setAttribute('aria-hidden','true');
      document.body.classList.remove('fighter-profile-open');
    }
    return true;
  }

  function start(){
    document.addEventListener('click',event=>{
      if(event.target.closest?.('[data-native-destination]'))closeFighterProfile();
    },true);
    document.documentElement.dataset.nativeAppShellStability=VERSION;
  }

  window.UFC_NATIVE_APP_SHELL_STABILITY={version:VERSION,closeFighterProfile};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start,{once:true});else start();
})();
""")

          Path('scripts/test-native-shell-stability-spotlight-contract.mjs').write_text("""import assert from 'node:assert/strict';
