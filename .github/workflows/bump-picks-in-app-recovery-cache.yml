name: Bump Picks In-App Recovery Cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bump-picks-in-app-recovery-cache.yml'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update recovery asset version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = 'picks-device-recovery-20260712a'
          new = 'picks-device-recovery-20260712b-in-app'
          if old not in text and new not in text:
              raise SystemExit('Expected Picks recovery asset reference was not found.')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit cache bump
        run: |
          if git diff --quiet -- index.html; then
            echo 'Cache version already updated.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Bust in-app Picks recovery cache'
          git push