name: Phase 5 Script Manifest Inventory

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/**'
      - 'scripts/audit-phase-5-script-manifest.mjs'
      - 'scripts/test-better-than-find-leader-owner.mjs'
      - 'scripts/test-better-than-photo-authority-owner.mjs'
      - 'scripts/test-ios-standalone-resume-home.mjs'
      - '.github/workflows/phase-5-script-manifest-inventory.yml'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/**'
      - 'scripts/audit-phase-5-script-manifest.mjs'
      - 'scripts/test-better-than-find-leader-owner.mjs'
      - 'scripts/test-better-than-photo-authority-owner.mjs'
      - 'scripts/test-ios-standalone-resume-home.mjs'
      - '.github/workflows/phase-5-script-manifest-inventory.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase-5-script-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate inventory syntax
        run: node --check scripts/audit-phase-5-script-manifest.mjs
      - name: Build production script manifest inventory
        run: |
          set -o pipefail
          node scripts/audit-phase-5-script-manifest.mjs 2>&1 | tee /tmp/phase-5-script-manifest-inventory.json
      - name: Upload manifest inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-5-script-manifest-inventory
          path: /tmp/phase-5-script-manifest-inventory.json
          if-no-files-found: ignore

  manifest-owner-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate manifest ownership proof syntax
        run: |
          node --check assets/js/better-than-standalone-share.js
          node --check assets/js/play-photo-authority.js
          node --check scripts/test-better-than-find-leader-owner.mjs
          node --check scripts/test-better-than-photo-authority-owner.mjs
          node --check scripts/test-ios-standalone-resume-home.mjs
      - name: Verify iOS aggregate keeps manifest owner proofs
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const source=fs.readFileSync('scripts/test-ios-standalone-resume-home.mjs','utf8');
          for(const proof of ['test-better-than-find-leader-owner.mjs','test-better-than-photo-authority-owner.mjs']){
            if(!source.includes(`./${proof}`))throw new Error(`iOS aggregate is missing ${proof}`);
          }
          NODE
      - name: Install browser test runtime
        run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/phase-5-manifest-owner-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/phase-5-manifest-owner-server.log
          exit 1
      - name: Prove Find the Leader manifest ownership
        run: node scripts/test-better-than-find-leader-owner.mjs
      - name: Prove photo authority manifest ownership
        run: node scripts/test-better-than-photo-authority-owner.mjs
      - name: Upload Find the Leader ownership diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: better-than-find-leader-owner-report
          path: /tmp/better-than-find-leader-owner-report.json
          if-no-files-found: ignore
      - name: Upload photo authority ownership diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: better-than-photo-authority-owner-report
          path: /tmp/better-than-photo-authority-owner-report.json
          if-no-files-found: ignore

  ios-aggregate-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install browser validation runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.2 acorn@8
          npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/phase-5-ios-aggregate-http.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/phase-5-ios-aggregate-http.log
          exit 1
      - name: Run aggregate with captured output
        id: aggregate
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/test-ios-standalone-resume-home.mjs 2>&1 | tee /tmp/phase-5-ios-aggregate.log
      - name: Upload aggregate diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-5-ios-aggregate-diagnostic
          path: |
            /tmp/phase-5-ios-aggregate.log
            /tmp/better-than-find-leader-owner-report.json
          if-no-files-found: warn
      - name: Preserve aggregate failure
        if: steps.aggregate.outcome == 'failure'
        run: exit 1
