name: One-time Abu Dhabi Picks hero
# rerun: repaired chunk

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/add-abu-dhabi-picks-hero-once.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Update to latest main
        shell: bash
        run: git pull --rebase origin main

      - name: Validate, build, and wire Abu Dhabi artwork
        id: build
        continue-on-error: true
        shell: python
        run: |
          import base64
          import hashlib
          import json
          from pathlib import Path

          chunks = [
              Path('artifacts/tmp/abu-dhabi-hero-1.b64'),
              Path('artifacts/tmp/abu-dhabi-hero-2.b64'),
              Path('artifacts/tmp/abu-dhabi-hero-3a.b64'),
              Path('artifacts/tmp/abu-dhabi-hero-3b.b64'),
              Path('artifacts/tmp/abu-dhabi-hero-3c.b64'),
          ]
          expected = [
              (8000, 'e47c6be67eb4d0bf4315a9803d6d39228b5e4fc82f60841e774f27a91f5223ad'),
              (8000, 'e452e83391e60bb3821bb5f52edd0a24914895519a3ad9b072ddd1e4bc44d92f'),
              (2000, '5da124506cbcdfce3dfc9c47d9b8f099c4320937ce11253d1b11f2204ff76e4c'),
              (2000, '0906e6e21186435376a2771d81588d31e4550af27a522934ecba1f7050edea11'),
              (1480, 'e2d5eb08af34ed07b0e2a52ca4c58e5613ae9f981cfbcb53b255a4039bc6929c'),
          ]
          actual = []
          encoded_parts = []
          for path in chunks:
              text = path.read_text(encoding='utf-8').strip()
              encoded_parts.append(text)
              actual.append({
                  'path': str(path),
                  'length': len(text),
                  'sha256': hashlib.sha256(text.encode()).hexdigest(),
              })
          diagnostic = {'expected': expected, 'actual': actual}
          Path('artifacts/tmp/abu-dhabi-hero-diagnostic.json').write_text(json.dumps(diagnostic, indent=2) + '\n')
          if any(row['length'] != expected[index][0] or row['sha256'] != expected[index][1] for index, row in enumerate(actual)):
              raise SystemExit('One or more staged hero chunks do not match the source image')

          encoded = ''.join(encoded_parts)
          image = base64.b64decode(encoded, validate=True)
          if len(image) != 16110:
              raise SystemExit(f'Unexpected hero byte size: {len(image)}')
          if image[:4] != b'RIFF' or image[8:12] != b'WEBP':
              raise SystemExit('Decoded hero is not a valid WebP container')

          Path('assets/events/ufc-abu-dhabi-ankalaev-guskov.webp').write_bytes(image)

          visuals_path = Path('assets/data/picks-event-visuals.js')
          visuals = visuals_path.read_text(encoding='utf-8')
          if 'ufc-abu-dhabi-2026-07-25' in visuals:
              raise SystemExit('Abu Dhabi event visual already exists')
          closing = '\n});\n'
          if visuals.count(closing) != 1:
              raise SystemExit('Unexpected picks-event-visuals.js structure')
          addition = """,
          'ufc-abu-dhabi-2026-07-25': {
            hero: 'assets/events/ufc-abu-dhabi-ankalaev-guskov.webp?v=20260719a',
            alt: 'Magomed Ankalaev vs. Bogdan Guskov UFC Abu Dhabi promotional artwork'
          }"""
          visuals_path.write_text(visuals.replace(closing, addition + closing, 1), encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          replacements = {
              'content="20260719-picks-legacy-owner-recovery"': 'content="20260719-abu-dhabi-event-art"',
              'picks-event-visuals.js?v=picks-event-visuals-20260712b-repaired': 'picks-event-visuals.js?v=picks-event-visuals-20260719c-abu-dhabi',
          }
          for old, new in replacements.items():
              if index.count(old) != 1:
                  raise SystemExit(f'Expected exactly one index marker: {old}')
              index = index.replace(old, new, 1)
          index_path.write_text(index, encoding='utf-8')

          for path in chunks:
              path.unlink()
          Path('artifacts/tmp/abu-dhabi-hero-diagnostic.json').unlink()
          Path('.github/workflows/add-abu-dhabi-picks-hero-once.yml').unlink()

      - name: Publish result
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          if [ "$BUILD_OUTCOME" = "success" ]; then
            git commit -m "Add Ankalaev-Guskov Picks event artwork"
          else
            git commit -m "Publish Abu Dhabi hero chunk diagnostic"
          fi
          git push origin main
