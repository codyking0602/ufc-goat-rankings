name: Trigger Phase 2 profile login owner delegation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase-2-profile-login-owner-trigger.yml'
      - '.github/workflows/phase-2-profile-login-owner-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2-profile-login-owner
      - name: Apply isolated runtime and proof
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/phase-2-profile-login-owner-apply.yml').read_text()
          marker="          python3 - <<'PY'\n"
          start=source.index(marker)+len(marker)
          end=source.index("\n          PY\n",start)
          code='\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end].splitlines())
          exec(compile(code,'phase-2-profile-login-owner','exec'))
          PY
          node --check assets/js/play-profile-identity.js
          node --check assets/js/picks-member-pin.js
          node --check scripts/test-profile-login-owner-delegation.mjs
          node --check scripts/test-profile-signin-stability.mjs
          node scripts/test-startup-contract.mjs
          git diff --check
      - name: Commit isolated runtime and proof
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/play-profile-identity.js assets/js/picks-member-pin.js scripts/test-profile-signin-stability.mjs scripts/test-startup-contract.mjs scripts/test-profile-login-owner-delegation.mjs
          git commit -m "Delegate Picks profile login to the canonical owner"
          git push origin HEAD:agent/phase-2-profile-login-owner
# initial
