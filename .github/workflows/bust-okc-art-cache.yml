name: Bust Oklahoma City Art Cache

on:
  push:
    branches: [main]
    paths:
      - '.tmp/okc-cache/READY'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bust event artwork cache
        shell: bash
        run: |
          sed -i 's/picks-event-visuals-20260712a-okc/picks-event-visuals-20260712b-repaired/g' index.html
          sed -i 's/20260712-picks-event-artwork/20260712-picks-event-artwork-repaired/g' index.html
          test "$(stat -c%s assets/events/ufc-oklahoma-city-du-plessis-usman.webp)" -eq 29600
          test "$(head -c 4 assets/events/ufc-oklahoma-city-du-plessis-usman.webp)" = "RIFF"
          test "$(dd if=assets/events/ufc-oklahoma-city-du-plessis-usman.webp bs=1 skip=8 count=4 status=none)" = "WEBP"
          node scripts/check-picks-ui.mjs

      - name: Commit cache bust
        shell: bash
        run: |
          rm -rf .tmp/okc-cache
          rm -f .github/workflows/bust-okc-art-cache.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bust repaired Oklahoma City artwork cache"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
