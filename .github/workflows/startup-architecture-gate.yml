name: Startup Architecture Gate

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/app.js'
      - 'assets/js/fresh-home-route-bootstrap.js'
      - 'assets/js/octagon-hq-shell.js'
      - 'assets/js/octagon-hq-nav-grid.js'
      - 'assets/js/home-dashboard.js'
      - 'assets/js/product-architecture.js'
      - 'assets/js/community-profiles.js'
      - 'assets/js/fresh-home-launch.js'
      - 'assets/js/app-notification-center.js'
      - 'assets/js/app-notification-surface-fix.js'
      - 'assets/js/native-app-shell.js'
      - 'assets/js/native-app-shell-stability.js'
      - 'assets/js/share-deep-links.js'
      - 'assets/js/play-profile-identity.js'
      - 'assets/js/picks-member-pin.js'
      - 'assets/js/picks-persistent-groups.js'
      - 'scripts/test-startup-contract.mjs'
      - 'scripts/test-route-owner-app-tab-delegation.mjs'
      - 'scripts/test-route-owner-recovery-window.mjs'
      - 'scripts/test-ios-standalone-resume-home.mjs'
      - 'scripts/test-profile-signin-stability.mjs'
      - 'scripts/test-phase-4b-mobile.mjs'
      - '.github/workflows/startup-architecture-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/app.js'
      - 'assets/js/fresh-home-route-bootstrap.js'
      - 'assets/js/octagon-hq-shell.js'
      - 'assets/js/octagon-hq-nav-grid.js'
      - 'assets/js/home-dashboard.js'
      - 'assets/js/product-architecture.js'
      - 'assets/js/community-profiles.js'
      - 'assets/js/fresh-home-launch.js'
      - 'assets/js/app-notification-center.js'
      - 'assets/js/app-notification-surface-fix.js'
      - 'assets/js/native-app-shell.js'
      - 'assets/js/native-app-shell-stability.js'
      - 'assets/js/share-deep-links.js'
      - 'assets/js/play-profile-identity.js'
      - 'assets/js/picks-member-pin.js'
      - 'assets/js/picks-persistent-groups.js'
      - 'scripts/test-startup-contract.mjs'
      - 'scripts/test-route-owner-app-tab-delegation.mjs'
      - 'scripts/test-route-owner-recovery-window.mjs'
      - 'scripts/test-ios-standalone-resume-home.mjs'
      - 'scripts/test-profile-signin-stability.mjs'
      - 'scripts/test-phase-4b-mobile.mjs'
      - '.github/workflows/startup-architecture-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: startup-architecture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  startup-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate startup JavaScript syntax
        run: |
          node --check scripts/test-startup-contract.mjs
          node --check scripts/test-route-owner-app-tab-delegation.mjs
          node --check scripts/test-route-owner-recovery-window.mjs
          node --check assets/js/app.js
          node --check assets/js/fresh-home-route-bootstrap.js
          node --check assets/js/octagon-hq-shell.js
          node --check assets/js/product-architecture.js
          node --check assets/js/community-profiles.js
          node --check assets/js/fresh-home-launch.js
          node --check assets/js/app-notification-center.js
          node --check assets/js/app-notification-surface-fix.js
          node --check assets/js/native-app-shell.js
          node --check assets/js/native-app-shell-stability.js

      - name: Enforce startup ownership contract
        run: node scripts/test-startup-contract.mjs

      - name: Install browser test runtime
        run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium

      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/startup-architecture-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/startup-architecture-server.log
          exit 1

      - name: Test normal app tab delegation and missing-DOM recovery
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('scripts/test-route-owner-app-tab-delegation.mjs')
          body=path.read_text()
          marker='async function testRecoveryVariant'
          if marker not in body:
              raise SystemExit('Expected recovery function marker not found')
          body=body.split(marker,1)[0]+'''let browser;\ntry{\n  browser=await chromium.launch({headless:true});\n  const normalBaseline=await testNormalVariant(browser,'baseline',appSource);\n  const normalCandidate=await testNormalVariant(browser,'candidate',candidateSource);\n  assert.deepEqual(normalCandidate,normalBaseline,'Removing only the legacy app.js tab block changed normal canonical route or legacy rendering/control behavior.');\n  const missingDom=await testTemporaryMissingShellDom(browser);\n  console.log(JSON.stringify({passed:true,normalBaseline,normalCandidate,missingDom},null,2));\n}finally{\n  if(browser)await browser.close();\n}\n'''
          path.write_text(body)
          PY
          set -o pipefail
          node scripts/test-route-owner-app-tab-delegation.mjs 2>&1 | tee /tmp/route-owner-normal-proof.log

      - name: Test product-architecture shell recovery window
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('scripts/test-route-owner-recovery-window.mjs')
          body=path.read_text()
          body=body.replace("await page.addScriptTag({content:'window.__firstShellAttemptFailed=true;'});","await page.evaluate(()=>{window.__firstShellAttemptFailed=true;});")
          body=body.replace("await page.addScriptTag({content:`const el=id=>document.getElementById(id);function refresh(){window.__legacyRefreshes+=1;}\\n${legacyListenerSource}`});","await page.evaluate(source=>(0,eval)(source),`const el=id=>document.getElementById(id);function refresh(){window.__legacyRefreshes+=1;}\\n${legacyListenerSource}`);")
          body=body.replace("await page.addScriptTag({content:productSource});","await page.evaluate(source=>(0,eval)(source),productSource);")
          body=body.replace("await page.addScriptTag({content:shellSource});","await page.evaluate(source=>(0,eval)(source),shellSource);")
          path.write_text(body)
          PY
          set -o pipefail
          node scripts/test-route-owner-recovery-window.mjs 2>&1 | tee /tmp/route-owner-recovery-proof.log

      - name: Upload focused proof output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-owner-proof-output
          path: /tmp/route-owner-*-proof.log
          if-no-files-found: error

      - name: Test iOS startup route stability
        run: node scripts/test-ios-standalone-resume-home.mjs

      - name: Test profile sign-in startup stability
        run: node scripts/test-profile-signin-stability.mjs

      - name: Test Home and community delayed stability
        run: node scripts/test-phase-4b-mobile.mjs
