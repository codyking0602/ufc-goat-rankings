name: Bake Patched App Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Bake patches into index.html only
        run: |
          set -euxo pipefail

          if [ -f .github/scripts/app_patch.py ]; then
            python3 .github/scripts/app_patch.py index.html
          fi

          if [ -f .github/scripts/copy_cleanup.py ]; then
            python3 .github/scripts/copy_cleanup.py index.html
          fi

          git status --short index.html

      - name: Commit baked index.html
        run: |
          set -euxo pipefail
          git add index.html
          if git diff --cached --quiet; then
            echo "No index.html changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Bake app patches into index source"
          git push origin HEAD:main
