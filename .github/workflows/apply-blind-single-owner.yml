name: Apply Blind Mode Single Owner

on:
  push:
    branches: [agent/fighter-data-phase-1]
    paths:
      - 'scripts/make-blind-matchmaking-single-owner.mjs'
      - '.github/workflows/apply-blind-single-owner.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-blind-mode-single-owner
  cancel-in-progress: false

jobs:
  clean-blind-owner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out current branch
        uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0
      - name: Make five-round blind mode the single renderer
        run: node scripts/make-blind-matchmaking-single-owner.mjs
      - name: Commit Play ownership cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/play.js index.html
          git commit -m "Make five-round Blind Resume the single renderer"
          git pull --rebase origin agent/fighter-data-phase-1
          git push origin HEAD:agent/fighter-data-phase-1
