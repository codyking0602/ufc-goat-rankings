name: Phase 1 Batch Four Source Fix

on:
  push:
    branches: [agent/fighter-data-phase-1]
    paths:
      - 'scripts/fix-canonical-batch-four-scheduled-rounds.mjs'
      - '.github/workflows/phase1-batch-four-source-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply guarded source fix
        run: node scripts/fix-canonical-batch-four-scheduled-rounds.mjs
      - name: Validate corrected source
        run: node --check assets/data/canonical-fighter-facts-batch-four.js
      - name: Commit corrected batch
        run: |
          if git diff --quiet -- assets/data/canonical-fighter-facts-batch-four.js; then
            echo 'No source change required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/canonical-fighter-facts-batch-four.js
          git commit -m 'Fix canonical batch-four scheduled-round validation'
          git push origin HEAD:agent/fighter-data-phase-1
