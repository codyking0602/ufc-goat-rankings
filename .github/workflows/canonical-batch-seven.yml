name: Canonical Ten-Fighter Batch Seven

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/data/canonical-fighter-facts.js'
      - 'assets/data/canonical-fighter-facts-batch-one.js'
      - 'assets/data/canonical-fighter-facts-batch-two.js'
      - 'assets/data/canonical-fighter-facts-batch-three.js'
      - 'assets/data/canonical-fighter-facts-batch-four.js'
      - 'assets/data/canonical-fighter-facts-batch-five.js'
      - 'assets/data/canonical-fighter-facts-batch-six.js'
      - 'assets/data/canonical-fighter-facts-batch-seven-data-a.js'
      - 'assets/data/canonical-fighter-facts-batch-seven-data-b.js'
      - 'assets/data/canonical-fighter-facts-batch-seven.js'
      - 'scripts/test-canonical-fighter-facts-ten-person-batch-seven.mjs'
      - '.github/workflows/canonical-batch-seven.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-ten-fighter-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check syntax
        run: |
          node --check assets/data/canonical-fighter-facts-batch-seven-data-a.js
          node --check assets/data/canonical-fighter-facts-batch-seven-data-b.js
          node --check assets/data/canonical-fighter-facts-batch-seven.js
          node --check scripts/test-canonical-fighter-facts-ten-person-batch-seven.mjs
      - name: Verify 199-fight ten-fighter ledger
        run: node scripts/test-canonical-fighter-facts-ten-person-batch-seven.mjs > /tmp/canonical-batch-seven.log 2>&1
      - name: Upload batch-seven diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-batch-seven-diagnostic
          path: /tmp/canonical-batch-seven.log
          if-no-files-found: warn
          retention-days: 7
