name: Apply Phase 4 App Profile Patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase-4-app-profile-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Apply exact reviewed patch
        shell: bash
        run: |
          cat > /tmp/phase4-profile-patch.b64 <<'PATCH'

PATCH
          base64 --decode /tmp/phase4-profile-patch.b64 > /tmp/phase4-profile-patch.zip
          unzip -o -q /tmp/phase4-profile-patch.zip
          rm .github/workflows/phase-4-app-profile-source.yml
          node --check assets/js/app-profile.js
          node --check scripts/test-app-profile-group-snapshot-contract.mjs
          node --check scripts/test-app-profile-group-snapshot-single.mjs
          node scripts/test-app-profile-group-snapshot-contract.mjs
      - name: Commit reviewed patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/app-profile.js scripts/test-app-profile-group-snapshot-contract.mjs scripts/test-app-profile-group-snapshot-single.mjs .github/workflows/phase-4-app-profile-source.yml
          git commit -m 'Defer profile group snapshot until editor use'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
