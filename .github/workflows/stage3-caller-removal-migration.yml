name: Stage 3 Caller Removal Migration

on:
  push:
    branches: [agent/stage3-remove-legacy-scoring]
    paths:
      - 'scripts/stage3-remove-finalize-callers.mjs'
      - '.github/workflows/stage3-caller-removal-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[stage3 caller cleanup]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/stage3-remove-legacy-scoring

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove legacy final-score callers
        run: node scripts/stage3-remove-finalize-callers.mjs

      - name: Validate syntax
        run: |
          node --check assets/js/championship-resume-live.js
          node --check assets/data/prime-dominance-live-promoter.js
          node --check assets/data/longevity-live-promoter.js
          node --check assets/data/apex-peak-live-bonus.js
          node --check assets/data/canonical-fighter-registry-batch-eight.js
          node --check assets/data/quality-wins-audit-cruz-ilia.js
          node --check assets/data/approved-fighter-audit-corrections.js
          node --check assets/data/module-versions.js
          node --check assets/data/ranking-data-patches.js
          node --check scripts/validate-stage3-scoring-cleanup.mjs

      - name: Commit caller cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/championship-resume-live.js assets/data/prime-dominance-live-promoter.js assets/data/longevity-live-promoter.js assets/data/apex-peak-live-bonus.js assets/data/canonical-fighter-registry-batch-eight.js assets/data/quality-wins-audit-cruz-ilia.js assets/data/approved-fighter-audit-corrections.js assets/data/module-versions.js assets/data/ranking-data-patches.js index.html scripts/validate-stage3-scoring-cleanup.mjs
          git commit -m 'Remove legacy final-score callers [stage3 caller cleanup]' || exit 0
          git push origin HEAD:agent/stage3-remove-legacy-scoring
