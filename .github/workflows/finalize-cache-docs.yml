name: Finalize cache alignment docs

on:
  push:
    branches:
      - fix/unified-six-category-pipeline
    paths:
      - .github/workflows/finalize-cache-docs.yml

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 0

      - name: Update project records
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          current = Path('docs/CURRENT_STATE.md')
          text = current.read_text(encoding='utf-8')
          old = """## Production Cache Note

The static `index.html` query strings for `module-versions.js` and `ranking-data-patches.js` still need final cache-bust alignment before merge. Fresh branch runtime testing uses the correct files and passes.
"""
          new = """## Production Cache Status

The static `index.html` query strings now point to the deterministic `module-versions.js` bootstrap and the readiness-enabled `ranking-data-patches.js` loader. The normal Chromium audit passed after the cache-key update.
"""
          if text.count(old) != 1:
              raise SystemExit('CURRENT_STATE cache note did not match exactly once.')
          current.write_text(text.replace(old, new), encoding='utf-8')

          changelog = Path('docs/CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          marker = '# Changelog\n'
          entry = """
## 2026-07-09 — Static Loader Cache Alignment

### Changed

- Updated the `index.html` cache key for `module-versions.js` to the deterministic bootstrap version.
- Updated the `index.html` cache key for `ranking-data-patches.js` to the readiness-handoff version.
- Removed the one-time branch workflow used to make the exact substitutions.

### Validation

- Normal deterministic Chromium audit passed.
- Scoring timers: 0.
- Repeated scoring loads: 0.
- Final score engine applies once.
- Formula mismatches: 0.
- Category coverage and rankings unchanged.

No fighter data or category inputs changed.

"""
          if marker not in text:
              raise SystemExit('CHANGELOG heading missing.')
          if '## 2026-07-09 — Static Loader Cache Alignment' not in text:
              text = text.replace(marker, marker + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

      - name: Commit documentation update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CURRENT_STATE.md docs/CHANGELOG.md
          git diff --cached --check
          git commit -m "Document static loader cache alignment"
          git push origin HEAD:fix/unified-six-category-pipeline
