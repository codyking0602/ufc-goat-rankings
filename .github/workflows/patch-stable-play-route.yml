name: Patch stable Play route cache

on:
  push:
    paths:
      - '.github/workflows/patch-stable-play-route.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust stable challenge route
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          text = text.replace('content="20260715-play-challenge-banner-guard"', 'content="20260715-play-challenge-stable-restore"')
          text = text.replace('supabase-config.js?v=supabase-config-20260715e-banner-guard', 'supabase-config.js?v=supabase-config-20260715f-trusted-click-guard')
          path.write_text(text)
          PY
      - name: Commit patch and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-stable-play-route.yml
          git add index.html
          git commit -m "Restore stable one-shot Play challenge routing"
          git push
