name: Deploy UFC Card and Odds Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config/ufc-card-sources.json'
      - 'scripts/sync-ufc-card.mjs'
      - 'scripts/check-ufc-odds-name-matching.mjs'
      - 'supabase/functions/_shared/ufc-name-matching.mjs'
      - 'supabase/functions/sync-ufc-card/**'
      - 'supabase/functions/advance-picks-event/**'
      - 'supabase/functions/refresh-ufc-odds/**'
      - '.github/workflows/deploy-ufc-odds-refresh.yml'
      - '.github/workflows/refresh-ufc-odds.yml'

permissions:
  contents: write

concurrency:
  group: deploy-ufc-card-and-odds-sync
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      ODDS_REFRESH_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
      PROJECT_REF: hdkjwezaswhisxupxydc
      CARD_SYNC_ENDPOINT: https://hdkjwezaswhisxupxydc.supabase.co/functions/v1/sync-ufc-card
      CARD_SYNC_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$THE_ODDS_API_KEY" || { echo "Missing THE_ODDS_API_KEY"; exit 1; }
          test -n "$ODDS_REFRESH_SECRET" || { echo "Missing ODDS_REFRESH_SECRET"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test sportsbook fighter-name reconciliation
        shell: bash
        run: node scripts/check-ufc-odds-name-matching.mjs

      - name: Store function secrets
        shell: bash
        run: |
          npx --yes supabase@latest secrets set \
            THE_ODDS_API_KEY="$THE_ODDS_API_KEY" \
            ODDS_REFRESH_SECRET="$ODDS_REFRESH_SECRET" \
            CARD_SYNC_SECRET="$ODDS_REFRESH_SECRET" \
            --project-ref "$PROJECT_REF"

      - name: Deploy card reconciliation function
        shell: bash
        run: |
          npx --yes supabase@latest functions deploy sync-ufc-card \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy next-event advance function
        shell: bash
        run: |
          npx --yes supabase@latest functions deploy advance-picks-event \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy odds refresh function
        shell: bash
        run: |
          npx --yes supabase@latest functions deploy refresh-ufc-odds \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Install Playwright
        shell: bash
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Import confirmed external card
        shell: bash
        run: node scripts/sync-ufc-card.mjs --apply --force

      - name: Advance permanent groups to next event
        shell: bash
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"deploy-workflow"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event"

      - name: Verify deployed odds refresh
        id: odds_refresh
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/ufc-odds-refresh
          set -o pipefail
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-odds-refresh-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"deploy-workflow"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/refresh-ufc-odds" \
            | tee artifacts/ufc-odds-refresh/odds-refresh-response.json

      - name: Publish deployed odds health
        if: always()
        env:
          ODDS_OUTCOME: ${{ steps.odds_refresh.outcome }}
        shell: bash
        run: |
          git fetch origin main
          git reset --hard origin/main
          node <<'NODE'
          const fs=require('node:fs');
          const path=require('node:path');
          const responsePath=path.join('artifacts','ufc-odds-refresh','odds-refresh-response.json');
          let response={};
          if(fs.existsSync(responsePath)){
            try{response=JSON.parse(fs.readFileSync(responsePath,'utf8'));}
            catch(error){response={parseError:error.message,raw:fs.readFileSync(responsePath,'utf8').slice(0,4000)};}
          }
          const health={
            outcome:process.env.ODDS_OUTCOME||'unknown',
            provider:response.provider||null,
            sport:response.sport||null,
            activeEvents:response.activeEvents??null,
            scheduledFights:response.scheduledFights??null,
            providerEvents:response.providerEvents??null,
            matched:response.matched??null,
            updated:response.updated??null,
            reconciled:Array.isArray(response.reconciled)?response.reconciled:[],
            missing:Array.isArray(response.missing)?response.missing:[],
            failures:Array.isArray(response.failures)?response.failures:[],
            quota:response.quota||null,
            refreshedAt:response.refreshedAt||new Date().toISOString(),
            error:response.error||response.detail||response.parseError||null
          };
          fs.mkdirSync(path.join('assets','data'),{recursive:true});
          fs.writeFileSync(path.join('assets','data','picks-odds-health.json'),JSON.stringify(health,null,2)+'\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/picks-odds-health.json
          if ! git diff --cached --quiet; then
            git commit -m "Record deployed UFC odds health [skip ci]"
            git push
          fi

      - name: Upload sync evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ufc-card-and-odds-deploy-${{ github.run_id }}
          path: |
            artifacts/ufc-card-sync
            artifacts/ufc-odds-refresh
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail when deployed odds refresh failed
        if: always() && steps.odds_refresh.outcome != 'success'
        shell: bash
        run: exit 1
