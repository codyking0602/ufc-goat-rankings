name: Diagnose Palette Aggregate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install quiet browser runtime
        run: |
          npm install --silent --no-save --package-lock=false playwright@1.54.2 acorn@8 >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
      - name: Start app
        run: python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/palette-diagnostic-http.log 2>&1 &
      - name: Run aggregate
        id: aggregate
        continue-on-error: true
        run: node scripts/test-ios-standalone-resume-home.mjs >/tmp/palette-aggregate.log 2>&1
      - name: Upload aggregate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: palette-aggregate-log
          path: /tmp/palette-aggregate.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail on aggregate error
        if: steps.aggregate.outcome == 'failure'
        run: |
          tail -n 40 /tmp/palette-aggregate.log
          exit 1
