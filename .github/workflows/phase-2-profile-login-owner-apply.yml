    return {
      ...(identity||{}),
      ok:true,
      group:data?.group||identity?.group||{code:CANONICAL_CODE},
      groupCode:CANONICAL_CODE,
      member:data?.member||identity?.member||null,
      member_token:token,
      memberToken:token,
