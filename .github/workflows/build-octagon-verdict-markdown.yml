name: Build Octagon Verdict Markdown

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'assets/data/ranking-data.js'
      - 'assets/data/display-overrides.js'
      - 'assets/data/canonical-fighter-facts*.js'
      - 'assets/data/canonical-roster-batch-*.js'
      - 'assets/data/canonical-scoring-judgments.js'
      - 'assets/data/canonical-*-audit-adjustments.js'
      - 'assets/data/fighter-era-ledger*.js'
      - 'assets/data/division-era-depth-shadow.js'
      - 'assets/data/canonical-division-era-depth-approved-resolutions.js'
      - 'assets/compare-data.js'
      - 'assets/compare-*.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'tools/build-octagon-verdict-knowledge.js'
      - 'tools/build-octagon-verdict-markdown.js'
      - '.github/workflows/build-octagon-verdict-markdown.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/ranking-data.js'
      - 'assets/data/display-overrides.js'
      - 'assets/data/canonical-fighter-facts*.js'
      - 'assets/data/canonical-roster-batch-*.js'
      - 'assets/data/canonical-scoring-judgments.js'
      - 'assets/data/canonical-*-audit-adjustments.js'
      - 'assets/data/fighter-era-ledger*.js'
      - 'assets/data/division-era-depth-shadow.js'
      - 'assets/data/canonical-division-era-depth-approved-resolutions.js'
      - 'assets/compare-data.js'
      - 'assets/compare-*.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'tools/build-octagon-verdict-knowledge.js'
      - 'tools/build-octagon-verdict-markdown.js'
      - '.github/workflows/build-octagon-verdict-markdown.yml'
  workflow_dispatch:

concurrency:
  group: build-octagon-verdict-markdown-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out triggering revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium runtime
        run: |
          npm install --no-save --silent playwright@1.55.0 > /tmp/octagon-markdown-playwright.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/octagon-markdown-playwright.log 2>&1

      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/octagon-markdown-http.log 2>&1 &
          echo $! > /tmp/octagon-markdown-http.pid

      - name: Build required Markdown knowledge pack
        shell: bash
        run: |
          set -o pipefail
          node tools/build-octagon-verdict-markdown.js 2>&1 | tee /tmp/octagon-markdown-build.log

      - name: Validate Markdown authority and Anthony Pettis coverage
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const assert=require('assert/strict');
          const markdown=fs.readFileSync('octagon-verdict-knowledge.md','utf8');
          const count=Number(markdown.match(/Fighters: \*\*(\d+)\*\*/)?.[1]||0);
          assert.equal(count,80);
          const pettis=markdown.match(/### 57\. Anthony Pettis — 87 OVR[\s\S]*?(?=\n### \d+\.|\n## 11\.)/)?.[0]||'';
          assert.ok(pettis,'Anthony Pettis fighter card is missing.');
          assert.match(pettis,/Anthony “Showtime” Pettis/);
          assert.match(pettis,/\| men \| 37\.5 \| 11-9 \| Lightweight \/ Featherweight \/ Welterweight \| 2 \| 2 \| 3 \| 7-6 \| 34\.4% \| 6\.61 \|/);
          assert.match(pettis,/Benson Henderson II|Benson Henderson/);
          assert.match(pettis,/Gilbert Melendez/);
          assert.ok(markdown.includes('Machine-readable JSON is optional and does not block fighter additions.'));
          assert.ok(markdown.includes('JSON exports are optional, run only when explicitly requested, and never block a fighter addition.'));
          assert.ok(!markdown.includes('Fighters: **79**'));
          console.log(`Validated required Octagon Verdict Markdown for ${count} fighters, including Anthony “Showtime” Pettis.`);
          NODE

      - name: Show diagnostics on failure
        if: failure()
        run: |
          echo '--- Markdown builder ---'
          cat /tmp/octagon-markdown-build.log 2>/dev/null || true
          echo '--- HTTP server ---'
          tail -100 /tmp/octagon-markdown-http.log 2>/dev/null || true

      - name: Upload Markdown artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: octagon-verdict-knowledge-markdown
          path: octagon-verdict-knowledge.md
          if-no-files-found: error

      - name: Commit refreshed Markdown on same-repo pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add octagon-verdict-knowledge.md
          if git diff --cached --quiet; then
            echo "Octagon Verdict Markdown is already current on the validation branch."
          else
            git commit -m "Rebuild Octagon Verdict Markdown knowledge pack [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Commit refreshed Markdown on main
        if: github.event_name == 'push' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add octagon-verdict-knowledge.md
          if git diff --cached --quiet; then
            echo "Octagon Verdict Markdown is already current."
          else
            git commit -m "Rebuild Octagon Verdict Markdown knowledge pack [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
