name: Inspect Quality Wins sources

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-quality-wins.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 1

      - name: Emit compact source inventory
        shell: bash
        run: |
          python -c 'import json; from pathlib import Path; paths=[p for root in (Path("assets"),Path("docs")) for p in root.rglob("*") if p.is_file()]; read=lambda p:p.read_text(encoding="utf-8",errors="ignore"); payload={"files":sorted(str(p) for p in Path("assets").rglob("*") if p.is_file() and ("opponent-quality" in p.name.lower() or "quality-win" in p.name.lower())),"matches":{n:sorted(str(p) for p in paths if n in read(p)) for n in ("Chuck Liddell","Tito Ortiz")},"loaderRefs":sorted(str(p) for p in paths if "opponent-quality-" in read(p)),"ledgerRefs":sorted(str(p) for p in paths if "UFC_OPPONENT_QUALITY_LEDGERS" in read(p) or ".raw[" in read(p))}; print("INSPECTION_JSON="+json.dumps(payload,separators=(",",":")))'
