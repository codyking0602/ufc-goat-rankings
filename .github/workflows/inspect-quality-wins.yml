name: Inspect Quality Wins sources

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-quality-wins.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 1

      - name: Emit compact source inventory
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          roots = [Path('assets'), Path('docs')]
          files = [str(p) for p in Path('assets').rglob('*') if p.is_file() and ('opponent-quality' in p.name.lower() or 'quality-win' in p.name.lower())]
          matches = {'Chuck Liddell': [], 'Tito Ortiz': []}
          loader_refs = []
          ledger_refs = []
          for root in roots:
              for path in root.rglob('*'):
                  if not path.is_file():
                      continue
                  try:
                      text = path.read_text(encoding='utf-8')
                  except Exception:
                      continue
                  for name in matches:
                      if name in text:
                          matches[name].append(str(path))
                  if 'opponent-quality-' in text:
                      loader_refs.append(str(path))
                  if 'UFC_OPPONENT_QUALITY_LEDGERS' in text or '.raw[' in text:
                      ledger_refs.append(str(path))
          payload = {
              'files': sorted(files),
              'matches': {k: sorted(set(v)) for k, v in matches.items()},
              'loaderRefs': sorted(set(loader_refs)),
              'ledgerRefs': sorted(set(ledger_refs)),
          }
          print('INSPECTION_JSON=' + json.dumps(payload, separators=(',', ':')))
          PY
