name: Inspect Quality Wins sources

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-quality-wins.yml
      - scripts/inspect-quality-wins.py

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 1

      - name: Build source report
        run: python scripts/inspect-quality-wins.py

      - name: Upload source report
        uses: actions/upload-artifact@v4
        with:
          name: quality-wins-source-report
          path: quality-wins-source-report.txt
          if-no-files-found: error
