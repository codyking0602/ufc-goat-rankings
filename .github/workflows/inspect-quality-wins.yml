name: Inspect Quality Wins sources

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-quality-wins.yml
      - scripts/inspect-quality-wins.py

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 1

      - name: Emit compact source inventory
        run: python scripts/inspect-quality-wins.py
