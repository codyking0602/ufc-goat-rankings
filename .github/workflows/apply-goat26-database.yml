name: Apply GOAT26 Canonical Group Migration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-goat26-database.yml'
      - 'supabase/app-canonical-group-goat26-phase.sql'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-goat26-canonical-group
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply guarded GOAT26 migration
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project_ref = os.environ['SUPABASE_PROJECT_REF']
          access_token = os.environ.get('SUPABASE_ACCESS_TOKEN', '').strip()
          migration_path = Path('supabase/app-canonical-group-goat26-phase.sql')
          status_path = Path('supabase/goat26-deployment-status.json')
          migration_sql = migration_path.read_text()

          audit_sql = """
          select jsonb_build_object(
            'status','active',
            'code',g.code,
            'name',g.name,
            'is_canonical',coalesce(g.is_canonical,false),
            'active_members',(select count(*) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'member_names',(
              select jsonb_agg(gm.display_name order by lower(trim(gm.display_name)))
              from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'events',(select count(*) from public.pick_group_events ge where ge.group_id=g.id),
            'rooms',(select count(*) from public.pick_rooms r where r.group_id=g.id),
            'saved_picks',(
              select count(*)
              from public.pick_rooms r
              join public.pick_room_members rm on rm.room_id=r.id
              join public.pick_selections ps on ps.member_id=rm.id
              where r.group_id=g.id
            )
          ) as audit
          from public.pick_groups g
          where g.code='GOAT26'
          order by coalesce(g.is_canonical,false) desc
          limit 1;
          """

          candidate_sql = """
          select jsonb_build_object(
            'name',g.name,
            'code_hint',left(g.code,1)||'****'||right(g.code,1),
            'owner_name',coalesce(owner_member.display_name,''),
            'created_at',g.created_at,
            'active_member_count',(
              select count(*) from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'member_names',(
              select coalesce(jsonb_agg(gm.display_name order by lower(trim(gm.display_name))),'[]'::jsonb)
              from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'events',(select count(*) from public.pick_group_events ge where ge.group_id=g.id),
            'rooms',(select count(*) from public.pick_rooms r where r.group_id=g.id),
            'saved_picks',(
              select count(*)
              from public.pick_rooms r
              join public.pick_room_members rm on rm.room_id=r.id
              join public.pick_selections ps on ps.member_id=rm.id
              where r.group_id=g.id
            )
          ) as candidate
          from public.pick_groups g
          left join public.pick_group_members owner_member on owner_member.id=g.owner_member_id
          where lower(trim(coalesce(owner_member.display_name,'')))='cody'
             or exists (
               select 1 from public.pick_group_members gm
               where gm.group_id=g.id
                 and lower(trim(gm.display_name))='cody'
                 and coalesce(gm.is_active,true)
             )
          order by
            (select count(*) from public.pick_selections ps
             join public.pick_room_members rm on rm.id=ps.member_id
             join public.pick_rooms r on r.id=rm.room_id
             where r.group_id=g.id) desc,
            g.created_at desc;
          """

          def write_status(payload):
              value = dict(payload)
              value['checked_at'] = datetime.now(timezone.utc).isoformat()
              status_path.write_text(json.dumps(value, indent=2, sort_keys=True) + '\n')

          def sanitize(message):
              text = str(message)
              if access_token:
                  text = text.replace(access_token, '[redacted]')
              return text[:1500]

          def query(sql, read_only=False):
              request = urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project_ref}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Accept':'application/json',
                      'Authorization':f'Bearer {access_token}',
                      'Content-Type':'application/json',
                      'User-Agent':'UFC-GOAT26-GitHub-Actions/1.0',
                      'X-Client-Info':'ufc-goat-rankings-goat26',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=90) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:1000]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def rows(response):
              return response.get('result',response) if isinstance(response,dict) else response

          def first_object(response,key):
              data=rows(response)
              if not isinstance(data,list) or not data or not isinstance(data[0],dict):
                  raise RuntimeError(f'{key} query did not return a row.')
              value=data[0].get(key,data[0])
              if isinstance(value,str):
                  value=json.loads(value)
              if not isinstance(value,dict):
                  raise RuntimeError(f'{key} query did not return an object.')
              return value

          def candidate_report():
              data=rows(query(candidate_sql,read_only=True))
              result=[]
              for row in data or []:
                  value=row.get('candidate',row) if isinstance(row,dict) else None
                  if isinstance(value,str):
                      value=json.loads(value)
                  if isinstance(value,dict):
                      result.append(value)
              return result

          if not access_token:
              write_status({
                  'status':'blocked',
                  'code':'GOAT26',
                  'reason':'SUPABASE_ACCESS_TOKEN is not configured in GitHub Actions.'
              })
              raise SystemExit(0)

          try:
              query(migration_sql,read_only=False)
              audit=first_object(query(audit_sql,read_only=True),'audit')
              expected=['Brock','Cody','Rhonda','Shane','Tony','Tyler']
              names=sorted(audit.get('member_names') or [],key=lambda value:str(value).lower())
              if (
                  audit.get('status')!='active'
                  or audit.get('code')!='GOAT26'
                  or not audit.get('is_canonical')
                  or names!=expected
                  or int(audit.get('events') or 0)<2
                  or int(audit.get('rooms') or 0)<2
                  or int(audit.get('saved_picks') or 0)<50
              ):
                  raise RuntimeError(f'Canonical six-member history audit failed: {audit}')
              audit['deployment_method']='supabase-management-api'
              write_status(audit)
              print('GOAT26 canonical group migration applied and verified.')
          except Exception as error:
              payload={
                  'status':'failed',
                  'code':'GOAT26',
                  'reason':sanitize(error),
              }
              try:
                  payload['candidates']=candidate_report()
              except Exception as audit_error:
                  payload['candidate_audit_error']=sanitize(audit_error)
              write_status(payload)
              print(f'GOAT26 migration stopped safely: {sanitize(error)}')
          PY

      - name: Commit sanitized deployment status
        if: always()
        run: |
          if [ ! -f supabase/goat26-deployment-status.json ]; then
            printf '%s\n' '{"status":"failed","code":"GOAT26","reason":"Migration produced no result."}' > supabase/goat26-deployment-status.json
          fi
          if git diff --quiet -- supabase/goat26-deployment-status.json; then
            echo 'Deployment status did not change.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/goat26-deployment-status.json
          git commit -m 'Record GOAT26 database deployment status [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main