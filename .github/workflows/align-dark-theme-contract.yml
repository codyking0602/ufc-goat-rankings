name: Align Dark Theme Contract

on:
  push:
    branches:
      - feature/play-challenge-center
    paths:
      - .github/workflows/align-dark-theme-contract.yml

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/play-challenge-center
      - name: Align current final CSS owner assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('scripts/test-dark-mobile-shell-theme.mjs')
          source=path.read_text()
          old='@import url("./product-polish.css?v=product-polish-20260721e-static-final-owner");'
          new='@import url("./product-polish.css?v=product-polish-20260722a-canonical-tokens");'
          if source.count(old)!=1:
              raise SystemExit('Expected one stale final-owner assertion.')
          path.write_text(source.replace(old,new,1))
          PY
          rm .github/workflows/align-dark-theme-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align dark theme contract with current main"
          git push origin HEAD:feature/play-challenge-center
