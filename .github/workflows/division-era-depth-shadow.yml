name: Division Era Depth Shadow

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-division-era-depth-shadow.mjs'
      - 'scripts/run-division-era-depth-shadow.mjs'
      - 'scripts/build-division-era-depth-judgment-review.mjs'
      - '.github/workflows/division-era-depth-shadow.yml'
  workflow_dispatch:

concurrency:
  group: division-era-depth-shadow
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check generator syntax
        run: |
          node --check scripts/build-division-era-depth-shadow.mjs
          node --check scripts/run-division-era-depth-shadow.mjs
          node --check scripts/build-division-era-depth-judgment-review.mjs

      - name: Build 63-fighter depth shadow
        run: node scripts/run-division-era-depth-shadow.mjs

      - name: Build 63-fighter judgment review
        run: node scripts/build-division-era-depth-judgment-review.mjs

      - name: Validate generated shadow and judgment review
        run: |
          node --check assets/data/division-era-depth-shadow.js
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('docs/division-era-depth-shadow-report.json', 'utf8'));
          const review = JSON.parse(fs.readFileSync('docs/division-era-depth-judgment-review.json', 'utf8'));
          if (report.mode !== 'shadow-only' || report.mutatesLiveScores !== false) throw new Error('Shadow safety contract failed.');
          if (report.summary.rosterCount !== 63 || report.summary.coverageCount !== 63) throw new Error('Full-roster coverage failed.');
          if (report.summary.directMatchCoverageCount !== 63 || report.summary.fallbackCount !== 0) throw new Error('Direct fight-history coverage failed.');
          if (report.summary.aliasResolutionComplete !== true) throw new Error('Alias resolution failed.');
          if (review.mode !== 'judgment-review-shadow-only' || review.mutatesLiveScores !== false) throw new Error('Judgment review safety contract failed.');
          if (review.coverage.rosterCount !== 63 || review.coverage.reviewedCount !== 63) throw new Error('Judgment review coverage failed.');
          if (review.formulaJudgment.curvedTranslationApproved !== true || review.formulaJudgment.linearTranslationRejected !== true) throw new Error('Formula judgment is incomplete.');
          if (review.coverage.majorMoverCount < 1 || review.formulaJudgment.majorMoverJudgmentApproved !== true) throw new Error('Major mover judgment failed.');
          if (review.coverage.wfwInfluencedCount < 1 || review.promotionDecision.readyForLivePromotion !== false) throw new Error('Expected WFW/source promotion hold is missing.');
          console.log(JSON.stringify({shadow: report.summary, judgment: review.coverage, promotionDecision: review.promotionDecision}, null, 2));
          NODE

      - name: Upload shadow and judgment reports
        uses: actions/upload-artifact@v4
        with:
          name: division-era-depth-shadow
          path: |
            assets/data/division-era-depth-shadow.js
            docs/division-era-depth-shadow-report.json
            docs/division-era-depth-judgment-review.json
            docs/division-era-depth-judgment-review.md
          retention-days: 30

      - name: Publish generated shadow and judgment review
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/division-era-depth-shadow.js docs/division-era-depth-shadow-report.json docs/division-era-depth-judgment-review.json docs/division-era-depth-judgment-review.md
          git commit -m 'Record division era depth judgment review [skip ci]' || true
          git push
