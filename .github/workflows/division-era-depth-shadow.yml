name: Division Era Depth Shadow

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-division-era-depth-shadow.mjs'
      - 'assets/data/octagon-verdict-data.json'
      - '.github/workflows/division-era-depth-shadow.yml'
  workflow_dispatch:

concurrency:
  group: division-era-depth-shadow
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check generator syntax
        run: node --check scripts/build-division-era-depth-shadow.mjs

      - name: Build 63-fighter depth shadow
        run: node scripts/build-division-era-depth-shadow.mjs

      - name: Validate generated shadow
        run: |
          node --check assets/data/division-era-depth-shadow.js
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('docs/division-era-depth-shadow-report.json', 'utf8'));
          if (report.mode !== 'shadow-only' || report.mutatesLiveScores !== false) throw new Error('Shadow safety contract failed.');
          if (report.summary.rosterCount !== 63 || report.summary.coverageCount !== 63) throw new Error('Full-roster coverage failed.');
          console.log(JSON.stringify(report.summary, null, 2));
          NODE

      - name: Upload shadow report
        uses: actions/upload-artifact@v4
        with:
          name: division-era-depth-shadow
          path: |
            assets/data/division-era-depth-shadow.js
            docs/division-era-depth-shadow-report.json
          retention-days: 30

      - name: Publish generated shadow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/division-era-depth-shadow.js docs/division-era-depth-shadow-report.json
          git commit -m 'Record division era depth shadow [skip ci]' || true
          git push
