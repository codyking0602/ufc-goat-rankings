name: Division Era Depth Shadow

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-division-era-depth-shadow.mjs'
      - 'scripts/run-division-era-depth-shadow.mjs'
      - 'scripts/refresh-division-era-depth-source.mjs'
      - 'scripts/refresh-division-era-depth-source-fast.mjs'
      - 'scripts/normalize-division-era-depth-source.mjs'
      - 'scripts/build-division-era-depth-judgment-review.mjs'
      - 'scripts/validate-division-era-depth-promotion.mjs'
      - 'scripts/install-division-era-depth-live.mjs'
      - 'scripts/install-division-era-depth-final-score.mjs'
      - 'scripts/install-division-era-depth-live-ui.mjs'
      - '.github/workflows/division-era-depth-shadow.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/build-division-era-depth-shadow.mjs'
      - 'scripts/run-division-era-depth-shadow.mjs'
      - 'scripts/refresh-division-era-depth-source.mjs'
      - 'scripts/refresh-division-era-depth-source-fast.mjs'
      - 'scripts/normalize-division-era-depth-source.mjs'
      - 'scripts/build-division-era-depth-judgment-review.mjs'
      - 'scripts/validate-division-era-depth-promotion.mjs'
      - 'scripts/install-division-era-depth-live.mjs'
      - 'scripts/install-division-era-depth-final-score.mjs'
      - 'scripts/install-division-era-depth-live-ui.mjs'
      - '.github/workflows/division-era-depth-shadow.yml'
  workflow_dispatch:

concurrency:
  group: division-era-depth-shadow-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install canonical era depth scoring
        run: |
          node --check scripts/install-division-era-depth-final-score.mjs
          node scripts/install-division-era-depth-final-score.mjs
          node --check scripts/install-division-era-depth-live-ui.mjs
          node scripts/install-division-era-depth-live-ui.mjs

      - name: Check JavaScript syntax
        run: |
          node --check scripts/build-division-era-depth-shadow.mjs
          node --check scripts/refresh-division-era-depth-source.mjs
          node --check scripts/refresh-division-era-depth-source-fast.mjs
          node --check scripts/normalize-division-era-depth-source.mjs
          node --check scripts/run-division-era-depth-shadow.mjs
          node --check scripts/build-division-era-depth-judgment-review.mjs
          node --check scripts/validate-division-era-depth-promotion.mjs
          node --check scripts/install-division-era-depth-live.mjs
          node --check scripts/install-division-era-depth-final-score.mjs
          node --check scripts/install-division-era-depth-live-ui.mjs
          node --check assets/data/division-era-depth-live.js
          node --check assets/data/division-era-depth-finalizer.js
          node --check assets/js/final-score-engine.js
          node --check assets/js/live-score-ui.js
          node --check assets/data/module-versions.js

      - name: Build current 63-fighter depth model
        env:
          UFC_MODEL_DATE: '2026-07-12'
        run: |
          set -o pipefail
          mkdir -p artifacts docs
          trap 'cp artifacts/division-era-depth-build.log docs/division-era-depth-build-diagnostics.txt 2>/dev/null || true' EXIT
          node scripts/run-division-era-depth-shadow.mjs 2>&1 | tee artifacts/division-era-depth-build.log
          node scripts/normalize-division-era-depth-source.mjs 2>&1 | tee -a artifacts/division-era-depth-build.log
          node scripts/build-division-era-depth-judgment-review.mjs 2>&1 | tee -a artifacts/division-era-depth-build.log

      - name: Validate promotion contract
        run: node scripts/validate-division-era-depth-promotion.mjs

      - name: Install live era depth scripts
        run: |
          node scripts/install-division-era-depth-live.mjs
          grep -q 'division-era-depth-shadow-20260712d-current-wfw-safe' index.html
          grep -q 'division-era-depth-judgment-review-20260712b-live-approved' index.html
          grep -q 'division-era-depth-live-20260712a' index.html
          grep -q 'division-era-depth-finalizer-20260712b-canonical-engine' index.html
          grep -q 'live-score-ui-20260712a-era-depth' index.html
          grep -q "finalScoreEngine:'20260712b-era-shadow-fallback'" assets/data/module-versions.js
          grep -q 'function eraDepthAdjustmentFor(row)' assets/js/final-score-engine.js
          grep -q '+ penalty + eraDepthAdjustment' assets/js/final-score-engine.js
          grep -q 'num(f?.penalty) + num(f?.eraDepthAdjustment)' assets/js/live-score-ui.js

      - name: Upload depth reports and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: division-era-depth
          path: |
            index.html
            assets/data/module-versions.js
            assets/js/final-score-engine.js
            assets/js/live-score-ui.js
            assets/data/division-era-depth-shadow.js
            assets/data/division-era-depth-audit.js
            docs/division-era-depth-shadow-report.json
            docs/division-era-depth-judgment-review.json
            docs/division-era-depth-judgment-review.md
            docs/division-era-depth-build-diagnostics.txt
            artifacts/division-era-depth-build.log
          if-no-files-found: warn
          retention-days: 30

      - name: Publish approved generated files and activation
        if: github.event_name == 'push' && success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html assets/data/module-versions.js assets/js/final-score-engine.js assets/js/live-score-ui.js assets/data/division-era-depth-shadow.js assets/data/division-era-depth-audit.js docs/division-era-depth-shadow-report.json docs/division-era-depth-judgment-review.json docs/division-era-depth-judgment-review.md docs/division-era-depth-build-diagnostics.txt
          git commit -m 'Finalize Division Era Depth scoring integration' || exit 0
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || { git rebase --abort || true; sleep $((attempt * 2)); continue; }
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 2))
          done
          exit 1
