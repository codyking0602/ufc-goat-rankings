name: Apply Persistent Group Activation Patch

on:
  push:
    branches:
      - agent/phase-4-activate-persistent-groups
    paths:
      - '.github/workflows/phase-4-persistent-groups-patch.yml'

permissions:
  contents: write

jobs:
  patch-and-prove:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-activate-persistent-groups
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply exact runtime patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('assets/js/picks-persistent-groups.js')
          source=path.read_text()
          old='''  function start(){
    ensureCard();
    document.getElementById('picksRoomAction')?.addEventListener('click',joinInvite,true);
    refresh();
    const observer=new MutationObserver(()=>{
      ensureCard();
      window.clearTimeout(start.timer);
      start.timer=window.setTimeout(refresh,220);
    });
    observer.observe(document.getElementById('picks') || document.body,{childList:true,subtree:true});
    window.setInterval(refresh,45000);
  }
'''
          new='''  function picksActive(){
    const destination=window.UFC_APP_SHELL?.currentDestination;
    if(destination) return destination==='picks';
    return document.getElementById('picks')?.classList.contains('active-view')===true;
  }

  function scheduleRefresh(){
    clearTimeout(start.timer);
    start.timer=setTimeout(()=>{ if(picksActive()) refresh(); },220);
  }

  function start(){
    ensureCard();
    document.getElementById('picksRoomAction')?.addEventListener('click',joinInvite,true);
    if(picksActive() && document.getElementById('picksGroupCard')) refresh();
    const observer=new MutationObserver(()=>{
      const hadCard=Boolean(document.getElementById('picksGroupCard'));
      ensureCard();
      if(picksActive() && !hadCard && document.getElementById('picksGroupCard')) scheduleRefresh();
    });
    observer.observe(document.getElementById('picks') || document.body,{childList:true,subtree:true});
    window.addEventListener('octagon-hq:view-change',event=>{
      if(event.detail?.destination!=='picks') return;
      ensureCard();
      if(document.getElementById('picksGroupCard')) refresh();
    });
    window.setInterval(()=>{ if(picksActive()) refresh(); },45000);
  }
'''
          if source.count(old)!=1:
              raise SystemExit('Expected one persistent-group startup block.')
          path.write_text(source.replace(old,new,1))
          PY
      - name: Validate focused contract
        run: |
          node --check assets/js/picks-persistent-groups.js
          node --check scripts/test-picks-persistent-groups-active-contract.mjs
          node --check scripts/test-picks-persistent-groups-active-owner.mjs
          node scripts/test-picks-persistent-groups-active-contract.mjs
      - name: Install Chromium test runtime
        run: npm install --no-save --package-lock=false playwright@1.54.1 && npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/persistent-groups-patch-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/persistent-groups-patch-server.log
          exit 1
      - name: Prove active Picks ownership
        run: node scripts/test-picks-persistent-groups-active-owner.mjs
      - name: Publish clean runtime patch
        run: |
          rm .github/workflows/phase-4-persistent-groups-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/picks-persistent-groups.js
          git add -u .github/workflows/phase-4-persistent-groups-patch.yml
          git commit -m "Bind persistent groups to active Picks"
          git push origin HEAD:agent/phase-4-activate-persistent-groups
