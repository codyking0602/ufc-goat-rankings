name: Enable standalone challenge rematches

on:
  push:
    paths:
      - '.github/workflows/enable-standalone-challenge-rematches.yml'

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Add challenge-back actions
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          keep_path = Path('assets/js/standalone-keep-cut-challenge.js')
          keep = keep_path.read_text(encoding='utf-8')
          keep = replace_once(keep,
              "const VERSION='standalone-keep-cut-challenge-20260715a';",
              "const VERSION='standalone-keep-cut-challenge-20260716b-challenge-back';",
              'keep version')
          keep = replace_once(keep,
              "    const same=8-differences.length;\n    host.innerHTML=`",
              "    const same=8-differences.length;\n    window.UFC_STANDALONE_REMATCH_CONTEXT={\n      gameType:'keep-cut',\n      gameVersion:state.challenge?.game_version||'keep-cut-standalone-v1',\n      page:'challenge.html',\n      originalCode:code,\n      setup:normalizeJson(state.challenge?.setup)||{},\n      result:{decisions:[...mine]},\n      metadata:{comparison:'keep-cut-decisions'}\n    };\n    host.innerHTML=`",
              'keep context')
          keep = replace_once(keep,
              "        <a class=\"primary-action link-action\" href=\"index.html#play\">PLAY ANOTHER GAME</a>",
              "        <button type=\"button\" class=\"primary-action\" data-challenge-back>CHALLENGE BACK</button>\n        <a class=\"secondary-action\" href=\"index.html#play\">PLAY A NEW GAME</a>",
              'keep actions')
          keep_path.write_text(keep, encoding='utf-8')

          rank_path = Path('assets/js/standalone-blind-rank-challenge.js')
          rank = rank_path.read_text(encoding='utf-8')
          rank = replace_once(rank,
              "const VERSION='standalone-blind-rank-challenge-20260716a';",
              "const VERSION='standalone-blind-rank-challenge-20260716b-challenge-back';",
              'rank version')
          rank = replace_once(rank,
              "    const exact=5-movement.length;\n    host.innerHTML=`",
              "    const exact=5-movement.length;\n    window.UFC_STANDALONE_REMATCH_CONTEXT={\n      gameType:'blind-rank',\n      gameVersion:state.challenge?.game_version||'blind-rank-standalone-v1',\n      page:'blind-rank-challenge.html',\n      originalCode:code,\n      setup:normalizeJson(state.challenge?.setup)||{},\n      result:{ranking:[...myIds]},\n      metadata:{comparison:'blind-rank-placement'}\n    };\n    host.innerHTML=`",
              'rank context')
          rank = replace_once(rank,
              "        <a class=\"primary-action\" href=\"index.html#play\">PLAY ANOTHER GAME</a>",
              "        <button type=\"button\" class=\"primary-action\" data-challenge-back>CHALLENGE BACK</button>\n        <a class=\"secondary-action\" href=\"index.html#play\">PLAY A NEW GAME</a>",
              'rank actions')
          rank_path.write_text(rank, encoding='utf-8')

          resume_path = Path('assets/js/standalone-blind-resume-challenge.js')
          resume = resume_path.read_text(encoding='utf-8')
          resume = replace_once(resume,
              "const VERSION='standalone-blind-resume-challenge-20260716a';",
              "const VERSION='standalone-blind-resume-challenge-20260716b-challenge-back';",
              'resume version')
          resume = replace_once(resume,
              "    const disagreements=TOTAL_ROUNDS-matches;\n    host.innerHTML=`",
              "    const disagreements=TOTAL_ROUNDS-matches;\n    window.UFC_STANDALONE_REMATCH_CONTEXT={\n      gameType:'blind-resume',\n      gameVersion:state.challenge?.game_version||'blind-resume-standalone-v1',\n      page:'blind-resume-challenge.html',\n      originalCode:code,\n      setup:normalizeJson(state.challenge?.setup)||{},\n      result:{choices:[...mine],score:myScore},\n      metadata:{comparison:'blind-resume-round-picks'}\n    };\n    host.innerHTML=`",
              'resume context')
          resume = replace_once(resume,
              "        <a class=\"primary-action\" href=\"index.html#play\">PLAY ANOTHER GAME</a>",
              "        <button type=\"button\" class=\"primary-action\" data-challenge-back>CHALLENGE BACK</button>\n        <a class=\"secondary-action\" href=\"index.html#play\">PLAY A NEW GAME</a>",
              'resume actions')
          resume_path.write_text(resume, encoding='utf-8')

          pages = [
              ('challenge.html', 'standalone-keep-cut-challenge.js', 'standalone-keep-cut-challenge-20260716b-challenge-back'),
              ('blind-rank-challenge.html', 'standalone-blind-rank-challenge.js', 'standalone-blind-rank-challenge-20260716b-challenge-back'),
              ('blind-resume-challenge.html', 'standalone-blind-resume-challenge.js', 'standalone-blind-resume-challenge-20260716b-challenge-back'),
          ]
          helper = '  <script src="assets/js/standalone-challenge-rematch.js?v=standalone-challenge-rematch-20260716a"></script>\n'
          for filename, controller, version in pages:
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if 'assets/js/standalone-challenge-rematch.js' not in text:
                  marker = re.search(r'(  <script src="assets/js/play-profile-identity\.js\?v=[^"]+"></script>\n)', text)
                  if not marker:
                      raise SystemExit(f'{filename}: profile marker missing')
                  text = text[:marker.end()] + helper + text[marker.end():]
              text, count = re.subn(
                  rf'assets/js/{re.escape(controller)}\?v=[^"\s]+',
                  f'assets/js/{controller}?v={version}',
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f'{filename}: controller version match {count}')
              text, count = re.subn(
                  r'<meta name="app-build" content="[^"]+">',
                  f'<meta name="app-build" content="20260716-challenge-back-{filename.split(".")[0]}">',
                  text,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f'{filename}: app build match {count}')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Validate challenge scripts
        run: |
          node --check assets/js/standalone-challenge-rematch.js
          node --check assets/js/standalone-keep-cut-challenge.js
          node --check assets/js/standalone-blind-rank-challenge.js
          node --check assets/js/standalone-blind-resume-challenge.js
          test "$(grep -Rho 'data-challenge-back' assets/js/standalone-*challenge.js | wc -l)" -eq 3
          test "$(grep -Rho 'UFC_STANDALONE_REMATCH_CONTEXT' assets/js/standalone-*challenge.js | wc -l)" -eq 3
          ! grep -q 'p_score' assets/js/standalone-challenge-rematch.js
      - name: Commit rematch activation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/enable-standalone-challenge-rematches.yml
          git add challenge.html blind-rank-challenge.html blind-resume-challenge.html assets/js/standalone-keep-cut-challenge.js assets/js/standalone-blind-rank-challenge.js assets/js/standalone-blind-resume-challenge.js
          git commit -m "Enable challenge-back rematches"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep $((attempt * 3))
          done
          exit 1
