name: Cache bust Blind Resume RPC fix

on:
  push:
    paths:
      - '.github/workflows/cache-bust-blind-resume-rpc-fix.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync current main
        run: git pull --rebase origin main
      - name: Update Blind Resume cache versions
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = re.sub(
              r'<meta name="app-build" content="[^"]*"\s*/>',
              '<meta name="app-build" content="20260716-blind-resume-rpc-fix" />',
              text,
              count=1,
          )
          text = re.sub(
              r'assets/js/keep-cut-standalone-share\.js\?v=[^"\s]+',
              'assets/js/keep-cut-standalone-share.js?v=keep-cut-standalone-share-20260716d-blind-resume-rpc-fix',
              text,
              count=1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit and push cache bust
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cache-bust-blind-resume-rpc-fix.yml
          git add index.html
          git commit -m "Finalize Blind Resume RPC fix"
          for attempt in 1 2 3 4; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 3
          done
          exit 1