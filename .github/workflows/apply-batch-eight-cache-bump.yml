name: Apply Batch Eight Cache Bump

on:
  push:
    branches: [agent/fighter-data-phase-1]
    paths:
      - 'scripts/bump-batch-eight-registry-cache.mjs'
      - '.github/workflows/apply-batch-eight-cache-bump.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-batch-eight-cache-bump
  cancel-in-progress: false

jobs:
  bump-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out current branch
        uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0
      - name: Bump registry cache key
        run: node scripts/bump-batch-eight-registry-cache.mjs
      - name: Commit cache key
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump clean batch-eight registry cache key"
          git pull --rebase origin agent/fighter-data-phase-1
          git push origin HEAD:agent/fighter-data-phase-1
