name: Update Picks baseline branch once

on:
  push:
    branches:
      - fix/picks-maintained-card-baseline
    paths:
      - '.github/workflows/update-picks-baseline-branch-once.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/picks-maintained-card-baseline
          fetch-depth: 0

      - name: Remove one-time workflow and merge current main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/update-picks-baseline-branch-once.yml
          git commit -m "Remove one-time Picks branch updater"
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:fix/picks-maintained-card-baseline
