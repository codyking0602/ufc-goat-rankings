name: Cache bust Intelligence compact polish

on:
  push:
    paths:
      - '.github/workflows/cache-bust-intelligence-compact.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update build markers
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path=Path('index.html')
          text=path.read_text(encoding='utf-8')
          text=re.sub(r'<meta name="app-build" content="[^"]*"\s*/>','<meta name="app-build" content="20260716-intelligence-compact-builder" />',text,count=1)
          text=re.sub(r'assets/css/intelligence\.css\?v=[^"\s]+','assets/css/intelligence.css?v=intelligence-css-20260716c-compact-builder',text,count=1)
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit cache bust
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cache-bust-intelligence-compact.yml
          git add index.html
          git commit -m "Cache bust compact Intelligence polish"
          git push
