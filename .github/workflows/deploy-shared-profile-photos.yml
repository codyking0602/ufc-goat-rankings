name: Deploy Shared Profile and Activity

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-shared-profile-photos.yml'
      - 'supabase/app-profile-photo-upload-phase.sql'
      - 'supabase/play-profile-challenges-phase.sql'
      - 'share.html'
      - 'assets/data/what-changed.js'
      - 'assets/js/what-changed.js'
      - 'assets/js/app-update-watcher.js'
      - 'assets/js/share-deep-links.js'
      - 'assets/js/profile-challenges.js'
      - 'assets/js/find-leader.js'
      - 'assets/js/app-profile.js'
      - 'assets/js/profile-activity.js'
      - 'assets/js/find-leader-retention.js'
      - 'assets/js/picks-season-loop.js'
      - 'assets/js/picks-internal-navigation.js'
      - 'assets/js/picks-home-event-cleanup.js'
      - 'assets/js/picks-mobile-polish.js'
      - 'assets/css/picks-mobile-polish.css'
      - 'assets/js/product-architecture.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-shared-profile-activity
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate profile challenges, compact updates and fighter photos
        run: |
          node --check assets/data/what-changed.js
          node --check assets/js/what-changed.js
          node --check assets/js/app-update-watcher.js
          node --check assets/js/share-deep-links.js
          node --check assets/js/profile-challenges.js
          node --check assets/js/find-leader.js
          node --check assets/js/app-profile.js
          node --check assets/js/profile-activity.js
          node --check assets/js/find-leader-retention.js
          node --check assets/js/picks-season-loop.js
          node --check assets/js/picks-internal-navigation.js
          node --check assets/js/picks-home-event-cleanup.js
          node --check assets/js/picks-mobile-polish.js
          node --check assets/js/picks-social-retention.js
          node --check assets/js/picks-settings-admin-cleanup.js
          node --check assets/js/profile-avatar-sync.js
          node --check assets/js/product-polish.js
          node --check assets/js/product-architecture.js
          grep -Fq 'what-changed-data-20260718e-two-card-reset' assets/data/what-changed.js
          grep -Fq 'what-changed-20260718b-compact' assets/js/what-changed.js
          grep -Fq 'app-update-watcher-20260718d-centered-two-card' assets/js/app-update-watcher.js
          grep -Fq 'share-deep-links-20260718b-no-comparisons' assets/js/share-deep-links.js
          grep -Fq 'profile-challenges-20260718c-stable-inbox' assets/js/profile-challenges.js
          grep -Fq 'find-leader-20260718c-photo-authority' assets/js/find-leader.js
          grep -Fq 'PHOTO_ALIASES' assets/js/find-leader.js
          grep -Fq 'data-fighter-photo="true"' assets/js/find-leader.js
          grep -Fq 'CHALLENGE SOMEONE' assets/js/find-leader.js
          grep -Fq 'play_send_profile_challenge' assets/js/profile-challenges.js
          grep -Fq 'play_profile_challenge_inbox' assets/js/profile-challenges.js
          grep -Fq 'renderActivityInbox' assets/js/profile-challenges.js
          grep -Fq 'inboxSignature' assets/js/profile-challenges.js
          grep -Fq "ROUTE_TYPES=new Set(['fighter','find-leader','play-challenge','picks-event','war-room'])" assets/js/share-deep-links.js
          test "$(grep -c "id:'" assets/data/what-changed.js)" -eq 2
          grep -Fq "headline:'Octagon HQ app redesign'" assets/data/what-changed.js
          grep -Fq "headline:'New fighter: Anthony Pettis'" assets/data/what-changed.js
          ! grep -Fq 'SHARE RESULT' assets/js/find-leader.js
          ! grep -Fq 'CHALLENGE A FRIEND' assets/js/find-leader.js
          ! grep -Fq 'shareComparison' assets/js/share-deep-links.js
          ! grep -Fq 'data-phase2e-share-comparison' assets/js/share-deep-links.js
          grep -Fq 'create or replace function public.play_send_profile_challenge' supabase/play-profile-challenges-phase.sql
          grep -Fq 'create or replace function public.play_profile_challenge_inbox' supabase/play-profile-challenges-phase.sql
          grep -Fq 'create or replace function public.play_open_profile_challenge' supabase/play-profile-challenges-phase.sql
          grep -Fq 'create or replace function public.play_submit_profile_challenge' supabase/play-profile-challenges-phase.sql
          grep -Fq 'Editorial release rule' assets/data/what-changed.js
          grep -Fq 'octagon-hq-what-changed-seen-v1' assets/data/what-changed.js
          grep -Fq 'data-what-changed-entry' assets/js/what-changed.js
          grep -Fq 'property="og:image"' share.html
          grep -Fq 'window.location.replace' share.html
          grep -Fq 'find-leader-retention-20260718c-phase-2b-lazy' assets/js/find-leader-retention.js
          grep -Fq 'picks-season-loop-20260718d-canonical-ui' assets/js/picks-season-loop.js
          grep -Fq 'picks-internal-navigation-20260718a-fast-routes' assets/js/picks-internal-navigation.js
          grep -Fq 'picks-home-event-cleanup-20260718c-no-reminder' assets/js/picks-home-event-cleanup.js
          grep -Fq 'removeUpcomingReminder' assets/js/picks-home-event-cleanup.js
          grep -Fq 'picks-mobile-polish-20260718f-event-art' assets/js/picks-mobile-polish.js
          grep -Fq 'product-architecture-20260718q-picks-cohesion' assets/js/product-architecture.js
          grep -Fq "picks_group_snapshot" assets/js/picks-season-loop.js
          grep -Fq "identityMember" assets/js/picks-season-loop.js
          grep -Fq "patchEventStandings" assets/js/picks-season-loop.js
          grep -Fq "data-home-layout" assets/js/picks-home-event-cleanup.js
          grep -Fq "picks-room-no-share" assets/js/picks-mobile-polish.js
          ! grep -Fq "picks-season-grid" assets/js/picks-season-loop.js
          ! grep -Fq "profileObserver=new MutationObserver" assets/js/find-leader-retention.js
          ! grep -Eiq "beta|bootloader|cache failure|repair history" assets/data/what-changed.js
          grep -Fq 'add column if not exists profile_photo_data text' supabase/app-profile-photo-upload-phase.sql
          grep -Fq 'create or replace function public.app_profile_set_photo' supabase/app-profile-photo-upload-phase.sql

      - name: Wire compact updates and photo authority into the live page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path=Path('index.html')
          text=path.read_text()

          js_versions={
              'app-profile.js':'app-profile-20260718b-photo-upload',
              'picks-social-retention.js':'picks-social-retention-20260718f-shared-profile',
              'picks-settings-admin-cleanup.js':'picks-settings-admin-cleanup-20260718e-admin-only',
              'picks-internal-navigation.js':'picks-internal-navigation-20260718a-fast-routes',
              'picks-home-event-cleanup.js':'picks-home-event-cleanup-20260718c-no-reminder',
              'picks-mobile-polish.js':'picks-mobile-polish-20260718f-event-art',
              'find-leader.js':'find-leader-20260718c-photo-authority',
              'app-update-watcher.js':'app-update-watcher-20260718d-centered-two-card',
              'product-architecture.js':'product-architecture-20260718q-picks-cohesion',
          }
          for filename,version in js_versions.items():
              pattern=rf'assets/js/{re.escape(filename)}\?v=[^"\s]+'
              replacement=f'assets/js/{filename}?v={version}'
              text,count=re.subn(pattern,replacement,text,count=1)
              if count!=1:
                  raise SystemExit(f'Could not update {filename} in index.html')

          css_versions={'picks-mobile-polish.css':'picks-mobile-polish-20260718f-event-art'}
          for filename,version in css_versions.items():
              pattern=rf'assets/css/{re.escape(filename)}\?v=[^"\s]+'
              replacement=f'assets/css/{filename}?v={version}'
              text,count=re.subn(pattern,replacement,text,count=1)
              if count!=1:
                  raise SystemExit(f'Could not update {filename} in index.html')

          season_src='assets/js/picks-season-loop.js?v=picks-season-loop-20260718d-canonical-ui'
          existing=r'<script src="assets/js/picks-season-loop\.js\?v=[^"]+"></script>'
          if re.search(existing,text):
              text=re.sub(existing,f'<script src="{season_src}"></script>',text,count=1)
          else:
              anchor=r'(<script src="assets/js/app-profile\.js\?v=[^"]+"></script>)'
              text,count=re.subn(anchor,rf'\1\n  <script src="{season_src}"></script>',text,count=1)
              if count!=1:
                  raise SystemExit('Could not insert picks-season-loop.js after app-profile.js')

          changelog_text=Path('assets/data/what-changed.js').read_text()
          changelog_match=re.search(r"version:'([^']+)'",changelog_text)
          if not changelog_match:
              raise SystemExit('Could not read What Changed data version')
          changelog_src=f'assets/data/what-changed.js?v={changelog_match.group(1)}'
          text=re.sub(r'\s*<script src="assets/data/what-changed\.js\?v=[^"]+"></script>','',text)
          watcher_tag=re.search(r'(?P<indent>\s*)<script src="assets/js/app-update-watcher\.js\?v=[^"]+"></script>',text)
          if not watcher_tag:
              raise SystemExit('Could not find app-update-watcher.js in index.html')
          replacement=f'{watcher_tag.group("indent")}<script src="{changelog_src}"></script>{watcher_tag.group("indent")}<script src="assets/js/app-update-watcher.js?v=app-update-watcher-20260718d-centered-two-card"></script>'
          text=text[:watcher_tag.start()]+replacement+text[watcher_tag.end():]

          profile_text=Path('assets/js/profile-challenges.js').read_text()
          profile_match=re.search(r"const VERSION='([^']+)'",profile_text)
          if not profile_match:
              raise SystemExit('Could not read profile challenge version')
          profile_version=profile_match.group(1)
          text=re.sub(r'\s*<script src="assets/js/profile-challenges\.js\?v=[^"]+"></script>','',text)
          text=re.sub(r'\s*<script src="assets/js/share-deep-links\.js\?v=[^"]+"></script>','',text)
          tags=f'  <script src="assets/js/profile-challenges.js?v={profile_version}"></script>\n  <script src="assets/js/share-deep-links.js?v=share-deep-links-20260718b-no-comparisons"></script>'
          if '</body>' not in text:
              raise SystemExit('Could not find closing body tag')
          text=text.replace('</body>',f'{tags}\n</body>',1)

          text=re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260718-phase-2e-two-card-photo-fix" />',
              text,
              count=1,
          )
          path.write_text(text)
          PY

      - name: Commit live asset versions
        run: |
          if git diff --quiet -- index.html; then
            echo 'Live compact update and photo asset versions are unchanged.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
            git add index.html
            git commit -m 'Deploy two-card updates and fighter photos [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Apply and audit profile migrations
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project=os.environ['SUPABASE_PROJECT_REF']
          token=os.environ.get('SUPABASE_ACCESS_TOKEN','').strip()
          status_path=Path('supabase/goat26-deployment-status.json')
          profile_migration=Path('supabase/app-profile-photo-upload-phase.sql').read_text()
          challenge_migration=Path('supabase/play-profile-challenges-phase.sql').read_text()

          def query(sql,read_only=False):
              request=urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Accept':'application/json',
                      'Authorization':f'Bearer {token}',
                      'Content-Type':'application/json',
                      'User-Agent':'UFC-Shared-Profile-Activity/1.0',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=90) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:1600]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def rows(response):
              return response.get('result',response) if isinstance(response,dict) else response

          if not token:
              raise RuntimeError('SUPABASE_ACCESS_TOKEN is not configured.')

          query(profile_migration,read_only=False)
          query(challenge_migration,read_only=False)
          audit_sql="""
          select jsonb_build_object(
            'column_exists',exists(
              select 1 from information_schema.columns
              where table_schema='public' and table_name='pick_group_members' and column_name='profile_photo_data'
            ),
            'profile_snapshot_rpc',to_regprocedure('public.app_profile_group_snapshot(text)') is not null,
            'photo_rpc',to_regprocedure('public.app_profile_set_photo(text,text)') is not null,
            'daily_leaderboard_rpc',to_regprocedure('public.play_daily_leaderboard(text,date,integer)') is not null,
            'picks_group_rpc',to_regprocedure('public.picks_group_snapshot(text,text,text)') is not null,
            'picks_room_rpc',to_regprocedure('public.picks_room_snapshot(text,text)') is not null,
            'picks_social_rpc',to_regprocedure('public.picks_social_snapshot(text,text)') is not null,
            'picks_profile_rpc',to_regprocedure('public.picks_social_update_profile(text,text,text,boolean)') is not null,
            'recipient_column',exists(
              select 1 from information_schema.columns
              where table_schema='public' and table_name='play_challenges' and column_name='recipient_member_id'
            ),
            'profile_challenge_send_rpc',to_regprocedure('public.play_send_profile_challenge(text,uuid,text,text,jsonb,jsonb,jsonb,integer)') is not null,
            'profile_challenge_inbox_rpc',to_regprocedure('public.play_profile_challenge_inbox(text)') is not null,
            'profile_challenge_open_rpc',to_regprocedure('public.play_open_profile_challenge(text,text)') is not null,
            'profile_challenge_submit_rpc',to_regprocedure('public.play_submit_profile_challenge(text,text,jsonb,numeric,jsonb)') is not null,
            'play_create_rpc',to_regprocedure('public.play_create_challenge(text,text,text,text,jsonb,jsonb,jsonb,integer)') is not null,
            'play_get_rpc',to_regprocedure('public.play_get_challenge(text)') is not null,
            'photo_profiles',(
              select count(*) from public.pick_group_members gm
              join public.pick_groups g on g.id=gm.group_id
              where g.code='GOAT26' and coalesce(gm.is_active,true)
                and nullif(trim(gm.profile_photo_data),'') is not null
            )
          ) as audit;
          """
          response=rows(query(audit_sql,read_only=True))
          audit=response[0].get('audit') if isinstance(response,list) and response else None
          if isinstance(audit,str): audit=json.loads(audit)
          required=[
              'column_exists','profile_snapshot_rpc','photo_rpc','daily_leaderboard_rpc','picks_group_rpc',
              'picks_room_rpc','picks_social_rpc','picks_profile_rpc','recipient_column',
              'profile_challenge_send_rpc','profile_challenge_inbox_rpc','profile_challenge_open_rpc',
              'profile_challenge_submit_rpc','play_create_rpc','play_get_rpc'
          ]
          if not isinstance(audit,dict) or not all(audit.get(key) for key in required):
              raise RuntimeError(f'Profile and challenge audit failed: {audit}')

          status={}
          if status_path.exists():
              try: status=json.loads(status_path.read_text())
              except Exception: status={}
          status['profile_photos']={**audit,'phase':'shared-photo-or-fighter-avatar','crop_size':320,'status':'active'}
          status['activity_profile']={'phase':'phase-2a','status':'active','sources':['play-local-ledger','find-leader-history','picks-group-snapshot','war-room-snapshot','profile-challenge-inbox']}
          status['find_leader_retention']={
              'phase':'phase-2b','status':'active','history_days':35,'reset_timezone':'America/Chicago',
              'official_score_rule':'first-completed-attempt','best_score_rule':'replays-can-improve-best-only',
              'history_source':'play_daily_leaderboard','loading_policy':'lazy-on-play-profile-or-history',
              'photo_source':'shared-fighter-photo-authority-with-alias-fallback'
          }
          status['picks_season_loop']={
              'phase':'phase-2c','status':'active','layout':'home-season-summary-leaderboard-archive',
              'canonical_totals_source':'picks_group_snapshot','event_detail_source':'picks_room_snapshot',
              'tie_policy':'shared-rank-for-exact-equals','reminders':'removed',
              'event_pre_score_rank':'dash','home_next_event':'removed-at-source',
              'event_art':'load-confirmed-persistent','event_share':'home-only',
              'activity_profile_source':'canonical-picks-group-totals','internal_navigation':'immediate-scoped-observers'
          }
          status['what_changed']={
              'phase':'phase-2d','status':'active','canonical_source':'assets/data/what-changed.js',
              'controller':'assets/js/what-changed.js','header_owner':'assets/js/app-update-watcher.js',
              'unread_policy':'unseen-entry-ids-local','loading_policy':'lightweight-data-controller-lazy',
              'fighter_hydration':'current-production-ranking-data','deep_links':'fighter-profile-and-destination',
              'density':'compact-mobile','current_seed_entries':2,'initial_backlog_collapsed':True,
              'editorial_policy':'one-concise-major-release-card-plus-new-fighter-cards'
          }
          status['sharing_deep_links']={
              'phase':'phase-2e','status':'active','owner':'assets/js/profile-challenges.js',
              'link_owner':'assets/js/share-deep-links.js',
              'targets':['fighter-profile','find-leader-profile-challenge','picks-event-recap','war-room-discussion'],
              'removed':['prepared-comparison-sharing','duplicate-result-share-action'],
              'primary_action':'challenge-someone','delivery':'profile-inbox','fallback':'short-link',
              'profile_inbox_source':'play_profile_challenge_inbox','exact_board':True,
              'recipient_score_visibility':'hidden-until-completion','push_notifications':False,
              'render_policy':'signature-stable-no-loop',
              'entry_page':'share.html','social_preview':'generic-static-card-plus-runtime-metadata'
          }
          status['checked_at']=datetime.now(timezone.utc).isoformat()
          status_path.write_text(json.dumps(status,indent=2,sort_keys=True)+'\n')
          print('Two-card What Changed feed, centered NEW control and Find the Leader photos verified.')
          PY

      - name: Commit deployment audit
        run: |
          if git diff --quiet -- supabase/goat26-deployment-status.json; then
            echo 'Deployment audit is unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add supabase/goat26-deployment-status.json
          git commit -m 'Record two-card updates and fighter photo fix [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
