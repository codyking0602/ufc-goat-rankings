name: Trigger Phase 2 identity profile audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase-2-identity-profile-audit-trigger.yml'
      - '.github/workflows/phase-2-identity-profile-audit-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-2-identity-profile-audit
      - name: Execute audited documentation patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import traceback
          source=Path('.github/workflows/phase-2-identity-profile-audit-apply.yml').read_text()
          start=source.index("          python3 - <<'PY'\n")+len("          python3 - <<'PY'\n")
          end=source.index("\n          PY\n",start)
          code='\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end].splitlines())
          try:
              exec(compile(code,'phase-2-identity-profile-audit','exec'))
          except Exception:
              Path('phase-2-identity-audit-error.txt').write_text(traceback.format_exc())
              raise
          PY
          git diff --check
      - name: Commit documentation audit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/startup/STATUS.md docs/startup/OWNERS.md docs/startup/DECISIONS.md docs/startup/CHANGELOG.md docs/startup/PHASE-2-IDENTITY-PROFILE-OWNERSHIP-AUDIT.md
          git commit -m "Document Phase 2 identity and profile ownership audit"
          git push origin HEAD:agent/phase-2-identity-profile-audit
      - name: Commit diagnostic on failure
        if: failure()
        run: |
          test -f phase-2-identity-audit-error.txt || exit 0
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add phase-2-identity-audit-error.txt
          git commit -m "Record identity audit workflow error"
          git push origin HEAD:agent/phase-2-identity-profile-audit
# diagnostic-trigger
