name: Apply Quality Wins revision cache chain

on:
  push:
    branches:
      - fix/unified-six-category-pipeline
    paths:
      - .github/workflows/apply-quality-revisions.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/unified-six-category-pipeline
          fetch-depth: 0

      - name: Update cache chain
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('assets/data/opponent-quality-division-calibration-batch-four.js'): {
                  "const VERSION='opponent-quality-division-calibration-batch-four-20260710b-chuck-tito';":
                      "const VERSION='opponent-quality-division-calibration-batch-four-20260710c-reviewed';",
                  "opponent-quality-ledger-batch-eight.js?v=opponent-quality-ledger-batch-eight-20260710a-chuck-tito":
                      "opponent-quality-ledger-batch-eight.js?v=opponent-quality-ledger-batch-eight-20260710b-reviewed",
              },
              Path('assets/data/opponent-quality-dj-calibration.js'): {
                  "const VERSION='opponent-quality-dj-calibration-20260710a-chuck-tito';":
                      "const VERSION='opponent-quality-dj-calibration-20260710b-reviewed';",
                  "opponent-quality-division-calibration-batch-four.js?v=opponent-quality-division-calibration-batch-four-20260710b-chuck-tito":
                      "opponent-quality-division-calibration-batch-four.js?v=opponent-quality-division-calibration-batch-four-20260710c-reviewed",
              },
              Path('assets/js/championship-resume-live.js'): {
                  "const VERSION='championship-resume-live-20260710b-quality-batch-one';":
                      "const VERSION='championship-resume-live-20260710c-quality-revisions';",
                  "opponent-quality-dj-calibration.js?v=opponent-quality-dj-calibration-20260710a-chuck-tito":
                      "opponent-quality-dj-calibration.js?v=opponent-quality-dj-calibration-20260710b-reviewed",
              },
              Path('assets/data/module-versions.js'): {
                  'championshipResumeLive:"20260710b-quality-batch-one"':
                      'championshipResumeLive:"20260710c-quality-revisions"',
              },
              Path('assets/data/ranking-data-patches.js'): {
                  "const VERSION='ranking-data-patches-20260710b-quality-batch-one';":
                      "const VERSION='ranking-data-patches-20260710c-quality-revisions';",
                  "championship-resume-live.js?v=championship-resume-live-20260710b-quality-batch-one":
                      "championship-resume-live.js?v=championship-resume-live-20260710c-quality-revisions",
              },
              Path('index.html'): {
                  'module-versions.js?v=module-versions-20260710c-quality-batch-one':
                      'module-versions.js?v=module-versions-20260710d-quality-revisions',
                  'ranking-data-patches.js?v=ranking-data-patches-20260710b-quality-batch-one':
                      'ranking-data-patches.js?v=ranking-data-patches-20260710c-quality-revisions',
              },
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs.items():
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one occurrence of {old!r}; found {count}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit revision cache chain
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-quality-revisions.yml
          git add assets/data/opponent-quality-division-calibration-batch-four.js assets/data/opponent-quality-dj-calibration.js assets/js/championship-resume-live.js assets/data/module-versions.js assets/data/ranking-data-patches.js index.html
          git diff --cached --check
          git commit -m "Align reviewed Chuck and Tito Quality Wins cache chain"
          git push origin HEAD:fix/unified-six-category-pipeline
