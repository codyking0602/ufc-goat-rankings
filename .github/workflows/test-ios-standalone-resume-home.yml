name: Test iOS Home Startup Stability

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/js/fresh-home-route-bootstrap.js'
      - 'assets/js/fresh-home-launch.js'
      - 'scripts/test-ios-standalone-resume-home.mjs'
      - '.github/workflows/test-ios-standalone-resume-home.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Quiet checkout
        working-directory: .
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: git clone --quiet --depth 1 --branch "$BRANCH_NAME" "https://github.com/${GITHUB_REPOSITORY}.git" repo
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --check assets/js/fresh-home-route-bootstrap.js && node --check assets/js/fresh-home-launch.js && node --check scripts/test-ios-standalone-resume-home.mjs
      - run: npm install --no-save --package-lock=false playwright@1.54.1 > /tmp/ios-playwright-install.log 2>&1 && npx playwright install --with-deps chromium >> /tmp/ios-playwright-install.log 2>&1
      - run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/ios-home-startup-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/ios-home-startup-server.log
          exit 1
      - name: Show only final aggregate failure
        run: |
          if ! node scripts/test-ios-standalone-resume-home.mjs > /tmp/ios-aggregate.log 2>&1; then
            tail -n 120 /tmp/ios-aggregate.log
            exit 1
          fi
