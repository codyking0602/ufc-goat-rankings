name: Apply Production Index Cleanup

on:
  push:
    branches: [agent/fighter-data-phase-1]
    paths:
      - 'scripts/clean-production-ranking-index.mjs'
      - '.github/workflows/apply-production-index-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-final-production-index-cleanup
  cancel-in-progress: false

jobs:
  clean-index:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out current cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0

      - name: Remove final direct scoring prerequisites from shell
        run: node scripts/clean-production-ranking-index.mjs

      - name: Commit cleaned production shell
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html is already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove final direct scoring prerequisites from shell"
          git pull --rebase origin agent/fighter-data-phase-1
          git push origin HEAD:agent/fighter-data-phase-1
