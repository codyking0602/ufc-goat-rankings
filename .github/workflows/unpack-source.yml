name: Convert Zip Package To Source Files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/unpack-source.yml'
      - 'ufc_goat_rankings_github_pages_ready.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Unpack source files
        run: |
          if [ ! -f ufc_goat_rankings_github_pages_ready.zip ]; then
            echo "No zip package found. Source files already appear to be unpacked."
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          unzip -o ufc_goat_rankings_github_pages_ready.zip -d "$tmpdir"

          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/unused')
          PY

          python3 - "$tmpdir" <<'PY'
          from pathlib import Path
          import sys
          root = Path(sys.argv[1])
          p = root / 'index.html'
          if p.exists():
              s = p.read_text()
              s = s.replace('.fighter-photo.has-photo { background-size:cover; background-position:center 8%; }', '.fighter-photo.has-photo { background-size:cover; background-position:center top; }')
              s = s.replace('.fighter-photo-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 8%; z-index:0; }', '.fighter-photo-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center top; z-index:0; }')
              s = s.replace('@media (max-width:800px){ .profile-hero { grid-template-columns:1fr; } .fighter-photo { min-height:260px; } .profile-ovr { font-size:58px; } }', '@media (max-width:800px){ .profile-hero { grid-template-columns:1fr; } .fighter-photo { aspect-ratio:4 / 5; min-height:0; } .profile-ovr { font-size:58px; } }')
              s = s.replace('  .fighter-photo { min-height:360px; border-radius:22px; }', '  .fighter-photo { aspect-ratio:4 / 5; min-height:0; border-radius:22px; }')
              s = s.replace('  .fighter-photo { min-height:330px; }', '  .fighter-photo { aspect-ratio:4 / 5; min-height:0; }')
              p.write_text(s)
          PY

          rsync -a "$tmpdir"/ ./

          cat > README.md <<'EOF'
          # UFC GOAT Rankings

          Static UFC-only GOAT ranking app.

          Live preview:

          `https://codyking0602.github.io/ufc-goat-rankings/`

          ## Source structure

          - `index.html` — main app
          - `assets/fighters/` — fighter thumbnails and profile images
          - `.github/workflows/pages.yml` — GitHub Pages deployment

          ## Fighter image convention

          Use two WebP images per fighter:

          - `fighter-slug-thumb.webp` for ranking cards
          - `fighter-slug.webp` for fighter profiles

          Example:

          - `jon-jones-thumb.webp`
          - `jon-jones.webp`
          EOF

          git rm -f ufc_goat_rankings_github_pages_ready.zip
          git add index.html README.md .nojekyll assets .github/workflows/pages.yml .github/workflows/unpack-source.yml

          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Convert app package to real source files"
          git push
