name: Finalize Verified GOAT26 Group

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-goat26-group.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-verified-goat26-group
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact verified migration
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project_ref = os.environ['SUPABASE_PROJECT_REF']
          access_token = os.environ.get('SUPABASE_ACCESS_TOKEN', '').strip()
          migration_path = Path('supabase/app-canonical-group-goat26-phase.sql')
          status_path = Path('supabase/goat26-deployment-status.json')
          migration_sql = migration_path.read_text()

          replacements = {
              "array['cody','daddy','rhonda','shane','tyler']::text[]": "array['brock','cody','rhonda','shane','tony','tyler']::text[]",
              'Cody, Daddy, Rhonda, Shane, and Tyler': 'Brock, Cody, Rhonda, Shane, Tony, and Tyler',
              'five-member UFC Picks fingerprint': 'six-member UFC Picks fingerprint',
              'verified five-member friend group': 'verified six-member friend group',
          }
          for old, new in replacements.items():
              migration_sql = migration_sql.replace(old, new)

          if "array['brock','cody','rhonda','shane','tony','tyler']::text[]" not in migration_sql:
              raise RuntimeError('The verified six-member GOAT26 fingerprint was not written to the migration.')

          migration_path.write_text(migration_sql)

          audit_sql = """
          select jsonb_build_object(
            'status','active',
            'code',g.code,
            'name',g.name,
            'is_canonical',coalesce(g.is_canonical,false),
            'active_members',(select count(*) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'member_names',(
              select jsonb_agg(gm.display_name order by lower(trim(gm.display_name)))
              from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'events',(select count(*) from public.pick_group_events ge where ge.group_id=g.id),
            'rooms',(select count(*) from public.pick_rooms r where r.group_id=g.id),
            'saved_picks',(
              select count(*)
              from public.pick_rooms r
              join public.pick_room_members rm on rm.room_id=r.id
              join public.pick_selections ps on ps.member_id=rm.id
              where r.group_id=g.id
            )
          ) as audit
          from public.pick_groups g
          where g.code='GOAT26'
          order by coalesce(g.is_canonical,false) desc
          limit 1;
          """

          def write_status(payload):
              result = dict(payload)
              result['checked_at'] = datetime.now(timezone.utc).isoformat()
              status_path.write_text(json.dumps(result, indent=2, sort_keys=True) + '\n')

          def query(sql, read_only=False):
              request = urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project_ref}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Authorization':f'Bearer {access_token}',
                      'Content-Type':'application/json',
                      'Accept':'application/json',
                      'User-Agent':'github-actions-goat26-finalizer/1.0',
                      'X-Client-Info':'ufc-goat-rankings-goat26-finalizer',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=90) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:1500]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def value(response,key):
              rows=response.get('result',response) if isinstance(response,dict) else response
              if isinstance(rows,list) and rows:
                  result=rows[0].get(key,rows[0]) if isinstance(rows[0],dict) else None
              elif isinstance(rows,dict):
                  result=rows.get(key,rows)
              else:
                  result=None
              if isinstance(result,str):
                  result=json.loads(result)
              return result

          if not access_token:
              write_status({'status':'blocked','code':'GOAT26','reason':'SUPABASE_ACCESS_TOKEN is not configured.'})
              raise SystemExit(0)

          try:
              query(migration_sql,read_only=False)
              audit=value(query(audit_sql,read_only=True),'audit')
              expected=['Brock','Cody','Rhonda','Shane','Tony','Tyler']
              names=sorted((audit or {}).get('member_names') or [],key=lambda item:str(item).lower())
              if not isinstance(audit,dict):
                  raise RuntimeError('The GOAT26 audit returned no group.')
              if audit.get('code')!='GOAT26' or not audit.get('is_canonical') or names!=expected:
                  raise RuntimeError(f'The final GOAT26 identity audit did not match: {audit}')
              if int(audit.get('events') or 0)!=2 or int(audit.get('saved_picks') or 0)!=50:
                  raise RuntimeError(f'The final GOAT26 history audit did not match 2 events and 50 saved picks: {audit}')
              audit['deployment_method']='supabase-management-api'
              audit['verified_group']='existing UFC Picks group renamed in place'
              write_status(audit)
              print('GOAT26 activated and verified with all existing history preserved.')
          except Exception as error:
              reason=str(error).replace(access_token,'[redacted]')[:1800]
              write_status({'status':'failed','code':'GOAT26','reason':reason})
              print(f'GOAT26 finalization failed: {reason}')
          PY

      - name: Commit migration and result
        if: always()
        run: |
          if [ ! -f supabase/goat26-deployment-status.json ]; then
            printf '%s\n' '{"code":"GOAT26","status":"failed","reason":"Finalizer produced no result."}' > supabase/goat26-deployment-status.json
          fi
          if git diff --quiet -- supabase/app-canonical-group-goat26-phase.sql supabase/goat26-deployment-status.json; then
            echo 'GOAT26 source and result are unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/app-canonical-group-goat26-phase.sql supabase/goat26-deployment-status.json
          git commit -m 'Activate verified GOAT26 group [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
