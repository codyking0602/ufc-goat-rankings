name: Sync Main JSON History Once

on:
  push:
    branches:
      - agent/fighter-data-phase-1
    paths:
      - '.github/workflows/sync-main-json-history-once.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scoring branch
        uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0
          persist-credentials: true

      - name: Merge main JSON-only history and remove this workflow
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff --no-commit origin/main || true
          if git ls-files -u | grep -q .; then
            conflicts=$(git diff --name-only --diff-filter=U | sort)
            expected=$(printf '%s\n' 'assets/data/octagon-verdict-data.json' 'assets/data/octagon-verdict/index.json' | sort)
            if [ "$conflicts" != "$expected" ]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$conflicts"
              exit 1
            fi
            git checkout --ours -- assets/data/octagon-verdict-data.json assets/data/octagon-verdict/index.json
            git add assets/data/octagon-verdict-data.json assets/data/octagon-verdict/index.json
          fi
          git rm .github/workflows/sync-main-json-history-once.yml
          git commit -m "Merge main JSON history into scoring branch"
          git push origin HEAD:agent/fighter-data-phase-1
