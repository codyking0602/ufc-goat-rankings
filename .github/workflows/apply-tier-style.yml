name: Apply Tier Style Update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-tier-style.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply tier labels and muted colors
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          s = s.replace('  --tier-alltime: #22c55e;\n  --tier-elite: #22c55e;\n  --tier-great: #22c55e;\n  --tier-good: #22c55e;\n  --tier-average: #22c55e;', '''  --tier-legendary: #d6a73c;
          --tier-elite: #35a86b;
          --tier-great: #8b6fb3;
          --tier-good: #4f7fa8;
          --tier-average: #c8753e;''')
          s = s.replace('.tier-alltime { --tier-color: var(--tier-alltime); }', '.tier-legendary { --tier-color: var(--tier-legendary); }')
          s = s.replace('.category-card::before { content:""; position:absolute; inset:0 auto 0 0; width:4px; background:#22c55e; }', '.category-card::before { content:""; position:absolute; inset:0 auto 0 0; width:4px; background:var(--tier-color, #35a86b); }')
          s = s.replace('.bar > i { background:#22c55e; }', '.bar > i { background:var(--tier-color, #35a86b); }')
          s = s.replace('.tier-pill { display:inline-flex; margin-top:10px; border:1px solid rgba(34,197,94,.52); background:rgba(34,197,94,.10); color:#22c55e; border-radius:999px; padding:5px 8px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; }', '.tier-pill { display:inline-flex; margin-top:10px; border:1px solid color-mix(in srgb, var(--tier-color, var(--accent)) 52%, transparent); background:color-mix(in srgb, var(--tier-color, var(--accent)) 12%, transparent); color:var(--tier-color, var(--accent)); border-radius:999px; padding:5px 8px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; }')
          s = s.replace('.category-chip small { display:block; margin-top:3px; color:#22c55e; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }', '.category-chip small { display:block; margin-top:3px; color:var(--tier-color, #35a86b); font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }')
          s = s.replace('if (ovr >= 97) return {label:"All-Time Elite", cls:"tier-alltime"};', 'if (ovr >= 97) return {label:"Legendary", cls:"tier-legendary"};')
          p.write_text(s)
          PY

      - name: Commit update
        run: |
          git add index.html
          if git diff --cached --quiet; then
            echo "No tier style changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update tier labels and muted colors"
          git push
