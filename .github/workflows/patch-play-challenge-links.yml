name: Patch Play challenge links

on:
  push:
    paths:
      - '.github/workflows/patch-play-challenge-links.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make challenge URLs self-cache-busting
        run: |
          python - <<'PY'
          from pathlib import Path

          js = Path('assets/js/play-shared-system.js')
          text = js.read_text()
          old = """  function cleanChallengeUrl(code){
            const url=new URL(window.location.href);
            ['game','kcpack','kclineup','kcchoices','kcv','brpack','brlineup','room'].forEach(key=>url.searchParams.delete(key));
            url.searchParams.set('challenge',normalizeCode(code));
            url.hash='play';
            return url.toString();
          }"""
          new = """  function cleanChallengeUrl(code){
            const url=new URL(window.location.href);
            ['game','kcpack','kclineup','kcchoices','kcv','brpack','brlineup','group','room','event','archive','__manual_refresh','__shell','playbuild'].forEach(key=>url.searchParams.delete(key));
            url.searchParams.set('challenge',normalizeCode(code));
            url.searchParams.set('playbuild','20260715f');
            url.hash='play';
            return url.toString();
          }"""
          if old not in text:
              raise SystemExit('Could not find cleanChallengeUrl block')
          js.write_text(text.replace(old,new))

          index = Path('index.html')
          html = index.read_text()
          old_key = 'play-shared-system.js?v=play-shared-system-20260715e-cache-route'
          new_key = 'play-shared-system.js?v=play-shared-system-20260715f-new-tab'
          if old_key not in html:
              raise SystemExit('Could not find Play shared-system cache key')
          index.write_text(html.replace(old_key,new_key))
          PY
      - name: Commit challenge-link update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/play-shared-system.js
          git commit -m "Make Play challenge links cache-safe across new tabs"
          git push
