name: Patch Play challenge links

on:
  push:
    paths:
      - '.github/workflows/patch-play-challenge-links.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make challenge URLs self-cache-busting
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          js = Path('assets/js/play-shared-system.js')
          text = js.read_text()
          pattern = r"  function cleanChallengeUrl\(code\)\{.*?\n  \}\n\n  function challengeCodeFromUrl"
          replacement = """  function cleanChallengeUrl(code){
            const url=new URL(window.location.href);
            ['game','kcpack','kclineup','kcchoices','kcv','brpack','brlineup','group','room','event','archive','__manual_refresh','__shell','playbuild'].forEach(key=>url.searchParams.delete(key));
            url.searchParams.set('challenge',normalizeCode(code));
            url.searchParams.set('playbuild','20260715f');
            url.hash='play';
            return url.toString();
          }

          function challengeCodeFromUrl"""
          updated, count = re.subn(pattern,replacement,text,count=1,flags=re.S)
          if count != 1:
              raise SystemExit(f'cleanChallengeUrl replacements: {count}')
          js.write_text(updated)

          index = Path('index.html')
          html = index.read_text()
          html, count = re.subn(
              r'play-shared-system\.js\?v=play-shared-system-[^"<]+',
              'play-shared-system.js?v=play-shared-system-20260715f-new-tab',
              html,
              count=1
          )
          if count != 1:
              raise SystemExit(f'index cache-key replacements: {count}')
          index.write_text(html)
          PY
      - name: Commit challenge-link update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/play-shared-system.js
          git commit -m "Make Play challenge links cache-safe across new tabs"
          git push
