name: Deploy Octagon HQ Frontend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-octagon-hq-branding.yml'
      - 'assets/css/native-app-shell.css'
      - 'assets/js/native-app-shell.js'
      - 'assets/js/product-architecture.js'
      - 'assets/js/app-notification-surface-fix.js'
      - 'sw.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Phase 4A source
        run: |
          node --check assets/js/native-app-shell.js
          node --check assets/js/product-architecture.js
          node --check assets/js/app-notification-surface-fix.js
          node --check sw.js
          grep -Fq "native-app-shell-20260718a-phase-4a" assets/js/native-app-shell.js
          grep -Fq "product-architecture-20260718s-phase-4a-native-shell" assets/js/product-architecture.js
          grep -Fq "app-notification-surface-fix-20260718b-phase-4a" assets/js/app-notification-surface-fix.js
          grep -Fq "octagon-hq-sw-20260718c-phase-4a" sw.js
          grep -Fq ".native-bottom-nav" assets/css/native-app-shell.css
          grep -Fq ".native-pull-refresh" assets/css/native-app-shell.css

      - name: Wire Phase 4A into the live app
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          index_path=Path('index.html')
          index=index_path.read_text()

          mobile_meta='\n'.join([
              '  <meta name="application-name" content="Octagon HQ" />',
              '  <meta name="apple-mobile-web-app-title" content="Octagon HQ" />',
              '  <meta name="apple-mobile-web-app-capable" content="yes" />',
              '  <meta name="mobile-web-app-capable" content="yes" />',
              '  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />',
              '  <link rel="apple-touch-icon" href="assets/app-icon.png?v=20260702c" />',
          ])
          if 'apple-mobile-web-app-title' not in index:
              anchor='  <meta name="viewport" content="width=device-width, initial-scale=1" />'
              if anchor not in index:
                  raise SystemExit('Viewport anchor missing from index.html')
              index=index.replace(anchor,anchor+'\n'+mobile_meta,1)

          index=re.sub(r'<meta name="app-build" content="[^"]+" />','<meta name="app-build" content="20260718-phase-4a-native-shell" />',index,count=1)
          index=re.sub(r'manifest\.webmanifest\?v=[^"\s]+','manifest.webmanifest?v=octagon-hq-branding-20260718a',index,count=1)
          index=re.sub(r'assets/js/product-architecture\.js\?v=[^"\s]+','assets/js/product-architecture.js?v=product-architecture-20260718s-phase-4a-native-shell',index,count=1)
          index=re.sub(r'assets/js/app-notification-surface-fix\.js\?v=[^"\s]+','assets/js/app-notification-surface-fix.js?v=app-notification-surface-fix-20260718b-phase-4a',index,count=1)

          css_tag='  <link rel="stylesheet" href="assets/css/native-app-shell.css?v=native-app-shell-css-20260718a-phase-4a" />'
          index=re.sub(r'\s*<link rel="stylesheet" href="assets/css/native-app-shell\.css\?v=[^"]+"\s*/>','',index)
          if '</head>' not in index:
              raise SystemExit('Could not find </head> in index.html')
          index=index.replace('</head>',css_tag+'\n</head>',1)

          script_tag='  <script src="assets/js/native-app-shell.js?v=native-app-shell-20260718a-phase-4a"></script>'
          index=re.sub(r'\s*<script src="assets/js/native-app-shell\.js\?v=[^"]+"></script>','',index)
          share_anchor=re.search(r'(?P<indent>\s*)<script src="assets/js/share-deep-links\.js\?v=[^"]+"></script>',index)
          if share_anchor:
              index=index[:share_anchor.start()]+share_anchor.group('indent')+script_tag.strip()+share_anchor.group('indent')+share_anchor.group(0).strip()+index[share_anchor.end():]
          elif '</body>' in index:
              index=index.replace('</body>',script_tag+'\n</body>',1)
          else:
              raise SystemExit('Could not place native-app-shell.js in index.html')
          index_path.write_text(index)

          manifest_path=Path('manifest.webmanifest')
          manifest=json.loads(manifest_path.read_text())
          manifest.update({
              'name':'Octagon HQ',
              'short_name':'Octagon HQ',
              'description':'UFC rankings, games, Picks, The War Room, Intelligence, and direct challenges.',
              'start_url':'./#home',
              'scope':'./',
              'display':'standalone',
          })
          manifest_path.write_text(json.dumps(manifest,indent=2)+'\n')

          canonical_path=Path('.github/workflows/deploy-app-canonical-group.yml')
          canonical=canonical_path.read_text()
          canonical=canonical.replace('name: Deploy GOAT26 Phase 3 Smart Notifications','name: Deploy GOAT26 App Platform')
          path_anchor="      - 'assets/js/app-notification-center.js'"
          additions="\n".join([
              "      - 'assets/css/native-app-shell.css'",
              "      - 'assets/js/native-app-shell.js'",
              "      - 'assets/js/product-architecture.js'",
              "      - 'assets/js/app-notification-surface-fix.js'",
          ])
          if "assets/js/native-app-shell.js" not in canonical:
              if path_anchor not in canonical:
                  raise SystemExit('Canonical workflow path anchor missing')
              canonical=canonical.replace(path_anchor,additions+'\n'+path_anchor,1)
          canonical=canonical.replace('grep -Fq "octagon-hq-sw-20260718b-fast-refresh" sw.js','grep -Fq "octagon-hq-sw-20260718c-phase-4a" sw.js')
          canonical=canonical.replace("'app-update-watcher.js':'app-update-watcher-20260718f-build-aware-refresh',","'app-update-watcher.js':'app-update-watcher-20260718f-build-aware-refresh',\n               'product-architecture.js':'product-architecture-20260718s-phase-4a-native-shell',\n               'app-notification-surface-fix.js':'app-notification-surface-fix-20260718b-phase-4a',")
          canonical=canonical.replace('manifest.webmanifest?v=phase-3-user-visible-fix','manifest.webmanifest?v=octagon-hq-branding-20260718a')
          canonical=canonical.replace('20260718-phase-3-user-visible-fix','20260718-phase-4a-native-shell')
          if 'node --check assets/js/native-app-shell.js' not in canonical:
              canonical=canonical.replace('           node --check assets/js/app-notification-center.js','           node --check assets/js/native-app-shell.js\n           node --check assets/js/product-architecture.js\n           node --check assets/js/app-notification-surface-fix.js\n           node --check assets/js/app-notification-center.js',1)
          canonical_path.write_text(canonical)
          PY

          grep -Fq '20260718-phase-4a-native-shell' index.html
          grep -Fq 'native-app-shell-css-20260718a-phase-4a' index.html
          grep -Fq 'native-app-shell-20260718a-phase-4a' index.html
          grep -Fq 'product-architecture-20260718s-phase-4a-native-shell' index.html
          grep -Fq 'app-notification-surface-fix-20260718b-phase-4a' index.html
          grep -Fq 'manifest.webmanifest?v=octagon-hq-branding-20260718a' index.html
          grep -Fq "assets/js/native-app-shell.js" .github/workflows/deploy-app-canonical-group.yml
          grep -Fq 'octagon-hq-sw-20260718c-phase-4a' .github/workflows/deploy-app-canonical-group.yml

      - name: Commit Phase 4A frontend deployment
        run: |
          if git diff --quiet -- index.html manifest.webmanifest .github/workflows/deploy-app-canonical-group.yml; then
            echo 'Phase 4A frontend wiring is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add index.html manifest.webmanifest .github/workflows/deploy-app-canonical-group.yml
          git commit -m 'Deploy Phase 4A native app shell [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
