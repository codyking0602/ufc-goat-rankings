name: Deploy GOAT26 Canonical Identity and Smart Notifications

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-app-canonical-group.yml'
      - 'assets/js/app-canonical-group.js'
      - 'assets/js/play-profile-identity.js'
      - 'assets/js/app-profile.js'
      - 'assets/js/profile-challenges.js'
      - 'assets/js/app-notification-center.js'
      - 'assets/js/app-update-watcher.js'
      - 'assets/js/play-daily-live-sync.js'
      - 'assets/js/octagon-message-board.js'
      - 'assets/js/octagon-access-panel.js'
      - 'assets/js/octagon-notifications.js'
      - 'assets/js/octagon-push-subscription.js'
      - 'assets/data/what-changed.js'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'supabase/app-canonical-group-goat26-phase.sql'
      - 'supabase/app-profile-avatar-phase.sql'
      - 'supabase/app-profile-photo-upload-phase.sql'
      - 'supabase/play-shared-system.sql'
      - 'supabase/play-profile-challenges-phase.sql'
      - 'supabase/octagon-message-board-foundation.sql'
      - 'supabase/octagon-message-board-rpc.sql'
      - 'supabase/octagon-message-board-access-panel.sql'
      - 'supabase/octagon-notifications-phase.sql'
      - 'supabase/app-notifications-phase-three.sql'
      - 'supabase/functions/octagon-push/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-goat26-canonical-identity
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate canonical identity and Phase 3 sources
        run: |
          node --check assets/js/app-canonical-group.js
          node --check assets/js/play-profile-identity.js
          node --check assets/js/app-profile.js
          node --check assets/js/profile-challenges.js
          node --check assets/js/app-notification-center.js
          node --check assets/js/app-update-watcher.js
          node --check assets/js/play-daily-live-sync.js
          node --check assets/js/octagon-message-board.js
          node --check assets/js/octagon-access-panel.js
          node --check assets/js/octagon-notifications.js
          node --check assets/js/octagon-push-subscription.js
          node --check assets/data/what-changed.js
          node --check sw.js
          python -m json.tool manifest.webmanifest >/dev/null
          grep -Fq "code='GOAT26'" supabase/app-canonical-group-goat26-phase.sql
          grep -Fq "create or replace function public.play_send_profile_challenge" supabase/play-profile-challenges-phase.sql
          grep -Fq "create or replace function public.play_daily_leaderboard" supabase/play-shared-system.sql
          grep -Fq "app_notify_profile_challenge_insert" supabase/app-notifications-phase-three.sql
          grep -Fq "app_notify_war_room_message_insert" supabase/app-notifications-phase-three.sql
          grep -Fq "app_queue_picks_reminders" supabase/app-notifications-phase-three.sql
          grep -Fq "app_notification_claim_batch" supabase/functions/octagon-push/index.ts
          grep -Fq "app-notification-center-20260718a-phase-3" assets/js/app-notification-center.js
          grep -Fq "play-daily-live-sync-20260718a-phase-3" assets/js/play-daily-live-sync.js
          grep -Fq "cacheFirst" sw.js

      - name: Install deployment dependencies
        run: python -m pip install --disable-pip-version-check --quiet cryptography

      - name: Apply and audit GOAT26 and Phase 3 in Supabase
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import secrets
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          from cryptography.hazmat.primitives.asymmetric import ec

          project=os.environ['SUPABASE_PROJECT_REF']
          token=os.environ.get('SUPABASE_ACCESS_TOKEN','').strip()
          if not token:
              raise RuntimeError('SUPABASE_ACCESS_TOKEN is not configured.')

          status_path=Path('supabase/goat26-deployment-status.json')
          migration='\n\n'.join(Path(path).read_text() for path in [
              'supabase/app-canonical-group-goat26-phase.sql',
              'supabase/app-profile-avatar-phase.sql',
              'supabase/app-profile-photo-upload-phase.sql',
              'supabase/octagon-message-board-foundation.sql',
              'supabase/octagon-message-board-rpc.sql',
              'supabase/octagon-message-board-access-panel.sql',
              'supabase/octagon-notifications-phase.sql',
              'supabase/play-shared-system.sql',
              'supabase/play-profile-challenges-phase.sql',
              'supabase/app-notifications-phase-three.sql',
          ])
          config_source=Path('assets/data/supabase-config.js').read_text()
          key_parts=re.search(r"anonKey:\s*\['([^']+)','([^']+)'\]",config_source)
          if not key_parts:
              raise RuntimeError('Could not read the public Supabase browser key.')
          anon_key=''.join(key_parts.groups())
          edge_url=f'https://{project}.supabase.co/functions/v1/octagon-push'

          def query(sql,read_only=False):
              request=urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Accept':'application/json',
                      'Authorization':f'Bearer {token}',
                      'Content-Type':'application/json',
                      'User-Agent':'Octagon-HQ-Canonical-Phase-3/1.0',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=180) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:3000]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def rows(value):
              return value.get('result',value) if isinstance(value,dict) else value

          def b64url(value):
              return base64.urlsafe_b64encode(value).rstrip(b'=').decode()

          query(migration,read_only=False)

          vapid=rows(query("select public_key from public.octagon_push_config where singleton limit 1;",read_only=True))
          if not vapid:
              private_key=ec.generate_private_key(ec.SECP256R1())
              numbers=private_key.private_numbers()
              public_numbers=numbers.public_numbers
              raw_public=b'\x04'+public_numbers.x.to_bytes(32,'big')+public_numbers.y.to_bytes(32,'big')
              query(
                  "insert into public.octagon_push_config(singleton,public_key,private_key,subject) values "
                  f"(true,'{b64url(raw_public)}','{b64url(numbers.private_value.to_bytes(32,'big'))}','https://codyking0602.github.io/ufc-goat-rankings/') "
                  "on conflict(singleton) do nothing;",
                  read_only=False,
              )

          existing=rows(query("select internal_token from public.app_notification_config where singleton limit 1;",read_only=True))
          worker_token=(existing[0].get('internal_token') if isinstance(existing,list) and existing else '') or secrets.token_urlsafe(40)
          safe_token=worker_token.replace("'","''")
          query(
              "insert into public.app_notification_config(singleton,internal_token,edge_url,anon_key,updated_at) values "
              f"(true,'{safe_token}','{edge_url}','{anon_key}',now()) "
              "on conflict(singleton) do update set edge_url=excluded.edge_url,anon_key=excluded.anon_key,updated_at=now();",
              read_only=False,
          )
          query('select public.app_notification_schedule();',read_only=False)

          audit_sql="""
          select jsonb_build_object(
            'code',g.code,
            'is_canonical',coalesce(g.is_canonical,false),
            'active_members',(select count(*) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'member_names',(select jsonb_agg(gm.display_name order by lower(gm.display_name)) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'vapid_ready',exists(select 1 from public.octagon_push_config c where c.singleton and length(c.public_key)>=80 and length(c.private_key)>=40),
            'profile_challenges',to_regprocedure('public.play_send_profile_challenge(text,uuid,text,text,jsonb,jsonb,jsonb,integer)') is not null,
            'daily_leaderboard',to_regprocedure('public.play_daily_leaderboard(text,date,integer)') is not null,
            'notifications',public.app_notification_audit()
          ) as audit
          from public.pick_groups g
          where g.code='GOAT26' and coalesce(g.is_canonical,false)
          limit 1;
          """
          audit_rows=rows(query(audit_sql,read_only=True))
          audit=audit_rows[0].get('audit') if isinstance(audit_rows,list) and audit_rows else None
          if isinstance(audit,str): audit=json.loads(audit)
          notifications=(audit or {}).get('notifications') or {}
          if (
              not isinstance(audit,dict)
              or audit.get('code')!='GOAT26'
              or not audit.get('is_canonical')
              or int(audit.get('active_members') or 0)<6
              or not audit.get('vapid_ready')
              or not audit.get('profile_challenges')
              or not audit.get('daily_leaderboard')
              or not notifications.get('configured')
              or not notifications.get('cron_scheduled')
              or not notifications.get('challenge_trigger')
              or not notifications.get('war_room_trigger')
          ):
              raise RuntimeError(f'Canonical Phase 3 audit failed: {audit}')

          status={}
          if status_path.exists():
              try: status=json.loads(status_path.read_text())
              except Exception: status={}
          status['canonical_identity']={
              'status':'active','code':'GOAT26','active_members':audit.get('active_members'),
              'member_names':audit.get('member_names'),
          }
          status['smart_notifications']={
              **notifications,
              'phase':'phase-3','status':'active',
              'delivery_owner':'database-outbox-and-edge-worker',
              'types':['direct-challenge','picks-reminder','war-room'],
              'picks_windows_minutes':[120,20],
              'worker':'octagon-push','worker_interval':'one-minute',
              'device_settings':'activity-profile','test_notification':True,
          }
          status['daily_leaderboard_live_sync']={'status':'active','poll_seconds':10,'change_detection':'server-signature-before-render'}
          status['refresh_performance']={'status':'active','navigation':'network-first','versioned_assets':'cache-first','manual_refresh':'normal-reload-with-state-restore'}
          status['checked_at']=datetime.now(timezone.utc).isoformat()
          status_path.write_text(json.dumps(status,indent=2,sort_keys=True)+'\n')
          print(json.dumps(audit,indent=2))
          PY

      - name: Deploy smart notification worker
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx --yes supabase@latest functions deploy octagon-push \
            --project-ref hdkjwezaswhisxupxydc \
            --no-verify-jwt

      - name: Wire current canonical assets into the live app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path=Path('index.html')
          text=path.read_text()

          versions={
              'app-profile.js':'app-profile-20260718b-photo-upload',
              'app-update-watcher.js':'app-update-watcher-20260718e-phase-3-fast-refresh',
              'octagon-hq-shell.js':'app-shell-20260718d-rankings-static',
              'profile-challenges.js':'profile-challenges-20260718c-stable-inbox',
          }
          for filename,version in versions.items():
              pattern=rf'assets/js/{re.escape(filename)}\?v=[^"\s]+'
              replacement=f'assets/js/{filename}?v={version}'
              text,count=re.subn(pattern,replacement,text,count=1)
              if count!=1:
                  raise SystemExit(f'Could not update {filename} in index.html')

          text,count=re.subn(
              r'assets/data/what-changed\.js\?v=[^"\s]+',
              'assets/data/what-changed.js?v=what-changed-data-20260718f-phase-3',
              text,
              count=1,
          )
          if count!=1:
              raise SystemExit('Could not update What Changed data in index.html')

          notification_tag='<script src="assets/js/app-notification-center.js?v=app-notification-center-20260718a-phase-3"></script>'
          text=re.sub(r'\s*<script src="assets/js/app-notification-center\.js\?v=[^"]+"></script>','',text)
          anchor=re.search(r'(?P<indent>\s*)<script src="assets/js/profile-challenges\.js\?v=[^"]+"></script>',text)
          if not anchor:
              raise SystemExit('Could not find profile-challenges.js anchor')
          text=text[:anchor.start()]+anchor.group(0)+anchor.group('indent')+notification_tag+text[anchor.end():]

          text=re.sub(r'<link rel="manifest" href="[^"]+"\s*/>','<link rel="manifest" href="manifest.webmanifest?v=phase-3-smart-notifications" />',text,count=1)
          text=re.sub(r'<meta name="app-build" content="[^"]+" />','<meta name="app-build" content="20260718-phase-3-smart-notifications" />',text,count=1)
          path.write_text(text)
          PY

      - name: Commit canonical deployment record
        run: |
          if git diff --quiet -- index.html supabase/goat26-deployment-status.json; then
            echo 'Canonical Phase 3 deployment record is unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add index.html supabase/goat26-deployment-status.json
          git commit -m 'Deploy canonical Phase 3 smart notifications [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
