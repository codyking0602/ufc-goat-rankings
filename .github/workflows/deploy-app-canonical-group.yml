name: Deploy GOAT26 Canonical Group Bridge

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-app-canonical-group.yml'
      - 'assets/js/app-canonical-group.js'
      - 'supabase/app-canonical-group-goat26-phase.sql'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate canonical identity bridge
        run: node --check assets/js/app-canonical-group.js
      - name: Verify GOAT26 migration safeguards
        run: |
          grep -q "code='GOAT26'" supabase/app-canonical-group-goat26-phase.sql
          grep -q "lower(trim(owner_member.display_name))='cody'" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_canonical_group_audit" supabase/app-canonical-group-goat26-phase.sql
      - name: Wire canonical identity bridge into the live page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text()

          anchor_pattern = r'(  <script src="assets/data/supabase-config\.js\?v=[^"]+"></script>)'
          bridge_line = '  <script src="assets/js/app-canonical-group.js?v=app-canonical-group-20260717a"></script>'
          if bridge_line not in text:
              match = re.search(anchor_pattern, text)
              if not match:
                  raise SystemExit('Supabase config script anchor not found.')
              text = text[:match.end()] + '\n' + bridge_line + text[match.end():]

          text = re.sub(
              r'<script src="assets/js/app-canonical-group\.js\?v=[^"]+"></script>',
              bridge_line.strip(),
              text,
              count=1,
          )
          text = re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260717-goat26-canonical-group" />',
              text,
              count=1,
          )
          path.write_text(text)
          PY
      - name: Commit live wiring
        run: |
          if git diff --quiet -- index.html; then
            echo 'Canonical identity bridge already wired.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Load GOAT26 canonical identity bridge'
          git push
