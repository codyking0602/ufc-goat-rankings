name: Deploy GOAT26 Phase 3 Smart Notifications

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-app-canonical-group.yml'
      - 'assets/js/app-notification-center.js'
      - 'assets/js/app-update-watcher.js'
      - 'assets/js/play-daily-live-sync.js'
      - 'assets/data/what-changed.js'
      - 'sw.js'
      - 'supabase/app-notifications-phase-three.sql'
      - 'supabase/functions/octagon-push/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-goat26-phase-three
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Phase 3 source
        id: validate
        continue-on-error: true
        run: |
          node --check assets/js/app-notification-center.js
          node --check assets/js/app-update-watcher.js
          node --check assets/js/play-daily-live-sync.js
          node --check assets/data/what-changed.js
          node --check sw.js
          grep -Fq "app-notification-center-20260718a-phase-3" assets/js/app-notification-center.js
          grep -Fq "app-update-watcher-20260718e-phase-3-fast-refresh" assets/js/app-update-watcher.js
          grep -Fq "play-daily-live-sync-20260718a-phase-3" assets/js/play-daily-live-sync.js
          grep -Fq "what-changed-data-20260718f-phase-3" assets/data/what-changed.js
          grep -Fq "octagon-hq-sw-20260718b-fast-refresh" sw.js
          grep -Fq "app_notify_profile_challenge_insert" supabase/app-notifications-phase-three.sql
          grep -Fq "app_notify_war_room_message_insert" supabase/app-notifications-phase-three.sql
          grep -Fq "app_queue_picks_reminders" supabase/app-notifications-phase-three.sql
          grep -Fq "app_notification_claim_batch" supabase/functions/octagon-push/index.ts

      - name: Apply and audit Phase 3 database
        id: database
        if: steps.validate.outcome == 'success'
        continue-on-error: true
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import secrets
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project=os.environ['SUPABASE_PROJECT_REF']
          token=os.environ.get('SUPABASE_ACCESS_TOKEN','').strip()
          diagnostic_path=Path('supabase/phase-three-deployment-diagnostic.json')
          status_path=Path('supabase/goat26-deployment-status.json')
          result={'phase':'phase-3-smart-notifications','database':'started','checked_at':datetime.now(timezone.utc).isoformat()}

          def save(): diagnostic_path.write_text(json.dumps(result,indent=2,sort_keys=True)+'\n')
          def clean_error(value): return str(value).replace(token,'[redacted]')[:2400]
          def rows(value): return value.get('result',value) if isinstance(value,dict) else value

          def query(sql,read_only=False):
              request=urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Accept':'application/json',
                      'Authorization':f'Bearer {token}',
                      'Content-Type':'application/json',
                      'User-Agent':'Octagon-HQ-Phase-3/1.0',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=150) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:2200]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          try:
              if not token: raise RuntimeError('SUPABASE_ACCESS_TOKEN is not configured.')
              query(Path('supabase/app-notifications-phase-three.sql').read_text(),read_only=False)

              config_source=Path('assets/data/supabase-config.js').read_text()
              key_parts=re.search(r"anonKey:\s*\['([^']+)','([^']+)'\]",config_source)
              if not key_parts: raise RuntimeError('Could not read the public Supabase browser key.')
              anon_key=''.join(key_parts.groups())
              edge_url=f'https://{project}.supabase.co/functions/v1/octagon-push'
              existing=rows(query("select internal_token from public.app_notification_config where singleton limit 1;",read_only=True))
              worker_token=(existing[0].get('internal_token') if isinstance(existing,list) and existing else '') or secrets.token_urlsafe(40)
              safe_worker=worker_token.replace("'","''")
              safe_anon=anon_key.replace("'","''")
              query(
                  "insert into public.app_notification_config(singleton,internal_token,edge_url,anon_key,updated_at) values "
                  f"(true,'{safe_worker}','{edge_url}','{safe_anon}',now()) "
                  "on conflict(singleton) do update set edge_url=excluded.edge_url,anon_key=excluded.anon_key,updated_at=now();",
                  read_only=False,
              )
              query('select public.app_notification_schedule();',read_only=False)

              audit_sql="""
              select jsonb_build_object(
                'ok',true,
                'configured',exists(select 1 from public.app_notification_config where singleton),
                'preference_rows',(select count(*) from public.app_notification_preferences),
                'active_subscriptions',(select count(*) from public.octagon_push_subscriptions where is_active),
                'pending_outbox',(select count(*) from public.app_notification_outbox where status in ('pending','failed','sending')),
                'cron_scheduled',exists(select 1 from cron.job where jobname='octagon-hq-smart-notifications'),
                'challenge_trigger',exists(select 1 from pg_trigger where tgname='app_notify_profile_challenge_insert' and not tgisinternal),
                'war_room_trigger',exists(select 1 from pg_trigger where tgname='app_notify_war_room_message_insert' and not tgisinternal),
                'settings_rpc',to_regprocedure('public.app_notification_settings(text)') is not null,
                'test_rpc',to_regprocedure('public.app_notification_send_test(text)') is not null,
                'worker_rpc',to_regprocedure('public.app_notification_claim_batch(text,integer)') is not null
              ) as audit;
              """
              audit_rows=rows(query(audit_sql,read_only=True))
              audit=audit_rows[0].get('audit') if isinstance(audit_rows,list) and audit_rows else None
              if isinstance(audit,str): audit=json.loads(audit)
              required=['configured','cron_scheduled','challenge_trigger','war_room_trigger','settings_rpc','test_rpc','worker_rpc']
              if not isinstance(audit,dict) or not audit.get('ok') or not all(audit.get(key) for key in required):
                  raise RuntimeError(f'Phase 3 notification audit failed: {audit}')

              result.update({'database':'success','audit':audit})
              status={}
              if status_path.exists():
                  try: status=json.loads(status_path.read_text())
                  except Exception: status={}
              status['smart_notifications']={
                  **audit,
                  'phase':'phase-3','status':'active',
                  'delivery_owner':'database-outbox-and-edge-worker',
                  'types':['direct-challenge','picks-reminder','war-room'],
                  'picks_windows_minutes':[120,20],
                  'worker':'octagon-push','worker_interval':'one-minute',
                  'device_settings':'activity-profile','test_notification':True,
              }
              status['daily_leaderboard_live_sync']={'status':'active','poll_seconds':10,'change_detection':'server-signature-before-render'}
              status['refresh_performance']={'status':'active','navigation':'network-first','versioned_assets':'cache-first','manual_refresh':'normal-reload-with-state-restore'}
              status['checked_at']=datetime.now(timezone.utc).isoformat()
              status_path.write_text(json.dumps(status,indent=2,sort_keys=True)+'\n')
              save()
          except Exception as error:
              result.update({'database':'failed','error':clean_error(error)})
              save()
              raise
          PY

      - name: Deploy smart notification worker
        id: worker
        if: steps.database.outcome == 'success'
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx --yes supabase@latest functions deploy octagon-push \
            --project-ref hdkjwezaswhisxupxydc \
            --no-verify-jwt

      - name: Wire Phase 3 into the live app
        id: wire
        if: steps.database.outcome == 'success' && steps.worker.outcome == 'success'
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path=Path('index.html')
          text=path.read_text()
          replacements={
              'app-profile.js':'app-profile-20260718b-photo-upload',
              'app-update-watcher.js':'app-update-watcher-20260718e-phase-3-fast-refresh',
              'profile-challenges.js':'profile-challenges-20260718c-stable-inbox',
          }
          for filename,version in replacements.items():
              text,count=re.subn(rf'assets/js/{re.escape(filename)}\?v=[^"\s]+',f'assets/js/{filename}?v={version}',text,count=1)
              if count!=1: raise SystemExit(f'Could not update {filename} in index.html')

          text,count=re.subn(r'assets/data/what-changed\.js\?v=[^"\s]+','assets/data/what-changed.js?v=what-changed-data-20260718f-phase-3',text,count=1)
          if count!=1: raise SystemExit('Could not update What Changed data in index.html')

          text=re.sub(r'\s*<script src="assets/js/app-notification-center\.js\?v=[^"]+"></script>','',text)
          anchor=re.search(r'(?P<indent>\s*)<script src="assets/js/profile-challenges\.js\?v=[^"]+"></script>',text)
          if not anchor: raise SystemExit('Could not find profile-challenges.js anchor')
          tag='<script src="assets/js/app-notification-center.js?v=app-notification-center-20260718a-phase-3"></script>'
          text=text[:anchor.start()]+anchor.group(0)+anchor.group('indent')+tag+text[anchor.end():]
          text=re.sub(r'<link rel="manifest" href="[^"]+"\s*/>','<link rel="manifest" href="manifest.webmanifest?v=phase-3-smart-notifications" />',text,count=1)
          text=re.sub(r'<meta name="app-build" content="[^"]+" />','<meta name="app-build" content="20260718-phase-3-smart-notifications" />',text,count=1)
          path.write_text(text)
          PY

      - name: Record deployment result
        if: always()
        env:
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          DATABASE_OUTCOME: ${{ steps.database.outcome }}
          WORKER_OUTCOME: ${{ steps.worker.outcome }}
          WIRE_OUTCOME: ${{ steps.wire.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          path=Path('supabase/phase-three-deployment-diagnostic.json')
          try: result=json.loads(path.read_text())
          except Exception: result={'phase':'phase-3-smart-notifications'}
          outcomes={
              'validate':os.environ.get('VALIDATE_OUTCOME','unknown'),
              'database':os.environ.get('DATABASE_OUTCOME','unknown'),
              'worker':os.environ.get('WORKER_OUTCOME','unknown'),
              'wire':os.environ.get('WIRE_OUTCOME','unknown'),
          }
          result['workflow_outcomes']=outcomes
          result['workflow_status']='success' if all(value=='success' for value in outcomes.values()) else 'failed'
          result['finished_at']=datetime.now(timezone.utc).isoformat()
          path.write_text(json.dumps(result,indent=2,sort_keys=True)+'\n')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add supabase/phase-three-deployment-diagnostic.json
          if [ "${DATABASE_OUTCOME}" = "success" ]; then git add supabase/goat26-deployment-status.json; fi
          if [ "${WIRE_OUTCOME}" = "success" ]; then git add index.html; fi
          if ! git diff --cached --quiet; then
            git commit -m 'Record Phase 3 notification deployment [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
          if [ "${VALIDATE_OUTCOME}" != "success" ] || [ "${DATABASE_OUTCOME}" != "success" ] || [ "${WORKER_OUTCOME}" != "success" ] || [ "${WIRE_OUTCOME}" != "success" ]; then exit 1; fi
