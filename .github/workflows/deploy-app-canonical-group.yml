name: Deploy GOAT26 Canonical Identity

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-app-canonical-group.yml'
      - 'assets/js/app-canonical-group.js'
      - 'assets/js/play-profile-identity.js'
      - 'assets/js/app-profile.js'
      - 'assets/js/octagon-hq-shell.js'
      - 'supabase/app-canonical-group-goat26-phase.sql'
      - 'supabase/app-profile-avatar-phase.sql'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-goat26-canonical-identity
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate GOAT26 identity source
        run: |
          node --check assets/js/app-canonical-group.js
          node --check assets/js/play-profile-identity.js
          node --check assets/js/app-profile.js
          node --check assets/js/octagon-hq-shell.js
          grep -q "code='GOAT26'" supabase/app-canonical-group-goat26-phase.sql
          grep -q "array\['brock','cody','rhonda','shane','tony','tyler'\]" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_profile_resolve" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_profile_login" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_canonical_group_audit" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_profile_group_snapshot" supabase/app-profile-avatar-phase.sql
          grep -q "app_profile_set_avatar" supabase/app-profile-avatar-phase.sql

      - name: Apply and audit GOAT26 in Supabase
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project=os.environ['SUPABASE_PROJECT_REF']
          token=os.environ.get('SUPABASE_ACCESS_TOKEN','').strip()
          status_path=Path('supabase/goat26-deployment-status.json')
          migration='\n\n'.join([
              Path('supabase/app-canonical-group-goat26-phase.sql').read_text(),
              Path('supabase/app-profile-avatar-phase.sql').read_text(),
          ])
          expected=['Brock','Cody','Rhonda','Shane','Tony','Tyler']

          audit_sql="""
          select jsonb_build_object(
            'status','active',
            'code',g.code,
            'name',g.name,
            'is_canonical',coalesce(g.is_canonical,false),
            'active_members',(select count(*) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'member_names',(
              select jsonb_agg(gm.display_name order by lower(trim(gm.display_name)))
              from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'avatar_profiles',(
              select count(*)
              from public.pick_group_members gm
              where gm.group_id=g.id
                and coalesce(gm.is_active,true)
                and nullif(trim(gm.fighter_avatar_slug),'') is not null
            ),
            'events',(select count(*) from public.pick_group_events ge where ge.group_id=g.id),
            'rooms',(select count(*) from public.pick_rooms r where r.group_id=g.id),
            'saved_picks',(
              select count(*)
              from public.pick_rooms r
              join public.pick_room_members rm on rm.room_id=r.id
              join public.pick_selections ps on ps.member_id=rm.id
              where r.group_id=g.id
            )
          ) as audit
          from public.pick_groups g
          where g.code='GOAT26' and coalesce(g.is_canonical,false)
          limit 1;
          """

          def write(payload):
              value=dict(payload)
              value['checked_at']=datetime.now(timezone.utc).isoformat()
              status_path.write_text(json.dumps(value,indent=2,sort_keys=True)+'\n')

          def query(sql,read_only=False):
              request=urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project}/database/query',
                  data=json.dumps({'query':sql,'read_only':read_only}).encode(),
                  headers={
                      'Accept':'application/json',
                      'Authorization':f'Bearer {token}',
                      'Content-Type':'application/json',
                      'User-Agent':'UFC-GOAT26-GitHub-Actions/1.0',
                      'X-Client-Info':'ufc-goat-rankings-goat26',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request,timeout=90) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail=error.read().decode(errors='replace')[:1200]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def audit_value(response):
              rows=response.get('result',response) if isinstance(response,dict) else response
              value=rows[0].get('audit') if isinstance(rows,list) and rows and isinstance(rows[0],dict) else None
              if isinstance(value,str):
                  value=json.loads(value)
              if not isinstance(value,dict):
                  raise RuntimeError('GOAT26 audit returned no canonical group.')
              return value

          if not token:
              write({'status':'blocked','code':'GOAT26','reason':'SUPABASE_ACCESS_TOKEN is not configured.'})
              raise SystemExit(0)

          try:
              query(migration,read_only=False)
              audit=audit_value(query(audit_sql,read_only=True))
              names=sorted(audit.get('member_names') or [],key=lambda item:str(item).lower())
              if (
                  audit.get('code')!='GOAT26'
                  or not audit.get('is_canonical')
                  or names!=expected
                  or int(audit.get('events') or 0)<2
                  or int(audit.get('rooms') or 0)<2
                  or int(audit.get('saved_picks') or 0)<50
              ):
                  raise RuntimeError(f'GOAT26 identity or history audit failed: {audit}')
              audit['deployment_method']='supabase-management-api'
              write(audit)
              print('GOAT26 identity, fighter profiles, and Picks history verified.')
          except Exception as error:
              reason=str(error).replace(token,'[redacted]')[:1600]
              write({'status':'failed','code':'GOAT26','reason':reason})
              raise
          PY

      - name: Wire the shared identity into the live page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path=Path('index.html')
          text=path.read_text()
          canonical='  <script src="assets/js/app-canonical-group.js?v=app-canonical-group-20260717b"></script>'
          play_profile='  <script src="assets/js/play-profile-identity.js?v=play-profile-identity-20260717b-goat26"></script>'
          app_profile='  <script src="assets/js/app-profile.js?v=app-profile-20260717a"></script>'
          update_watcher='  <script src="assets/js/app-update-watcher.js?v=app-update-watcher-20260717-play-photo-authority"></script>'
          octagon_shell='  <script src="assets/js/octagon-hq-shell.js?v=octagon-hq-shell-20260717a"></script>'

          text=re.sub(r'  <script src="assets/js/app-canonical-group\.js\?v=[^"]+"></script>',canonical,text,count=1)
          text=re.sub(r'  <script src="assets/js/play-profile-identity\.js\?v=[^"]+"></script>',play_profile,text,count=1)
          if 'assets/js/app-profile.js' in text:
              text=re.sub(r'  <script src="assets/js/app-profile\.js\?v=[^"]+"></script>',app_profile,text,count=1)
          elif play_profile in text:
              text=text.replace(play_profile,play_profile+'\n'+app_profile,1)
          else:
              raise SystemExit('Shared Play profile script anchor was not found.')

          if 'assets/js/octagon-hq-shell.js' in text:
              text=re.sub(r'  <script src="assets/js/octagon-hq-shell\.js\?v=[^"]+"></script>',octagon_shell,text,count=1)
          elif update_watcher in text:
              text=text.replace(update_watcher,update_watcher+'\n'+octagon_shell,1)
          else:
              match=re.search(r'(  <script src="assets/js/app-update-watcher\.js\?v=[^"]+"></script>)',text)
              if not match:
                  raise SystemExit('App update watcher script anchor was not found.')
              text=text[:match.end()]+'\n'+octagon_shell+text[match.end():]

          text=re.sub(r'<meta name="app-build" content="[^"]+" />','<meta name="app-build" content="20260717-octagon-hq-shell" />',text,count=1)
          path.write_text(text)
          PY

      - name: Commit deployment record
        if: always()
        run: |
          if git diff --quiet -- index.html supabase/goat26-deployment-status.json; then
            echo 'GOAT26 deployment record is unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html supabase/goat26-deployment-status.json
          git commit -m 'Record Octagon HQ shell deployment [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main