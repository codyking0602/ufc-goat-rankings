name: Deploy GOAT26 Canonical Group

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-app-canonical-group.yml'
      - 'assets/js/app-canonical-group.js'
      - 'supabase/app-canonical-group-goat26-phase.sql'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-goat26-canonical-group
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate canonical identity bridge
        run: node --check assets/js/app-canonical-group.js

      - name: Verify GOAT26 migration safeguards
        run: |
          grep -q "code='GOAT26'" supabase/app-canonical-group-goat26-phase.sql
          grep -q "array\['cody','daddy','rhonda','shane','tyler'\]" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_profile_resolve" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_profile_login" supabase/app-canonical-group-goat26-phase.sql
          grep -q "app_canonical_group_audit" supabase/app-canonical-group-goat26-phase.sql

      - name: Apply and audit GOAT26 in Supabase
        env:
          SUPABASE_PROJECT_REF: hdkjwezaswhisxupxydc
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          project_ref = os.environ['SUPABASE_PROJECT_REF']
          access_token = os.environ.get('SUPABASE_ACCESS_TOKEN', '').strip()
          migration_sql = Path('supabase/app-canonical-group-goat26-phase.sql').read_text()
          status_path = Path('supabase/goat26-deployment-status.json')

          audit_sql = """
          select jsonb_build_object(
            'status','active',
            'code',g.code,
            'name',g.name,
            'is_canonical',coalesce(g.is_canonical,false),
            'active_members',(select count(*) from public.pick_group_members gm where gm.group_id=g.id and coalesce(gm.is_active,true)),
            'member_names',(
              select jsonb_agg(gm.display_name order by lower(trim(gm.display_name)))
              from public.pick_group_members gm
              where gm.group_id=g.id and coalesce(gm.is_active,true)
            ),
            'events',(select count(*) from public.pick_group_events ge where ge.group_id=g.id),
            'rooms',(select count(*) from public.pick_rooms r where r.group_id=g.id),
            'saved_picks',(
              select count(*)
              from public.pick_rooms r
              join public.pick_room_members rm on rm.room_id=r.id
              join public.pick_selections ps on ps.member_id=rm.id
              where r.group_id=g.id
            )
          ) as audit
          from public.pick_groups g
          where g.code='GOAT26'
          order by coalesce(g.is_canonical,false) desc
          limit 1;
          """

          def write_status(payload):
              result = dict(payload)
              result['checked_at'] = datetime.now(timezone.utc).isoformat()
              status_path.write_text(json.dumps(result, indent=2, sort_keys=True) + '\n')

          def query(sql, read_only=False):
              request = urllib.request.Request(
                  f'https://api.supabase.com/v1/projects/{project_ref}/database/query',
                  data=json.dumps({'query': sql, 'read_only': read_only}).encode(),
                  headers={
                      'Authorization': f'Bearer {access_token}',
                      'Content-Type': 'application/json',
                  },
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request, timeout=90) as response:
                      return json.loads(response.read().decode() or 'null')
              except urllib.error.HTTPError as error:
                  detail = error.read().decode(errors='replace')[:1000]
                  raise RuntimeError(f'Supabase Management API returned HTTP {error.code}: {detail}') from error

          def audit_value(response):
              rows = response.get('result', response) if isinstance(response, dict) else response
              if isinstance(rows, list) and rows:
                  value = rows[0].get('audit', rows[0]) if isinstance(rows[0], dict) else None
              elif isinstance(rows, dict):
                  value = rows.get('audit', rows)
              else:
                  value = None
              if isinstance(value, str):
                  value = json.loads(value)
              if not isinstance(value, dict):
                  raise RuntimeError('GOAT26 audit did not return a result.')
              return value

          if not access_token:
              write_status({
                  'status': 'blocked',
                  'code': 'GOAT26',
                  'reason': 'SUPABASE_ACCESS_TOKEN is not configured in GitHub Actions.',
              })
              print('GOAT26 migration blocked: missing SUPABASE_ACCESS_TOKEN.')
          else:
              try:
                  query(migration_sql, read_only=False)
                  audit = audit_value(query(audit_sql, read_only=True))
                  expected = ['Cody','Daddy','Rhonda','Shane','Tyler']
                  names = sorted(audit.get('member_names') or [], key=lambda value: str(value).lower())
                  if (
                      audit.get('status') != 'active'
                      or audit.get('code') != 'GOAT26'
                      or not audit.get('is_canonical')
                      or names != expected
                  ):
                      raise RuntimeError(f'Canonical five-member audit failed: {audit}')
                  audit['deployment_method'] = 'supabase-management-api'
                  write_status(audit)
                  print('GOAT26 migration applied and verified.')
              except Exception as error:
                  reason = str(error).replace(access_token, '[redacted]')[:1500]
                  write_status({'status':'failed','code':'GOAT26','reason':reason})
                  print(f'GOAT26 migration failed: {reason}')
          PY

      - name: Wire canonical identity bridge into the live page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text()
          anchor_pattern = r'(  <script src="assets/data/supabase-config\.js\?v=[^"]+"></script>)'
          bridge_line = '  <script src="assets/js/app-canonical-group.js?v=app-canonical-group-20260717b"></script>'

          if 'assets/js/app-canonical-group.js' not in text:
              match = re.search(anchor_pattern, text)
              if not match:
                  raise SystemExit('Supabase config script anchor not found.')
              text = text[:match.end()] + '\n' + bridge_line + text[match.end():]

          text = re.sub(
              r'  <script src="assets/js/app-canonical-group\.js\?v=[^"]+"></script>',
              bridge_line,
              text,
              count=1,
          )
          text = re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260717-goat26-canonical-group-b" />',
              text,
              count=1,
          )
          path.write_text(text)
          PY

      - name: Commit live wiring and deployment status
        if: always()
        run: |
          if [ ! -f supabase/goat26-deployment-status.json ]; then
            cat > supabase/goat26-deployment-status.json <<'JSON'
          {
            "code": "GOAT26",
            "reason": "The deployment workflow ended before producing a Supabase result.",
            "status": "failed"
          }
          JSON
          fi
          if git diff --quiet -- index.html supabase/goat26-deployment-status.json; then
            echo 'GOAT26 wiring and deployment status are unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html supabase/goat26-deployment-status.json
          git commit -m 'Record GOAT26 deployment result [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
