# Trigger corrected activation.
name: Finalize Better Than subjective game

on:
  push:
    paths:
      - '.github/workflows/activate-better-than-subjective-fix.yml'

permissions:
  contents: write

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch hub, cache references, and direction
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def one(text, old, new, label):
              if text.count(old) != 1:
                  raise SystemExit(f'{label}: expected one match, found {text.count(old)}')
              return text.replace(old, new, 1)

          hub_path=Path('assets/js/play-hub.js')
          hub=hub_path.read_text(encoding='utf-8')
          hub=one(hub,"const VERSION='play-hub-20260716e-better-than-mvp';","const VERSION='play-hub-20260716f-better-than-claim-builder';",'hub version')
          hub=one(hub,"{id:'better-than',icon:'>',title:'Better Than…',description:'Select every fighter whose UFC-only GOAT resume ranks above the challenge fighter.',status:'PLAY NOW',live:true}","{id:'better-than',icon:'>',title:'Better Than…',description:'Build a claim, choose your number, and name the exact fighters you can defend.',status:'PLAY NOW',live:true}",'card copy')
          hub=one(hub,"if(eyebrow)eyebrow.textContent='MODEL TEST';","if(eyebrow)eyebrow.textContent='CLAIM BUILDER';",'eyebrow')
          hub=one(hub,"if(subtitle)subtitle.textContent='Select every fighter whose UFC-only GOAT resume ranks above Charles Oliveira.';","if(subtitle)subtitle.textContent='Build a subjective UFC claim and choose the exact fighters who support it.';",'subtitle')
          hub_path.write_text(hub,encoding='utf-8')

          index_path=Path('index.html')
          index=index_path.read_text(encoding='utf-8')
          index,count=re.subn(r'<meta name="app-build" content="[^"]+"\s*/>','<meta name="app-build" content="20260716-better-than-subjective-claim" />',index,count=1)
          if count!=1: raise SystemExit(f'app build: {count}')
          for pattern,replacement in [
              (r'assets/css/better-than\.css\?v=[^"\s]+','assets/css/better-than.css?v=better-than-css-20260716b-subjective-claim-builder'),
              (r'assets/js/play-hub\.js\?v=[^"\s]+','assets/js/play-hub.js?v=play-hub-20260716f-better-than-claim-builder'),
              (r'assets/js/better-than\.js\?v=[^"\s]+','assets/js/better-than.js?v=better-than-20260716b-subjective-claim-builder')]:
              index,count=re.subn(pattern,replacement,index,count=1)
              if count!=1: raise SystemExit(f'{replacement}: {count}')
          share='  <script src="assets/js/better-than-standalone-share.js?v=better-than-standalone-share-20260716a-subjective-claim"></script>\n'
          if share not in index:
              marker='  <script src="assets/js/play-profile-identity.js?v=play-profile-identity-20260715a"></script>\n'
              index=one(index,marker,marker+share,'share reference')
          index_path.write_text(index,encoding='utf-8')

          doc_path=Path('docs/PLAY_PRODUCT_DIRECTION.md')
          doc=doc_path.read_text(encoding='utf-8')

          subjective_start=doc.index('### Subjective games')
          objective_start=doc.index('### Objective games')
          subjective=doc[subjective_start:objective_start]
          subjective=one(subjective,'- Blind Rank 5\n- Keep 4, Cut 4\n- Build Your Top 10','- Blind Rank 5\n- Keep 4, Cut 4\n- Better Than...\n- Build Your Top 10','subjective examples')
          doc=doc[:subjective_start]+subjective+doc[objective_start:]

          objective_start=doc.index('### Objective games')
          roadmap_start=doc.index('## Game roadmap')
          objective=doc[objective_start:roadmap_start]
          objective=one(objective,'- Blind Resume\n- Better Than...\n- Find the Leader','- Blind Resume\n- Find the Leader','objective examples')
          doc=doc[:objective_start]+objective+doc[roadmap_start:]

          start=doc.index('### D. Better Than...')
          end=doc.index('### E. Build Your Top 10')
          replacement='''### D. Better Than...\n\n**Status:** Subjective local claim builder and standalone friend challenge complete.\n\nCore prompt structure:\n\n> I can name 7 fighters better than Charles Oliveira at striking.\n\nThe challenger controls:\n\n- Challenge fighter\n- Debate lens, such as overall, striking, wrestling, grappling, submissions, power, durability, cardio, or UFC-only resume\n- Eligible fighter pool, including the full roster, gender pools, verified UFC divisions, same-division pools, and 205+ division pools\n- Claim count, capped at 15 or the available pool size\n- Exact supporting fighter list\n\nThe responder sees the frozen prompt and challenger's number, chooses their own number, and builds an exact list from the same frozen pool. The challenger's names remain hidden until submission.\n\nComparison shows both counts, the narrower claim without an official winner, shared selections, each person's unique selections, list overlap, and Challenge Back.\n\nBetter Than is subjective. It must not use model correctness, official scores, or a scored Daily Challenge leaderboard. Community percentages may be added later when enough submissions exist.\n\n'''
          doc=doc[:start]+replacement+doc[end:]

          rotation_start=doc.index('### G. Daily Game Rotation')
          visual_start=doc.index('## Visual direction')
          rotation=doc[rotation_start:visual_start]
          rotation=one(rotation,'- Blind Resume\n- Better Than...\n- Find the Leader','- Blind Resume\n- Find the Leader','daily rotation')
          doc=doc[:rotation_start]+rotation+doc[visual_start:]

          marker='- Challenge Back rematch\n\n---\n\n## Game classification rules'
          status='''- Challenge Back rematch\n\n### Better Than...\n\nStandalone page:\n\n- `better-than-challenge.html?code=XXXXXX`\n\nCurrent behavior:\n\n- Frozen target fighter, debate lens, eligibility pool, challenger count, and eligible fighter snapshots\n- Challenger names hidden until responder submission\n- Responder chooses their own count and exact list\n- Shared, challenger-only, and responder-only comparisons\n- Blue responder and orange challenger sections\n- No fake winner or model correctness\n- Challenge Back rematch\n\n---\n\n## Game classification rules'''
          doc=one(doc,marker,status,'completed challenge status')
          doc_path.write_text(doc,encoding='utf-8')
          PY
      - name: Validate
        run: |
          node --check assets/js/better-than.js
          node --check assets/js/better-than-standalone-share.js
          node --check assets/js/standalone-better-than-challenge.js
          node --check assets/js/play-hub.js
          grep -q "CLAIM BUILDER" assets/js/play-hub.js
          grep -q "challengerCount:state.claimCount" assets/js/better-than.js
          grep -q "p_game_type:'better-than'" assets/js/better-than-standalone-share.js
          ! grep -q 'p_score' assets/js/better-than-standalone-share.js
          grep -q "NO OFFICIAL WINNER" assets/js/standalone-better-than-challenge.js
          grep -q 'better-than-standalone-share-20260716a-subjective-claim' index.html
          grep -q 'better-than-challenge.html?code=XXXXXX' docs/PLAY_PRODUCT_DIRECTION.md
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/activate-better-than-subjective.yml .github/workflows/activate-better-than-subjective-fix.yml
          git add index.html assets/js/play-hub.js docs/PLAY_PRODUCT_DIRECTION.md
          git commit -m "Activate subjective Better Than challenges"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep $((attempt * 3))
          done
          exit 1