name: Integrate Quinton Rampage Jackson

on:
  push:
    branches: [main]
    paths: [.github/workflows/integrate-quinton-jackson.yml]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply roster integration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64,zlib,re
          d=lambda s:zlib.decompress(base64.b64decode(s)).decode()
          MEN=d('eNpTUFBQ0KnmUgADpbTM9IyS1CIlKwWlwNLMvJL8PAWvxOTs4vw8JR2YmpzUxJTUoqT8xKIUkLrcVCS59NS8FIh2X2ThgqLM3MSiSpfMssziTKBZQHkfkE0KHqmJZZXlqSA2QnVxanJ+XgqaeiWwbC0Aa9cxOA=='); PROFILE=d(''); PRIME=d('eNpTUFBQ0FEKLM3MK8nPU/BKTM4uzs9TslKo5lIAA6Wi1OT8ohSgiJKZrrGSDkw4OT+vJLWiBCTunFGanK3gk5mSkpqTo2BkYGCu8KhtkoIXyLz8vNRioJChoRJYYy0Ajz0eVw=='); OVERRIDE=d('')

          p=Path('assets/data/canonical-roster-batch-twelve.js'); s=p.read_text()
          s=s.replace('canonical-roster-batch-twelve-20260716a-quinton-jackson','canonical-roster-batch-twelve-20260716b-quinton-jackson-photos')
          s=s.replace("resumeTag:'High-impact light heavyweight champion',photoUnavailable:true,photoStatus:'missing',oneLiner:","resumeTag:'High-impact light heavyweight champion',photoUrl:'assets/fighters/quinton-jackson.webp',thumbUrl:'assets/fighters/quinton-jackson-thumb.webp',photoUnavailable:false,photoStatus:'verified',oneLiner:")
          s=s.replace("photoStatus:'missing',passed:","photoStatus:'verified',passed:")
          p.write_text(s)

          p=Path('assets/data/ranking-data.js'); s=p.read_text()
          if '"fighter": "Quinton Jackson"' not in s:
              i=s.index('\n  ],\n  "women": ['); s=s[:i]+MEN+s[i:]
          if '"id": "QJ001"' not in s:
              i=s.index('\n  ],\n  "divisionStrength": ['); s=s[:i]+PROFILE+s[i:]
          if '"Quinton Jackson": {\n      "record": "6-3"' not in s:
              i=s.rindex('\n  }\n};'); s=s[:i]+PRIME+s[i:]
          p.write_text(s)

          p=Path('assets/data/display-overrides.js'); s=p.read_text()
          if '"Quinton Jackson": {' not in s:
              i=s.rindex('\n\n};'); s=s[:i]+OVERRIDE+s[i:]
          p.write_text(s)

          p=Path('assets/js/production-ranking-bootstrap.js'); s=p.read_text()
          s=s.replace("production-ranking-bootstrap-20260716r-tom-aspinall-photos","production-ranking-bootstrap-20260716s-quinton-jackson-78")
          s=re.sub(r'const EXPECTED_FIGHTER_COUNT=\d+;','const EXPECTED_FIGHTER_COUNT=78;',s,count=1)
          n="    ['assets/data/canonical-roster-batch-eleven.js?v=canonical-roster-batch-eleven-20260716c-tom-aspinall-photos','data-production-clean-roster-batch-eleven'],\n"
          if 'data-production-clean-roster-batch-twelve' not in s:s=s.replace(n,n+"    ['assets/data/canonical-roster-batch-twelve.js?v=canonical-roster-batch-twelve-20260716b-quinton-jackson-photos','data-production-clean-roster-batch-twelve'],\n")
          n="    if(window.UFC_CANONICAL_ROSTER_BATCH_ELEVEN?.passed!==true)missing.push('shared canonical roster batch eleven');\n"
          if 'shared canonical roster batch twelve' not in s:s=s.replace(n,n+"    if(window.UFC_CANONICAL_ROSTER_BATCH_TWELVE?.passed!==true)missing.push('shared canonical roster batch twelve');\n")
          n='rosterBatchEleven:window.UFC_CANONICAL_ROSTER_BATCH_ELEVEN,'
          if 'rosterBatchTwelve' not in s:s=s.replace(n,n+'rosterBatchTwelve:window.UFC_CANONICAL_ROSTER_BATCH_TWELVE,')
          p.write_text(s)

          p=Path('index.html'); s=p.read_text()
          for a,b in {
            '20260716-tom-aspinall-77-photos':'20260716-quinton-rampage-jackson-78',
            'ranking-data-20260710a-canonical-prime-record':'ranking-data-20260716b-quinton-rampage-jackson',
            'display-overrides-20260716-tom-aspinall':'display-overrides-20260716b-quinton-rampage-jackson',
            'card-nicknames-20260716d-tom-aspinall':'card-nicknames-20260716e-quinton-rampage-jackson',
            'ranking-data-patches-20260716a-pantoja-weidman-nicknames':'ranking-data-patches-20260716b-quinton-rampage-jackson',
            'production-ranking-bootstrap-20260716r-tom-aspinall-photos':'production-ranking-bootstrap-20260716s-quinton-jackson-78',
            'app-update-watcher-20260716-tom-aspinall-77-photos':'app-update-watcher-20260716-quinton-rampage-jackson-78'
          }.items():s=s.replace(a,b)
          p.write_text(s)
          PY

      - name: Validate source inputs
        shell: bash
        run: |
          set -euo pipefail
          node --check assets/data/ranking-data.js
          node --check assets/data/display-overrides.js
          node --check assets/data/canonical-roster-batch-twelve.js
          node --check assets/js/production-ranking-bootstrap.js
          test "$(grep -c '"fighter": "Quinton Jackson"' assets/data/ranking-data.js)" -ge 2
          grep -q '"id": "QJ001"' assets/data/ranking-data.js
          grep -q 'Quinton “Rampage” Jackson' assets/data/display-overrides.js
          grep -q 'EXPECTED_FIGHTER_COUNT=78' assets/js/production-ranking-bootstrap.js
          grep -q 'canonical-roster-batch-twelve-20260716b-quinton-jackson-photos' assets/js/production-ranking-bootstrap.js
          grep -q "photoStatus:'verified'" assets/data/canonical-roster-batch-twelve.js
          test -s assets/fighters/quinton-jackson.webp
          test -s assets/fighters/quinton-jackson-thumb.webp
          grep -q 'app-build.*quinton-rampage-jackson-78' index.html

      - name: Run production browser audit
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          python3 -m http.server 4173 >/tmp/ufc-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          node - <<'NODE'
          const fs=require('fs'),{chromium}=require('playwright');
          (async()=>{
            const browser=await chromium.launch({headless:true}),page=await browser.newPage(),errors=[];
            page.on('pageerror',e=>errors.push(String(e)));
            await page.goto('http://127.0.0.1:4173/index.html?audit=quinton-jackson',{waitUntil:'load',timeout:120000});
            await page.waitForFunction(()=>['ready','error'].includes(window.UFC_PRODUCTION_RANKING_BOOTSTRAP?.status),null,{timeout:120000});
            const x=await page.evaluate(()=>{
              const b=window.UFC_PRODUCTION_RANKING_BOOTSTRAP||{},row=[...(window.RANKING_DATA?.men||[]),...(window.RANKING_DATA?.women||[])].find(r=>r.fighter==='Quinton Jackson');
              return {boot:{status:b.status,error:b.error||null,report:b.report||null,divisionReport:b.divisionReport||null},row,ov:(window.OCTAGON_VERDICT_DATA?.fighters||[]).find(r=>r.name==='Quinton Jackson')||null,category:window.UFC_CATEGORY_CALCULATORS?.entryFor?.('Quinton Jackson')||null,photoSync:window.UFC_CALCULATED_ROSTER_PHOTO_SYNC||null,copy:{shortCase:window.COMPARE_PROFILES?.['Quinton Jackson']?.shortCase||'',whyRankedHere:window.DISPLAY_OVERRIDES?.['Quinton Jackson']?.whyRankedHere||'',whyNotHigher:window.DISPLAY_OVERRIDES?.['Quinton Jackson']?.whyNotHigher||'',finalTakeaway:window.DISPLAY_OVERRIDES?.['Quinton Jackson']?.finalTakeaway||''}};
            });
            if(x.boot.status!=='ready'||x.boot.report?.fighterCount!==78)throw Error('bootstrap '+JSON.stringify(x.boot));
            if(!x.row||x.category?.status!=='complete')throw Error('Quinton calculation missing '+JSON.stringify(x.category));
            if(errors.length)throw Error(errors.join(' | '));
            let o=x.ov||{slug:'quinton-jackson',name:'Quinton Jackson',group:'men',rank:x.row.rank,appOvr:x.row.overallOvr,totalScore:x.row.totalScore,categories:{championship:x.row.championship,opponentQuality:x.row.opponentQuality,primeDominance:x.row.primeDominance,longevity:x.row.longevity,apexPeak:x.row.apexPeak,lossPenalty:x.row.penalty,divisionEraDepth:x.row.eraDepthAdjustment},weightedScoreBreakdown:x.row.weightedScoreBreakdown,division:x.row.primaryDivision,tag:x.row.resumeTag||'High-impact light heavyweight champion',ufcRecord:x.row.ufcRecord,titleFightWins:x.row.titleFightWins,adjustedTitleWins:x.row.adjustedTitleWins,topFiveWins:x.row.topFiveWins,rankedWins:x.row.rankedWins,primeRecord:x.row.primeRecord,roundsWonPct:x.row.roundsWonPct,finishRatePct:x.row.finishRatePct,activeEliteYears:x.row.activeEliteYears,timesFinishedPrime:x.row.timesFinishedPrime,...x.copy};
            o={...o,displayName:'Quinton “Rampage” Jackson',photoStatus:'verified',photoUrl:'assets/fighters/quinton-jackson.webp',thumbUrl:'assets/fighters/quinton-jackson-thumb.webp'};
            fs.writeFileSync('assets/data/octagon-verdict/fighters/quinton-jackson.json',JSON.stringify(o)+'\n');
            fs.mkdirSync('assets/data/octagon-verdict/audits',{recursive:true});
            fs.writeFileSync('assets/data/octagon-verdict/audits/quinton-jackson-runtime-audit.json',JSON.stringify({generatedAt:new Date().toISOString(),fighterCount:x.boot.report.fighterCount,productionStatus:x.boot.status,categoryStatus:x.category.status,row:x.row,divisionReport:x.boot.divisionReport,photoSync:x.photoSync,pageErrors:errors},null,2)+'\n');
            await browser.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
          node scripts/rebuild-octagon-verdict-index.mjs

      - name: Commit verified production output
        shell: bash
        run: |
          set -euo pipefail
          node -e "const x=require('./assets/data/octagon-verdict/fighters/quinton-jackson.json');if(!x.rank||!x.appOvr||!Number.isFinite(x.totalScore)||x.photoStatus!=='verified')throw Error('invalid Quinton object');console.log(JSON.stringify({rank:x.rank,ovr:x.appOvr,totalScore:x.totalScore}))"
          node -e "const x=require('./assets/data/octagon-verdict/index.json');if(x.fighterCount!==78||!x.fighters.some(f=>f.slug==='quinton-jackson'))throw Error('index missing Quinton')"
          rm -rf node_modules package.json package-lock.json
          rm -f .github/workflows/integrate-quinton-jackson.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete Quinton Rampage Jackson production integration'
          git push origin main
