name: Retire Picks Recovery UI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/retire-picks-recovery-ui.yml'

permissions:
  contents: write

jobs:
  retire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove retired recovery frontend
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          index = index_path.read_text()
          index = re.sub(r'^\s*<link rel="stylesheet" href="assets/css/picks-device-recovery\.css[^\n]*\n', '', index, flags=re.M)
          index = re.sub(r'^\s*<script src="assets/js/picks-device-recovery\.js[^\n]*\n', '', index, flags=re.M)
          index = re.sub(
              r'<meta name="app-build" content="[^"]+" />',
              '<meta name="app-build" content="20260713-picks-archive-admin-c" />',
              index,
              count=1,
          )
          index_path.write_text(index)

          archive_js_path = Path('assets/js/picks-archive-admin.js')
          archive_js = archive_js_path.read_text()
          archive_js = archive_js.replace(
              "  function hideRetiredRecovery(){\n    // The legacy recovery script remains loaded for backward compatibility; CSS retires its UI.\n  }\n\n",
              "",
          )
          archive_js = archive_js.replace("      hideRetiredRecovery();\n", "")
          archive_js_path.write_text(archive_js)

          archive_css_path = Path('assets/css/picks-archive-admin.css')
          archive_css = archive_css_path.read_text()
          archive_css = archive_css.replace(
              '#picksRecoveryCard,#picksInviteRecovery,#picksRecoveryModal,[data-recovery-member]{display:none!important}\n',
              '',
          )
          archive_css_path.write_text(archive_css)

          checker_path = Path('scripts/check-picks-ui.mjs')
          checker = checker_path.read_text()
          checker = checker.replace(
              "const recovery=read('assets/js/picks-device-recovery.js');\nconst recoverySql=read('supabase/picks-device-recovery-phase.sql');",
              "const pin=read('assets/js/picks-member-pin.js');\nconst archiveAdmin=read('assets/js/picks-archive-admin.js');\nconst recoverySql=read('supabase/picks-device-recovery-phase.sql');\nconst pinSql=read('supabase/picks-member-pin-phase.sql');\nconst archiveAdminSql=read('supabase/picks-archive-admin-phase.sql');",
          )
          checker = checker.replace("  'assets/js/picks-device-recovery.js',\n", "")
          checker = checker.replace(
              "  'assets/js/picks-social-retention.js',\n",
              "  'assets/js/picks-social-retention.js',\n  'assets/js/picks-member-pin.js',\n  'assets/js/picks-archive-admin.js',\n",
          )
          checker = checker.replace("  'assets/css/picks-device-recovery.css',\n", "")
          checker = checker.replace(
              "  'assets/css/picks-final-cleanup.css',\n",
              "  'assets/css/picks-final-cleanup.css',\n  'assets/css/picks-member-pin.css',\n  'assets/css/picks-archive-admin.css',\n",
          )
          checker = checker.replace(
              "  'supabase/picks-device-recovery-phase.sql',\n",
              "  'supabase/picks-device-recovery-phase.sql',\n  'supabase/picks-member-pin-phase.sql',\n  'supabase/picks-archive-admin-phase.sql',\n",
          )
          checker = checker.replace(
              "  'assets/css/picks-event-automation.css'\n];",
              "  'assets/css/picks-event-automation.css',\n  'assets/js/picks-device-recovery.js',\n  'assets/css/picks-device-recovery.css'\n];",
          )
          checker = checker.replace("  'assets/css/picks-device-recovery.css',\n", "")
          checker = checker.replace("  'assets/js/picks-device-recovery.js',\n", "")
          checker = checker.replace(
              "  'assets/js/picks-upcoming-event-settings.js',\n  'assets/js/picks-mobile-polish.js',",
              "  'assets/js/picks-upcoming-event-settings.js',\n  'assets/js/picks-member-pin.js',\n  'assets/js/picks-archive-admin.js',\n  'assets/js/picks-mobile-polish.js',",
          )
          checker = re.sub(
              r"check\(recovery\.includes\('picks_member_recovery_status'\)[\s\S]*?check\(recovery\.includes\('Profile recovered'\),'Recovery completion flow is missing'\);\n",
              "",
              checker,
              count=1,
          )
          checker = checker.replace(
              "check(nav.includes(\"home:['picksGroupCard','picksHistoryCard']\"),'Home route is not limited to group and history content');",
              "check(nav.includes(\"home:['picksGroupCard','picksHistoryCard']\"),'Base Home route is missing group and history content');\ncheck(nav.includes(\"routeIds.home=['picksRoomSetup','picksSetupNote',...routeIds.home]\"),'Start/Join onboarding is not routed to Home');",
          )
          checker = checker.replace(
              "check(recoverySql.includes('update public.pick_rooms'),'Commissioner-token rotation is missing');",
              "check(recoverySql.includes('update public.pick_rooms'),'Legacy recovery migration no longer preserves commissioner-token rotation');\ncheck(pin.includes('picks_member_login_pin'),'Member PIN sign-in hook is missing');\ncheck(pin.includes('picks_member_set_pin'),'Member PIN setup hook is missing');\ncheck(pin.includes('picks_commissioner_set_member_pin'),'Commissioner PIN reset hook is missing');\ncheck(archiveAdmin.includes('picks_commissioner_set_member_pick'),'Archived member-pick correction hook is missing');\ncheck(archiveAdmin.includes('picks_commissioner_rename_member'),'Member rename hook is missing');\ncheck(archiveAdmin.includes('Return to Current Event'),'Archived-event return control is missing');\ncheck(pinSql.includes('picks_member_login_pin'),'Member PIN migration is missing sign-in');\ncheck(archiveAdminSql.includes('picks_commissioner_rename_member'),'Archive admin migration is missing member rename');\ncheck(archiveAdminSql.includes('picks_commissioner_set_member_pick'),'Archive admin migration is missing member-pick corrections');",
          )
          checker = checker.replace(
              "check(setup.includes('picks-device-recovery-phase.sql'),'Setup guide does not include the device recovery migration');",
              "check(setup.includes('picks-device-recovery-phase.sql'),'Setup guide does not preserve the legacy database migration sequence');\ncheck(setup.includes('picks-member-pin-phase.sql'),'Setup guide does not include the member PIN migration');\ncheck(setup.includes('picks-archive-admin-phase.sql'),'Setup guide does not include the archive administration migration');",
          )
          checker = checker.replace(
              'console.log(`Picks UI smoke check passed: ${assetRefs.length} local assets resolved, ${requiredFiles.length} required files present, 10 official Oklahoma City fighter thumbnails, artwork, reminders, mobile polish, and automated odds verified.`);',
              'console.log(`Picks UI smoke check passed: ${assetRefs.length} local assets resolved, ${requiredFiles.length} required files present, PIN access, archived-event administration, artwork, reminders, mobile polish, and automated odds verified.`);',
          )
          checker_path.write_text(checker)
          PY

          rm -f assets/js/picks-device-recovery.js assets/css/picks-device-recovery.css
          rm -f .github/workflows/retire-picks-recovery-ui.yml

      - name: Validate Picks frontend
        run: |
          find assets/js -maxdepth 1 -type f -name 'picks*.js' -print0 | xargs -0 -n1 node --check
          node --check scripts/check-picks-ui.mjs
          node scripts/check-picks-ui.mjs

      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A index.html assets/js assets/css scripts/check-picks-ui.mjs .github/workflows/retire-picks-recovery-ui.yml
          git commit -m 'Fully retire Picks recovery frontend' || exit 0
          git push origin HEAD:main

