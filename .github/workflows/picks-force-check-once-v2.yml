name: One-time live Picks rollover check

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/picks-force-check-once-v2.yml'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ODDS_REFRESH_SECRET: ${{ secrets.ODDS_REFRESH_SECRET }}
      PROJECT_REF: hdkjwezaswhisxupxydc
    steps:
      - uses: actions/checkout@v4

      - name: Call live event advance
        shell: bash
        run: |
          test -n "$ODDS_REFRESH_SECRET"
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "content-type: application/json" \
            --header "x-card-sync-secret: $ODDS_REFRESH_SECRET" \
            --data '{"source":"one-time-live-check-v2"}' \
            "https://$PROJECT_REF.supabase.co/functions/v1/advance-picks-event" \
            | tee picks-force-check-v2.json

      - name: Publish live response
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add picks-force-check-v2.json
          git commit -m "Publish live Picks rollover check"
          git push origin main
