name: Phase 3 Drawer Owner Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drawer-owner:
    if: github.head_ref == 'agent/phase-3-retire-drawer-sync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate runtime and proof syntax
        run: |
          node --check assets/js/app.js
          node --check assets/js/calculated-profile-runtime.js
          node --check assets/js/native-app-shell-stability.js
          node --check scripts/test-native-shell-stability-drawer-contract.mjs
          node --check scripts/test-native-shell-stability-drawer-owner.mjs
      - name: Run static owner contract
        run: node scripts/test-native-shell-stability-drawer-contract.mjs
      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start local app
        run: python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/phase3-drawer-server.log 2>&1 &
      - name: Run mobile owner proof
        run: node scripts/test-native-shell-stability-drawer-owner.mjs
      - name: Print diagnostic
        if: failure()
        run: cat /tmp/native-shell-stability-drawer-owner-report.json || true
