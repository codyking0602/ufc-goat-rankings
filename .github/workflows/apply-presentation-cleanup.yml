name: Apply Presentation Ownership Cleanup

on:
  push:
    branches: [agent/fighter-data-phase-1]
    paths:
      - 'scripts/generate-presentation-only-data.mjs'
      - '.github/workflows/apply-presentation-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-presentation-ownership-cleanup
  cancel-in-progress: false

jobs:
  clean-presentation-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
          fetch-depth: 0

      - name: Generate presentation-only data
        run: node scripts/generate-presentation-only-data.mjs

      - name: Commit cleaned presentation files
        run: |
          if git diff --quiet -- assets/data/display-overrides.js assets/compare-data.js; then
            echo "Presentation files are already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/display-overrides.js assets/compare-data.js
          git commit -m "Remove manual scoring ownership from presentation data"
          git push origin HEAD:agent/fighter-data-phase-1
