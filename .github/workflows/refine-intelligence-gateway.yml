name: Refine Intelligence gateway

on:
  push:
    paths:
      - '.github/workflows/refine-intelligence-gateway.yml'

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild Intelligence section
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          section = '''    <section id="compare" class="view intelligence-view">
      <div class="intelligence-shell">
        <div class="intelligence-inner">
          <header class="intelligence-hero">
            <p class="intelligence-talk">Let’s talk.</p>
          </header>
          <div class="intelligence-content">
            <p class="intelligence-subtitle">Ask anything about rankings, scores, comparisons, future scenarios, or UFC debates.</p>
            <a class="intelligence-open-card" data-intelligence-open href="https://chatgpt.com/g/g-6a4c40425d4881919ddebc7231bff09f-octagon-verdict" target="_blank" rel="noopener noreferrer">
              <span class="intelligence-open-eyebrow">Continue in ChatGPT</span>
              <strong>Open Octagon Verdict</strong>
              <span class="intelligence-open-arrow">↗</span>
            </a>

            <section class="intelligence-prompts" aria-labelledby="intelligenceTryLabel">
              <h3 id="intelligenceTryLabel" class="intelligence-section-label">Try asking</h3>
              <div class="intelligence-prompt-list">
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="Show me exactly how Jon Jones got 99 OVR."><span class="intelligence-prompt-icon">🧮</span><span class="intelligence-prompt-copy">Show me exactly how Jon Jones got 99 OVR</span><span class="intelligence-prompt-status">Copy</span></button>
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="Why is Alexandre Pantoja’s quality wins score low?"><span class="intelligence-prompt-icon">🔍</span><span class="intelligence-prompt-copy">Why is Pantoja’s quality wins score low?</span><span class="intelligence-prompt-status">Copy</span></button>
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="Who is the best UFC fighter never to win undisputed gold?"><span class="intelligence-prompt-icon">👑</span><span class="intelligence-prompt-copy">Who is the best fighter never to win undisputed gold?</span><span class="intelligence-prompt-status">Copy</span></button>
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="Compare Khabib Nurmagomedov and Alexander Volkanovski."><span class="intelligence-prompt-icon">⚖️</span><span class="intelligence-prompt-copy">Compare Khabib and Volkanovski</span><span class="intelligence-prompt-status">Copy</span></button>
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="What would Islam Makhachev need to do to pass Georges St-Pierre in the all-time rankings?"><span class="intelligence-prompt-icon">📈</span><span class="intelligence-prompt-copy">What would Islam need to do to pass GSP?</span><span class="intelligence-prompt-status">Copy</span></button>
                <button class="intelligence-prompt" type="button" data-intelligence-prompt="Why is Cain Velasquez behind Francis Ngannou overall?"><span class="intelligence-prompt-icon">🧠</span><span class="intelligence-prompt-copy">Why is Cain behind Ngannou overall?</span><span class="intelligence-prompt-status">Copy</span></button>
              </div>
            </section>

            <details class="intelligence-matchup">
              <summary><span>Quick matchup builder<small>Choose two fighters, copy the debate, then open Octagon Verdict.</small></span></summary>
              <div class="intelligence-matchup-body">
                <div class="compare-controls"><select id="fighterA" aria-label="First fighter"></select><select id="fighterB" aria-label="Second fighter"></select></div>
                <div class="intelligence-matchup-actions">
                  <button id="intelligenceCopyMatchup" class="intelligence-primary" type="button">Copy This Matchup</button>
                  <a class="intelligence-secondary" data-intelligence-open href="https://chatgpt.com/g/g-6a4c40425d4881919ddebc7231bff09f-octagon-verdict" target="_blank" rel="noopener noreferrer">Open Octagon Verdict ↗</a>
                </div>
                <div id="compareResult" hidden></div>
              </div>
            </details>
          </div>
        </div>
      </div>
      <div id="intelligenceToast" class="intelligence-toast" role="status" aria-live="polite"></div>
    </section>'''

          text = re.sub(
              r'<meta name="app-build" content="[^"]*"\s*/>',
              '<meta name="app-build" content="20260716-intelligence-copy-gateway" />',
              text,
              count=1,
          )
          text = re.sub(
              r'assets/css/intelligence\.css\?v=[^"\s]+',
              'assets/css/intelligence.css?v=intelligence-css-20260716c-copy-gateway',
              text,
              count=1,
          )
          text = re.sub(
              r'assets/js/intelligence\.js\?v=[^"\s]+',
              'assets/js/intelligence.js?v=intelligence-js-20260716c-copy-gateway',
              text,
              count=1,
          )

          pattern = re.compile(r'    <section id="compare"[^>]*>.*?\n    <section id="picks"', re.DOTALL)
          if not pattern.search(text):
              raise SystemExit('Could not locate Intelligence section boundary')
          text = pattern.sub(section + '\n    <section id="picks"', text, count=1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit refined Intelligence gateway
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refine-intelligence-gateway.yml
          git add index.html
          git commit -m "Refine Intelligence copy and GPT handoff"
          git push
