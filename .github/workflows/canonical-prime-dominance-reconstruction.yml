name: Canonical Prime Dominance Reconstruction

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/data/canonical-fighter-facts*.js'
      - 'assets/data/canonical-scoring-records.js'
      - 'assets/data/fighter-era-ledgers.js'
      - 'assets/data/prime-windows.js'
      - 'assets/data/prime-round-control-audit.js'
      - 'assets/data/prime-dominance-ledgers.js'
      - 'assets/data/prime-dominance-shadow-model.js'
      - 'assets/data/canonical-prime-dominance-reconstruction.js'
      - 'scripts/apply-prime-sample-lock.mjs'
      - 'scripts/test-canonical-prime-dominance-reconstruction.mjs'
      - '.github/workflows/canonical-prime-dominance-reconstruction.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconstruct-approved-prime-dominance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fighter-data-phase-1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply locked full-score sample percentage
        run: node scripts/apply-prime-sample-lock.mjs
      - name: Commit locked sample rule
        run: |
          if git diff --quiet; then
            echo "Sample lock already applied."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data/canonical-prime-dominance-reconstruction.js scripts/test-canonical-prime-dominance-reconstruction.mjs
            git commit -m "Lock Prime Dominance full-score sample percentage"
            git push origin HEAD:agent/fighter-data-phase-1
          fi
      - name: Check syntax
        run: |
          node --check assets/data/canonical-prime-dominance-reconstruction.js
          node --check scripts/test-canonical-prime-dominance-reconstruction.mjs
      - name: Audit approved 72-fighter Prime Dominance model
        run: node scripts/test-canonical-prime-dominance-reconstruction.mjs > /tmp/canonical-prime-dominance-reconstruction.log 2>&1
      - name: Upload Prime Dominance reconstruction report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-prime-dominance-reconstruction-report
          path: |
            /tmp/canonical-prime-dominance-reconstruction.log
            docs/canonical-prime-dominance-reconstruction.json
            docs/canonical-prime-dominance-reconstruction.md
          if-no-files-found: warn
          retention-days: 30
