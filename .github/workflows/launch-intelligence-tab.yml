name: Launch Intelligence tab

on:
  push:
    paths:
      - '.github/workflows/launch-intelligence-tab.yml'

permissions:
  contents: write

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build Intelligence experience
        env:
          INTELLIGENCE_SECTION_B64: ""
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import os
          import re

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')

          index = re.sub(
              r'<meta name="app-build" content="[^"]*"\s*/>',
              '<meta name="app-build" content="20260715-intelligence-tab-launch" />',
              index,
              count=1,
          )

          css_link = '  <link rel="stylesheet" href="assets/css/intelligence.css?v=intelligence-css-20260715a-launch" />'
          if 'assets/css/intelligence.css' not in index:
              anchor = '  <link rel="stylesheet" href="assets/css/era-filter.css?v=era-filter-20260715b-curated" />'
              if anchor not in index:
                  raise SystemExit('Era filter stylesheet anchor not found')
              index = index.replace(anchor, anchor + '\n' + css_link, 1)

          old_tab = '<button class="tab" data-view="compare">Compare</button>'
          new_tab = '<button class="tab" data-view="compare">Intelligence</button>'
          if old_tab in index:
              index = index.replace(old_tab, new_tab, 1)
          elif new_tab not in index:
              raise SystemExit('Compare tab anchor not found')

          intelligence_section = base64.b64decode(os.environ['INTELLIGENCE_SECTION_B64']).decode('utf-8').rstrip()
          old_compare_pattern = re.compile(
              r'    <section id="compare" class="view">.*?</section>',
              flags=re.DOTALL,
          )
          if old_compare_pattern.search(index):
              index = old_compare_pattern.sub(intelligence_section, index, count=1)
          elif 'class="view intelligence-view"' not in index:
              raise SystemExit('Legacy compare section not found')

          js_link = '  <script src="assets/js/intelligence.js?v=intelligence-js-20260715a-launch"></script>'
          if 'assets/js/intelligence.js' not in index:
              anchor = '  <script src="assets/js/app-update-watcher.js?v=app-update-watcher-20260715o-weidman-photo"></script>'
              if anchor not in index:
                  raise SystemExit('App update watcher script anchor not found')
              index = index.replace(anchor, js_link + '\n' + anchor, 1)

          image_parts = [
              Path('.github/intelligence-image-small-01.txt'),
              Path('.github/intelligence-image-small-02.txt'),
              Path('.github/intelligence-image-small-03.txt'),
          ]
          payload = ''.join(path.read_text(encoding='utf-8').strip() for path in image_parts)
          image_bytes = base64.b64decode(payload, validate=True)
          image_path = Path('assets/intelligence/intelligence-interview.webp')
          image_path.parent.mkdir(parents=True, exist_ok=True)
          image_path.write_bytes(image_bytes)
          if len(image_bytes) < 10000:
              raise SystemExit('Decoded Intelligence image is unexpectedly small')

          index_path.write_text(index, encoding='utf-8')
          PY
      - name: Commit live Intelligence tab
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/launch-intelligence-tab.yml
          git rm .github/intelligence-image-small-01.txt .github/intelligence-image-small-02.txt .github/intelligence-image-small-03.txt .github/intelligence-image-part-01.txt
          git add index.html assets/intelligence/intelligence-interview.webp
          git commit -m "Launch Intelligence tab with Octagon Verdict handoff"
          git push
