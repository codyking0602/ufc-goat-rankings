name: Stage 3 Engine Lock Migration

on:
  push:
    branches: [agent/stage3-remove-legacy-scoring]
    paths:
      - 'scripts/stage3-lock-score-engine.mjs'
      - '.github/workflows/stage3-engine-lock-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[stage3 engine lock]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/stage3-remove-legacy-scoring

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lock score engine
        run: node scripts/stage3-lock-score-engine.mjs

      - name: Validate syntax
        run: |
          node --check assets/js/scoring-engine.js
          node --check scripts/validate-stage3-scoring-cleanup.mjs

      - name: Commit engine lock
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/scoring-engine.js index.html scripts/validate-stage3-scoring-cleanup.mjs
          git commit -m 'Lock scoring engine to Stage 3 finalizer [stage3 engine lock]' || exit 0
          git push origin HEAD:agent/stage3-remove-legacy-scoring
