name: Debug required scoring sequence

on:
  push:
    branches:
      - agent/debug-required-scoring-v2

permissions:
  contents: write

jobs:
  debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/debug-required-scoring-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.54.2 acorn@8
          npx playwright install --with-deps chromium
      - name: Start local app
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/debug-http.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then exit 0; fi
            sleep 1
          done
          exit 1
      - name: Reproduce and capture
        run: |
          set +e
          : > debug-required-scoring-result.txt
          run_one() {
            name="$1"
            shift
            echo "===== $name =====" >> debug-required-scoring-result.txt
            "$@" > "/tmp/$name.log" 2>&1
            status=$?
            echo "status=$status" >> debug-required-scoring-result.txt
            tail -n 120 "/tmp/$name.log" >> debug-required-scoring-result.txt
            echo >> debug-required-scoring-result.txt
          }
          run_one sync node scripts/sync-production-cache-keys.mjs
          run_one profile-copy node scripts/audit-profile-copy-coverage.mjs
          run_one runtime-boundaries node scripts/test-production-runtime-boundaries.mjs
          run_one scoring-guardrails node scripts/run-scoring-architecture-guardrails.mjs
          rm .github/workflows/debug-required-scoring-temporary.yml
      - name: Commit compact result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debug-required-scoring-result.txt .github/workflows/debug-required-scoring-temporary.yml
          git commit -m "Capture required scoring sequence"
          git push origin HEAD:agent/debug-required-scoring-v2
