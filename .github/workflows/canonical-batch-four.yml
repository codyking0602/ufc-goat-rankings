name: Canonical Top-Seven Batch

on:
  pull_request:
    branches: [main]
    paths:
      - 'assets/data/canonical-fighter-facts.js'
      - 'assets/data/canonical-fighter-facts-batch-one.js'
      - 'assets/data/canonical-fighter-facts-batch-two.js'
      - 'assets/data/canonical-fighter-facts-batch-three.js'
      - 'assets/data/canonical-fighter-facts-batch-four.js'
      - 'scripts/capture-canonical-batch-four.mjs'
      - 'scripts/test-canonical-fighter-facts-seven-person-batch-four.mjs'
      - '.github/workflows/canonical-batch-four.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-top-seven:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check syntax
        run: |
          node --check assets/data/canonical-fighter-facts-batch-four.js
          node --check scripts/capture-canonical-batch-four.mjs
          node --check scripts/test-canonical-fighter-facts-seven-person-batch-four.mjs
      - name: Capture top-seven derivations
        run: node scripts/capture-canonical-batch-four.mjs > docs/canonical-batch-four-capture.log 2>&1 || true
      - name: Verify 138-fight top-seven ledger
        run: node scripts/test-canonical-fighter-facts-seven-person-batch-four.mjs
      - name: Upload top-seven diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-top-seven-diagnostic
          path: |
            docs/canonical-batch-four-diagnostic.json
            docs/canonical-batch-four-capture.log
          if-no-files-found: warn
          retention-days: 30
