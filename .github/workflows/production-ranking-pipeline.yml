name: Production Ranking Pipeline

on:
  push:
    branches:
      - agent/fighter-data-phase-1
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/compare-data.js'
      - 'assets/js/app.js'
      - 'assets/js/play.js'
      - 'assets/js/blind-matchmaking.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'scripts/generate-canonical-scoring-judgments.mjs'
      - 'scripts/remove-obsolete-ranking-runtime.mjs'
      - 'scripts/test-ranking-pipeline.mjs'
      - 'scripts/test-production-runtime-boundaries.mjs'
      - '.github/workflows/production-ranking-pipeline.yml'

permissions:
  contents: write

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Remove obsolete ranking runtime scripts
        run: node scripts/remove-obsolete-ranking-runtime.mjs
      - name: Check cleaned app syntax and ownership
        run: |
          node --check assets/js/production-ranking-bootstrap.js
          node scripts/test-production-runtime-boundaries.mjs
      - name: Verify generated judgment inputs are current
        run: |
          node scripts/generate-canonical-scoring-judgments.mjs
          git diff --exit-code -- assets/data/canonical-scoring-judgments.js
      - name: Certify seven-category production projection
        run: node scripts/test-ranking-pipeline.mjs
      - name: Commit cleaned production index
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$(git status --porcelain -- index.html)" ]; then
            echo 'Production index already clean.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '4189823+github-actions[bot]@users.noreply.github.com'
            git add index.html
            git commit -m 'Remove obsolete ranking scripts from production runtime'
            git push origin HEAD:"$BRANCH_NAME"
          fi
