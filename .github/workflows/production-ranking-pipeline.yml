name: Production Ranking Pipeline

on:
  push:
    branches:
      - agent/fighter-data-phase-1
  pull_request:
    paths:
      - 'index.html'
      - 'assets/data/**'
      - 'assets/compare-data.js'
      - 'assets/js/app.js'
      - 'assets/js/play.js'
      - 'assets/js/blind-matchmaking.js'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'assets/js/production-ranking-bootstrap.js'
      - 'assets/js/calculated-profile-runtime.js'
      - 'scripts/generate-canonical-scoring-judgments.mjs'
      - 'scripts/generate-presentation-only-data.mjs'
      - 'scripts/test-ranking-pipeline.mjs'
      - 'scripts/test-production-runtime-boundaries.mjs'
      - '.github/workflows/production-ranking-pipeline.yml'

permissions:
  contents: read

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify generated judgment inputs are current
        run: |
          node scripts/generate-canonical-scoring-judgments.mjs
          git diff --exit-code -- assets/data/canonical-scoring-judgments.js
      - name: Certify seven-category production projection
        run: node scripts/test-ranking-pipeline.mjs
      - name: Generate reviewable presentation-only files
        run: node scripts/generate-presentation-only-data.mjs | tee /tmp/presentation-cleanup-report.json
      - name: Verify generated presentation syntax
        run: |
          node --check assets/data/display-overrides.js
          node --check assets/compare-data.js
      - name: Certify runtime ownership boundaries
        run: node scripts/test-production-runtime-boundaries.mjs
      - name: Upload presentation cleanup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: presentation-only-data-cleanup
          path: |
            assets/data/display-overrides.js
            assets/compare-data.js
            /tmp/presentation-cleanup-report.json
          if-no-files-found: error
          retention-days: 3
