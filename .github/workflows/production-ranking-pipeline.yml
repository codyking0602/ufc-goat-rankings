name: Production Ranking Pipeline

on:
  push:
    branches:
      - agent/fighter-data-phase-1
  pull_request:
    paths:
      - 'assets/data/**'
      - 'assets/js/category-calculators.js'
      - 'assets/js/ranking-pipeline.js'
      - 'scripts/generate-canonical-scoring-judgments.mjs'
      - 'scripts/test-ranking-pipeline.mjs'
      - '.github/workflows/production-ranking-pipeline.yml'

permissions:
  contents: write

jobs:
  certify:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate permanent judgment inputs
        run: node scripts/generate-canonical-scoring-judgments.mjs
      - name: Commit generated judgment file to working branch
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if git diff --quiet -- assets/data/canonical-scoring-judgments.js; then
            echo 'Canonical judgment inputs already current.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add assets/data/canonical-scoring-judgments.js
            git commit -m 'Generate permanent canonical scoring judgments'
            git push origin HEAD:"$BRANCH_NAME"
          fi
      - name: Certify calculated production projection
        run: node scripts/test-ranking-pipeline.mjs
